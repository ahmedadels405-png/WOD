<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IGNITE — Explosive Fat Loss</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0c10;
      color: #ededee;
      padding: 20px 16px 100px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #f7b05e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: #8e9aaf;
      font-size: 13px;
      margin-top: 4px;
    }
    .date {
      background: rgba(255,255,255,0.04);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 12px;
      color: #8e9aaf;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      margin-top: 6px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }
    @media (max-width: 800px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: rgba(18, 22, 28, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-header h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .badge {
      background: rgba(255,107,53,0.15);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #ff8c5a;
    }

    .ex-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ex-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .ex-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,107,53,0.3);
    }
    .ex-info {
      flex: 1;
    }
    .ex-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .ex-meta {
      font-size: 11px;
      color: #8e9aaf;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(255,107,53,0.12);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      color: #ff8c5a;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      color: #ededee;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #f7b05e);
      border: none;
      color: #0a0c10;
    }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
    }
    .btn-danger {
      background: rgba(220,53,69,0.15);
      border-color: rgba(220,53,69,0.3);
    }
    .btn:hover {
      transform: scale(0.97);
      opacity: 0.9;
    }

    input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 12px;
      border-radius: 40px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    input:focus {
      border-color: #ff6b35;
    }

    .progress-bar {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      height: 6px;
      margin: 10px 0;
    }
    .progress-fill {
      background: linear-gradient(90deg, #ff6b35, #f7b05e);
      width: 0%;
      height: 100%;
      border-radius: 20px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: #12161c;
      border-radius: 32px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e2329;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 1100;
      transition: transform 0.2s;
      white-space: nowrap;
      border: 1px solid #ff6b35;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .text-muted { color: #8e9aaf; font-size: 12px; }
    .gap-2 { gap: 8px; }
  </style>
</head>
<body>
<div class="container">
  
  <div class="header">
    <div>
      <h1>⚡ IGNITE</h1>
      <div class="sub">explosive · compound · fat incineration</div>
    </div>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">🔥 CALORIE BURN</div>
      <div class="stat-value" id="calorieEstimate">~0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⚡ EXPLOSIVE SCORE</div>
      <div class="stat-value" id="explosiveScore">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🎯 BODY FAT</div>
      <div class="stat-value" id="fatPercent">0%</div>
      <div class="progress-bar"><div class="progress-fill" id="fatFill"></div></div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="card">
        <div class="card-header">
          <h2>💥 TODAY'S WORKOUT (5 EXERCISES)</h2>
          <div class="badge" id="workoutBadge">4 Compound + 1 Isolation</div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
          <button class="btn theme-btn" data-theme="explosive">⚡ Explosive</button>
          <button class="btn theme-btn" data-theme="fatloss">🔥 Fat Loss</button>
          <button class="btn theme-btn" data-theme="strength">💪 Strength</button>
          <button class="btn btn-primary" id="smartGenBtn">✨ Generate New</button>
        </div>

        <div id="exerciseList" class="ex-list">
          <!-- Exercises will appear here -->
          <div class="text-muted" style="text-align: center; padding: 20px;">Loading workout...</div>
        </div>

        <div class="flex-between gap-2 mt-3">
          <input type="text" id="customExInput" placeholder="Add custom exercise..." style="flex:1">
          <button class="btn" id="addCustomBtn">+ Add</button>
          <button class="btn btn-primary" id="saveRoutineBtn">💾 Save</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>🧘 MOBILITY (3)</h2>
          <button class="btn btn-sm" id="addMobilityBtn">+ Add</button>
        </div>
        <div id="mobilityList" class="ex-list"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-header">
          <h2>📊 BODY METRICS</h2>
        </div>
        <div>
          <div class="mb-2"><label class="text-muted">Weight (kg)</label><input type="number" id="weightInput" step="0.5" value="80" style="width:100%; margin-top:4px"></div>
          <div class="mb-2"><label class="text-muted">Body Fat %</label><input type="number" id="bfInput" step="0.5" value="18" style="width:100%; margin-top:4px"></div>
          <div class="mb-2"><label class="text-muted">Target BF %</label><input type="number" id="targetBfInput" step="0.5" value="12" style="width:100%; margin-top:4px"></div>
          <button class="btn btn-primary" id="updateMetricsBtn" style="width:100%">Update</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>🎮 QUICK ACTIONS</h2>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="btn btn-primary" id="startWorkoutBtn">🚀 START WORKOUT</button>
        </div>
        <div class="text-muted mt-3">📁 SAVED ROUTINES</div>
        <div id="savedRoutinesList" style="max-height: 200px; overflow-y: auto; margin-top: 8px;"></div>
      </div>
    </div>
  </div>
</div>

<div id="dbModal" class="modal">
  <div class="modal-content">
    <div class="flex-between">
      <h3>📚 Exercise Database</h3>
      <button class="btn" id="closeDbBtn">Close</button>
    </div>
    <input type="text" id="dbSearch" placeholder="Filter exercises..." style="width:100%; margin: 16px 0">
    <div id="dbList" style="display: flex; flex-direction: column; gap: 8px;"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  (function() {
    // ========== EXERCISE DATABASE ==========
    const EXERCISE_DB = [
      { name: "Power Clean", type: "explosive", compound: true, calsPerMin: 12, sets: 4, reps: "6-8" },
      { name: "Thruster", type: "explosive", compound: true, calsPerMin: 11, sets: 4, reps: "8-10" },
      { name: "Deadlift", type: "strength", compound: true, calsPerMin: 9, sets: 3, reps: "8-10" },
      { name: "Back Squat", type: "strength", compound: true, calsPerMin: 8, sets: 3, reps: "8-10" },
      { name: "Barbell Row", type: "strength", compound: true, calsPerMin: 7, sets: 3, reps: "8-10" },
      { name: "Bench Press", type: "strength", compound: true, calsPerMin: 7, sets: 3, reps: "8-10" },
      { name: "Push Press", type: "explosive", compound: true, calsPerMin: 10, sets: 4, reps: "6-8" },
      { name: "Kettlebell Swing", type: "explosive", compound: true, calsPerMin: 11, sets: 4, reps: "12-15" },
      { name: "Box Jump", type: "explosive", compound: false, calsPerMin: 12, sets: 4, reps: "5-6" },
      { name: "Burpee", type: "fatloss", compound: true, calsPerMin: 14, sets: 3, reps: "10-12" },
      { name: "Clean & Jerk", type: "explosive", compound: true, calsPerMin: 13, sets: 4, reps: "5-6" },
      { name: "Front Squat", type: "strength", compound: true, calsPerMin: 8, sets: 3, reps: "8-10" },
      { name: "Romanian Deadlift", type: "strength", compound: true, calsPerMin: 7, sets: 3, reps: "10-12" },
      { name: "Pull-up", type: "strength", compound: true, calsPerMin: 7, sets: 3, reps: "6-8" },
      { name: "Dip", type: "strength", compound: true, calsPerMin: 7, sets: 3, reps: "8-10" },
      { name: "Lunge Jump", type: "explosive", compound: true, calsPerMin: 11, sets: 4, reps: "8-10" },
      { name: "Medicine Ball Slam", type: "explosive", compound: true, calsPerMin: 10, sets: 4, reps: "10-12" },
      { name: "Barbell Curl", type: "isolation", compound: false, calsPerMin: 5, sets: 3, reps: "10-12" },
      { name: "Triceps Extension", type: "isolation", compound: false, calsPerMin: 5, sets: 3, reps: "10-12" },
      { name: "Lateral Raise", type: "isolation", compound: false, calsPerMin: 5, sets: 3, reps: "12-15" },
      { name: "Leg Curl", type: "isolation", compound: false, calsPerMin: 5, sets: 3, reps: "10-12" },
      { name: "Leg Extension", type: "isolation", compound: false, calsPerMin: 5, sets: 3, reps: "10-12" },
      { name: "Calf Raise", type: "isolation", compound: false, calsPerMin: 4, sets: 3, reps: "15-20" },
      { name: "Face Pull", type: "isolation", compound: false, calsPerMin: 5, sets: 3, reps: "12-15" }
    ];

    const DEFAULT_MOBILITY = ["Deep Squat Hold", "Cat-Cow Stretch", "World's Greatest Stretch"];

    // ========== STATE ==========
    let exercises = [];
    let mobility = [...DEFAULT_MOBILITY];
    let profile = { weight: 80, bf: 18, targetBf: 12 };
    let routines = {};
    let currentTheme = "explosive";
    let pendingReplaceIndex = null;

    // ========== STORAGE ==========
    function saveToLocal() {
      localStorage.setItem("ignite_data", JSON.stringify({
        exercises: exercises,
        mobility: mobility,
        profile: profile,
        routines: routines
      }));
    }

    function loadFromLocal() {
      const data = localStorage.getItem("ignite_data");
      if (data) {
        try {
          const p = JSON.parse(data);
          if (p.exercises && p.exercises.length === 5) exercises = p.exercises;
          if (p.mobility && p.mobility.length === 3) mobility = p.mobility;
          if (p.profile) profile = p.profile;
          if (p.routines) routines = p.routines;
        } catch(e) { console.log("Parse error", e); }
      }
    }

    // ========== GENERATE WORKOUT (ALWAYS 5 EXERCISES) ==========
    function generateWorkout() {
      console.log("Generating workout with theme:", currentTheme);
      
      // Filter compound exercises based on theme
      let compoundPool = [];
      const isolationPool = EXERCISE_DB.filter(e => e.type === "isolation");
      
      if (currentTheme === "explosive") {
        compoundPool = EXERCISE_DB.filter(e => e.compound && (e.type === "explosive" || e.type === "fatloss"));
      } else if (currentTheme === "fatloss") {
        compoundPool = EXERCISE_DB.filter(e => e.compound && (e.type === "fatloss" || e.type === "explosive"));
      } else {
        compoundPool = EXERCISE_DB.filter(e => e.compound);
      }
      
      // Fallback if not enough
      if (compoundPool.length < 4) {
        compoundPool = EXERCISE_DB.filter(e => e.compound);
      }
      
      // Shuffle compound pool
      for (let i = compoundPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [compoundPool[i], compoundPool[j]] = [compoundPool[j], compoundPool[i]];
      }
      
      // Pick 4 unique compounds
      const compounds = compoundPool.slice(0, 4);
      
      // Pick 1 isolation
      const isolation = isolationPool[Math.floor(Math.random() * isolationPool.length)];
      
      // Build workout
      exercises = compounds.map(ex => ({ ...ex }));
      exercises.push({ ...isolation });
      
      saveToLocal();
      renderWorkout();
      updateStats();
      showToast(`🔥 ${currentTheme.toUpperCase()} workout ready!`, 1500);
    }

    // ========== REPLACE FUNCTIONS ==========
    function replaceExercise(index, newExercise) {
      if (index >= 0 && index < exercises.length) {
        exercises[index] = { ...newExercise };
        saveToLocal();
        renderWorkout();
        updateStats();
        showToast(`Replaced with ${newExercise.name}`, 1200);
      }
    }

    function autoReplaceExercise(index) {
      const current = exercises[index];
      let pool = [];
      
      if (current.type === "isolation") {
        pool = EXERCISE_DB.filter(e => e.type === "isolation" && e.name !== current.name);
      } else {
        pool = EXERCISE_DB.filter(e => e.compound && e.name !== current.name);
      }
      
      if (pool.length === 0) pool = EXERCISE_DB.filter(e => e.name !== current.name);
      
      const randomEx = pool[Math.floor(Math.random() * pool.length)];
      replaceExercise(index, randomEx);
    }

    // ========== RENDER WORKOUT ==========
    function renderWorkout() {
      const container = document.getElementById("exerciseList");
      if (!container) return;
      
      if (!exercises || exercises.length === 0) {
        container.innerHTML = '<div class="text-muted" style="text-align: center; padding: 20px;">Click "Generate New" to start</div>';
        return;
      }
      
      container.innerHTML = exercises.map((ex, idx) => `
        <div class="ex-item">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">
              <span>${ex.sets} sets × ${ex.reps} reps</span>
              <span class="tag">${ex.type.toUpperCase()} ${ex.compound ? '⚡' : '🎯'}</span>
              <span>🔥 ~${ex.calsPerMin * 4} kcal</span>
            </div>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm auto-replace" data-index="${idx}">🤖 Auto</button>
            <button class="btn btn-sm manual-replace" data-index="${idx}">🔄 Swap</button>
          </div>
        </div>
      `).join("");
      
      // Attach auto-replace events
      document.querySelectorAll(".auto-replace").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.index);
          autoReplaceExercise(idx);
        });
      });
      
      // Attach manual swap events
      document.querySelectorAll(".manual-replace").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.index);
          pendingReplaceIndex = idx;
          renderDbList("");
          document.getElementById("dbModal").classList.add("active");
        });
      });
    }

    // ========== RENDER MOBILITY ==========
    function renderMobility() {
      const container = document.getElementById("mobilityList");
      if (!container) return;
      
      container.innerHTML = mobility.map((item, idx) => `
        <div class="ex-item">
          <div class="ex-info">
            <div class="ex-name">🧘 ${item}</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm remove-mobility" data-idx="${idx}">✖️</button>
          </div>
        </div>
      `).join("");
      
      document.querySelectorAll(".remove-mobility").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.idx);
          mobility.splice(idx, 1);
          saveToLocal();
          renderMobility();
          showToast("Mobility removed");
        });
      });
    }

    function addMobility() {
      const name = prompt("Enter mobility/stretch name:");
      if (name && name.trim()) {
        mobility.push(name.trim());
        saveToLocal();
        renderMobility();
        showToast(`Added: ${name}`);
      }
    }

    function addCustomExercise() {
      const input = document.getElementById("customExInput");
      const name = input.value.trim();
      if (!name) return;
      
      const newEx = {
        name: name,
        type: "strength",
        compound: true,
        calsPerMin: 7,
        sets: 3,
        reps: "8-10"
      };
      
      exercises.push(newEx);
      if (exercises.length > 5) exercises.shift();
      saveToLocal();
      renderWorkout();
      updateStats();
      input.value = "";
      showToast(`Added: ${name}`);
    }

    // ========== DATABASE MODAL ==========
    function renderDbList(filter = "") {
      const container = document.getElementById("dbList");
      const filtered = EXERCISE_DB.filter(ex => 
        ex.name.toLowerCase().includes(filter.toLowerCase())
      );
      
      container.innerHTML = filtered.map(ex => `
        <div class="ex-item" data-ex='${JSON.stringify(ex)}'>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.type} · ${ex.compound ? 'Compound' : 'Isolation'} · 🔥 ${ex.calsPerMin} cal/min</div>
          </div>
          <button class="btn btn-primary btn-sm select-exercise">Select</button>
        </div>
      `).join("");
      
      document.querySelectorAll(".select-exercise").forEach((btn) => {
        btn.addEventListener("click", () => {
          const exData = JSON.parse(btn.closest(".ex-item").dataset.ex);
          if (pendingReplaceIndex !== null) {
            replaceExercise(pendingReplaceIndex, exData);
            pendingReplaceIndex = null;
            document.getElementById("dbModal").classList.remove("active");
          }
        });
      });
      
      const searchInput = document.getElementById("dbSearch");
      if (searchInput) {
        searchInput.oninput = (e) => renderDbList(e.target.value);
      }
    }

    // ========== STATS ==========
    function updateStats() {
      if (!exercises.length) return;
      
      const explosiveCount = exercises.filter(e => e.type === "explosive").length;
      const score = Math.min(100, 40 + (explosiveCount * 12));
      document.getElementById("explosiveScore").innerText = score;
      
      const totalCals = exercises.reduce((sum, ex) => sum + (ex.calsPerMin * 4), 0);
      document.getElementById("calorieEstimate").innerText = `~${totalCals}`;
      
      const currentBf = profile.bf;
      const target = profile.targetBf;
      const startBf = Math.max(target + 12, currentBf);
      const progress = Math.min(100, Math.max(0, ((startBf - currentBf) / (startBf - target)) * 100));
      document.getElementById("fatPercent").innerHTML = `${currentBf}%`;
      document.getElementById("fatFill").style.width = `${progress}%`;
      
      document.getElementById("weightInput").value = profile.weight;
      document.getElementById("bfInput").value = profile.bf;
      document.getElementById("targetBfInput").value = profile.targetBf;
    }
    
    function updateMetrics() {
      const w = parseFloat(document.getElementById("weightInput").value);
      const bf = parseFloat(document.getElementById("bfInput").value);
      const target = parseFloat(document.getElementById("targetBfInput").value);
      if (!isNaN(w)) profile.weight = w;
      if (!isNaN(bf)) profile.bf = bf;
      if (!isNaN(target)) profile.targetBf = target;
      saveToLocal();
      updateStats();
      showToast("Metrics updated");
    }

    // ========== ROUTINES ==========
    function saveRoutine() {
      if (!exercises.length) {
        showToast("No workout to save");
        return;
      }
      const name = prompt("Name this routine:", `Routine ${Object.keys(routines).length + 1}`);
      if (name) {
        routines[name] = JSON.parse(JSON.stringify(exercises));
        saveToLocal();
        renderSavedRoutines();
        showToast(`Saved "${name}"`);
      }
    }
    
    function renderSavedRoutines() {
      const container = document.getElementById("savedRoutinesList");
      const names = Object.keys(routines);
      if (names.length === 0) {
        container.innerHTML = "<div class='text-muted'>No saved routines</div>";
        return;
      }
      container.innerHTML = names.map(name => `
        <div class="flex-between" style="margin-bottom: 8px;">
          <span style="font-size:12px">📁 ${name}</span>
          <div class="btn-group">
            <button class="btn btn-sm load-routine" data-name="${name}">Load</button>
            <button class="btn btn-sm btn-danger del-routine" data-name="${name}">Del</button>
          </div>
        </div>
      `).join("");
      
      document.querySelectorAll(".load-routine").forEach(btn => {
        btn.addEventListener("click", () => {
          const name = btn.dataset.name;
          exercises = JSON.parse(JSON.stringify(routines[name]));
          saveToLocal();
          renderWorkout();
          updateStats();
          showToast(`Loaded "${name}"`);
        });
      });
      document.querySelectorAll(".del-routine").forEach(btn => {
        btn.addEventListener("click", () => {
          const name = btn.dataset.name;
          delete routines[name];
          saveToLocal();
          renderSavedRoutines();
          showToast(`Deleted "${name}"`);
        });
      });
    }

    // ========== WORKOUT RUNNER ==========
    let currentExIdx = 0;
    let currentSetNum = 1;
    let runnerDiv = null;
    
    function startWorkout() {
      if (!exercises.length) {
        showToast("No exercises! Generate first.");
        return;
      }
      currentExIdx = 0;
      currentSetNum = 1;
      showRunner();
    }
    
    function showRunner() {
      if (runnerDiv) runnerDiv.remove();
      
      const ex = exercises[currentExIdx];
      if (!ex) return;
      
      runnerDiv = document.createElement("div");
      runnerDiv.id = "runnerPanel";
      runnerDiv.style.cssText = "position: fixed; bottom: 0; left: 0; right: 0; background: #12161c; border-top: 3px solid #ff6b35; padding: 24px; z-index: 2000; max-height: 80vh; overflow-y: auto;";
      runnerDiv.innerHTML = `
        <div class="flex-between" style="margin-bottom: 20px;">
          <h3>🏋️ WORKOUT IN PROGRESS</h3>
          <button class="btn" id="closeRunnerBtn">Close</button>
        </div>
        <div style="text-align: center; margin-bottom: 24px;">
          <div style="font-size: 26px; font-weight: 800;">${ex.name}</div>
          <div class="text-muted">${ex.type.toUpperCase()} · ${ex.sets} sets × ${ex.reps} reps</div>
        </div>
        <div class="flex-between" style="margin: 16px 0;">
          <span>Set ${currentSetNum} / ${ex.sets}</span>
          <span>⚡ Rest 45s between sets</span>
        </div>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
          <button class="btn btn-primary" id="completeSetBtn">✅ Complete Set</button>
          <button class="btn" id="nextExBtn">➡️ Next Exercise</button>
          <button class="btn" id="prevExBtn">⬅️ Previous</button>
        </div>
        <div class="text-muted" style="margin-top: 20px; text-align: center;">Complete all sets to move to next exercise</div>
      `;
      document.body.appendChild(runnerDiv);
      
      document.getElementById("closeRunnerBtn")?.addEventListener("click", () => {
        runnerDiv.remove();
        runnerDiv = null;
      });
      
      document.getElementById("completeSetBtn")?.addEventListener("click", () => {
        if (currentSetNum < ex.sets) {
          currentSetNum++;
          showToast(`Set ${currentSetNum-1} done! Rest 45s`);
          showRunner();
        } else {
          if (currentExIdx + 1 < exercises.length) {
            currentExIdx++;
            currentSetNum = 1;
            showToast(`Next: ${exercises[currentExIdx].name}`);
            showRunner();
          } else {
            showToast("🏆 WORKOUT COMPLETE! Amazing job.");
            runnerDiv.remove();
            runnerDiv = null;
          }
        }
      });
      
      document.getElementById("nextExBtn")?.addEventListener("click", () => {
        if (currentExIdx + 1 < exercises.length) {
          currentExIdx++;
          currentSetNum = 1;
          showRunner();
        } else showToast("Already at last exercise");
      });
      
      document.getElementById("prevExBtn")?.addEventListener("click", () => {
        if (currentExIdx > 0) {
          currentExIdx--;
          currentSetNum = 1;
          showRunner();
        } else showToast("Already at first exercise");
      });
    }

    // ========== TOAST ==========
    function showToast(msg, duration = 1500) {
      const toast = document.getElementById("toast");
      toast.innerText = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), duration);
    }

      console.log("Initializing app...");
      
      // Set date
      document.getElementById("dateDisplay").innerText = new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

      if (exercises.length !== 5) {
        generateWorkout();
      } else {
        renderWorkout();
      }

        btn.addEventListener("click", () => {
          document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("btn-primary"));
          btn.classList.add("btn-primary");
          currentTheme = btn.dataset.theme;
          generateWorkout();
