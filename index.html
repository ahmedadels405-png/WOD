<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Field+Iron — WOD</title>
<style>
:root{
  --bg:#0b0b0d;
  --card:#0f1113;
  --muted:rgba(255,255,255,0.18);
  --accent:#ff6b6b;
  --accent-2:#7c5cff;
  --glass:rgba(255,255,255,0.03);
  --radius:14px;
  --shadow: 0 6px 18px rgba(0,0,0,0.6);
  --theme:#7c5cff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:linear-gradient(180deg,#070708 0%, #0b0b0d 100%);color:#fff;overflow-y:auto;-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) 16px 140px;line-height:1.35}
.app{max-width:1100px;margin:18px auto 160px;display:grid;grid-template-columns:1fr;gap:18px}

/* Header */
.header{position:sticky;top:env(safe-area-inset-top);z-index:60;backdrop-filter: blur(8px);background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 6px 18px rgba(124,92,255,0.18)}
.title{font-weight:700;font-size:16px}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--glass);border:1px solid rgba(255,255,255,0.03);padding:8px;border-radius:10px;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-width:40px;min-height:40px}
.search{flex:1;margin-left:12px;background:transparent;border:none;color:rgba(255,255,255,0.9);font-size:14px;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.02)}

/* Grid */
.grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:1100px){.grid{grid-template-columns:380px 1fr}}

/* Cards */
.card{background:linear-gradient(180deg,var(--card),#0b0b0d);padding:14px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.02)}
.stats{display:flex;flex-direction:column;gap:12px}
.stat-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stat{display:flex;flex-direction:column;gap:6px}
.stat .label{font-size:12px;color:var(--muted)}
.editable{background:transparent;border:none;color:inherit;font-weight:700;font-size:18px;outline:none;max-width:120px;text-align:right}
.small{font-size:12px;color:var(--muted)}

/* Week */
.week{display:flex;gap:8px;flex-wrap:wrap}
.day{flex:1;min-width:44px;background:var(--glass);padding:10px;border-radius:10px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.02);transition:transform .18s ease, box-shadow .18s ease;position:relative}
.day.active{background:linear-gradient(180deg,#1b1b1f,#141416);box-shadow:0 8px 30px rgba(0,0,0,0.6);transform:translateY(-6px)}
.day .d{font-weight:700}
.day .sub{font-size:11px;color:var(--muted)}
.day-badge{display:inline-block;font-size:10px;padding:4px 6px;border-radius:8px;background:rgba(255,255,255,0.04);color:var(--muted);margin-top:8px}
.day-edit-btn{font-size:11px;padding:6px 8px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.04);cursor:pointer;margin-top:8px;color:rgba(255,255,255,0.7)}

/* Workout list */
.workout{display:flex;flex-direction:column;gap:10px}
.exercise{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.02)}
.exercise .meta{flex:1}
.exercise .name{font-weight:700}
.exercise .sub{font-size:12px;color:var(--muted)}
.exercise .actions{display:flex;gap:8px}
.btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px 10px;border-radius:10px;color:#fff;cursor:pointer;font-size:13px}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;box-shadow:0 8px 24px rgba(124,92,255,0.12)}
.btn.ghost{background:transparent;border:1px dashed rgba(255,255,255,0.03)}

/* Modal & sheet */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;padding:20px;z-index:120}
.modal{width:100%;max-width:720px;background:linear-gradient(180deg,#0b0b0d,#0a0a0a);border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.03)}
.input,textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;resize:none}
.row{display:flex;gap:8px;align-items:center}

/* sheet overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:110;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
#overlay.open{display:flex}
#sheet{background:#161616;border-radius:20px 20px 0 0;width:100%;max-height:82vh;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.08)}
#sheet-header{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#sheet-title{font-size:18px;font-weight:700;letter-spacing:0.3px}
#sheet-sub{font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:2px;margin-top:2px}
#sheet-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px}
#sheet-search-wrap{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
#sheet-search{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);padding:9px 14px;font-size:13px;border-radius:12px;outline:none}
#sheet-list{overflow-y:auto;flex:1}
.sheet-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sheet-item.current{background:rgba(255,255,255,0.04);cursor:default}
.sheet-item .ex-nm{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);margin-bottom:3px}
.sheet-item .ex-cue{font-size:10px;color:rgba(255,255,255,0.2);font-style:italic}

/* Calendar */
.calendar{display:flex;flex-direction:column;gap:10px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-cell{background:var(--glass);padding:10px;border-radius:10px;min-height:80px;border:1px solid rgba(255,255,255,0.02);position:relative;cursor:pointer}
.cal-cell .date{font-weight:700}
.cal-cell .type{position:absolute;top:8px;right:8px;font-size:11px;padding:4px 6px;border-radius:8px;background:rgba(255,255,255,0.03)}
.cal-controls{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:6px}

/* footer */
.footer-bar{position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom);display:flex;justify-content:center;padding:12px;background:transparent;z-index:60}
.fab{background:linear-gradient(90deg,var(--accent),var(--accent-2));padding:12px 18px;border-radius:999px;color:#fff;font-weight:700;box-shadow:0 12px 40px rgba(124,92,255,0.18);border:none;cursor:pointer}

/* micro */
.kv{font-size:12px;color:var(--muted)}
.empty{opacity:0.6;padding:18px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));text-align:center}
.small-muted{font-size:12px;color:var(--muted);margin-top:6px}
.fade-in{animation:fadeIn .36s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hidden{display:none!important}
.counter-bubble{font-size:12px;padding:6px 8px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.03);margin-left:8px}
.toggle{display:inline-flex;align-items:center;gap:8px}
.switch{width:44px;height:24px;border-radius:999px;background:rgba(255,255,255,0.06);position:relative;cursor:pointer}
.switch .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:all .18s}
.switch.on{background:var(--theme)}
.switch.on .knob{left:23px}
.bulk-actions{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="app">
  <header class="header fade-in" role="banner">
    <div class="brand">
      <div class="logo">FI</div>
      <div>
        <div class="title">Field+Iron</div>
        <div class="small-muted">Daily WOD & Progress</div>
      </div>
    </div>

    <input class="search" placeholder="Search exercises or days..." id="search" />

    <div class="header-actions">
      <div id="counters" style="display:flex;align-items:center;gap:8px">
        <div class="kv">Scheduled <span id="cntScheduled" class="counter-bubble">0</span></div>
        <div class="kv">Library <span id="cntLibrary" class="counter-bubble">0</span></div>
        <div class="kv">Pool <span id="cntPool" class="counter-bubble">0</span></div>
      </div>
      <div class="toggle" title="Show workouts on soccer days by default">
        <div style="font-size:12px;color:var(--muted)">Soccer override</div>
        <div id="globalToggle" class="switch" role="switch" aria-checked="false"><div class="knob"></div></div>
      </div>
      <button class="icon-btn" id="sheetOpen" title="Open exercise library">📚</button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">🌗</button>
      <button class="icon-btn" id="resetBtn" title="Reset data">⟲</button>
    </div>
  </header>

  <main class="grid" role="main">
    <!-- Left column -->
    <section class="card stats fade-in" aria-labelledby="statsTitle">
      <div id="statsTitle" class="small-muted">Your Stats</div>
      <div class="stat-row">
        <div class="stat">
          <div class="label">Weight</div>
          <input id="weight" class="editable" type="number" step="0.1" />
          <div class="small">kg</div>
        </div>
        <div class="stat">
          <div class="label">Body Fat</div>
          <input id="bodyfat" class="editable" type="number" step="0.1" />
          <div class="small">%</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat">
          <div class="label">Muscle Mass</div>
          <input id="muscle" class="editable" type="number" step="0.1" />
          <div class="small">kg</div>
        </div>
        <div class="stat">
          <div class="label">Goal</div>
          <input id="goal" class="editable" type="text" placeholder="e.g., +2kg muscle" />
        </div>
      </div>

      <div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="small-muted">Weekly Schedule</div>
          <div style="display:flex;gap:8px">
            <button class="btn ghost" id="openCalendar">Calendar</button>
            <button class="btn ghost" id="bulkEdit">Bulk Edit</button>
          </div>
        </div>
        <div class="week" id="weekDays" style="margin-top:8px"></div>
      </div>

      <div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="small-muted">History</div>
          <button class="btn ghost" id="addHistory">Add snapshot</button>
        </div>
        <div id="history" class="small-muted" style="margin-top:8px">No entries yet</div>
      </div>
    </section>

    <!-- Right column -->
    <section>
      <div class="card fade-in" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="small-muted">Today</div>
            <div style="font-weight:800;font-size:20px" id="currentDayTitle">Monday</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn ghost" id="shuffleDay">Shuffle</button>
            <button class="btn primary" id="startWorkout">Start</button>
          </div>
        </div>
        <div style="margin-top:12px" id="dayDescription" class="small-muted">Tap a day to view its workout.</div>
      </div>

      <div class="card workout fade-in" id="workoutList">
        <!-- exercises injected here -->
      </div>

      <div style="height:18px"></div>
    </section>
  </main>

  <div class="footer-bar">
    <button class="fab" id="newWorkout">New Workout</button>
  </div>
</div>

<!-- Modal root -->
<div id="modalRoot" class="hidden"></div>

<!-- Sheet overlay (exercise library) -->
<div id="overlay" onclick="closeSheet()">
  <div id="sheet" onclick="event.stopPropagation()">
    <div id="sheet-header">
      <div><div id="sheet-title">Exercises</div><div id="sheet-sub">Library · Add to day</div></div>
      <button id="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div id="sheet-search-wrap"><input id="sheet-search" type="text" placeholder="Search exercises…" oninput="filterSheet()"/></div>
    <div id="sheet-list"></div>
  </div>
</div>

<!-- Calendar modal -->
<div id="calendarModalRoot" class="hidden"></div>

   ========================= */

    { id: 'sun', name: 'Sunday', type:'rest', allowWorkoutOnSoccer:false, exercises: [
      {id:'e13', name:'Active Recovery', meta:'Mobility + light cardio'}
    ]}
  ],
  stats: { weight: 80, bodyfat: 15, muscle: 60, goal: '' },
  history: []
};

function loadData(){
  try{
    const raw = localStorage.getItem('fi_data');
    if(!raw) return structuredClone(DEFAULT_DATA);
    return JSON.parse(raw);
  }catch(e){
    console.error('load error', e);
    return structuredClone(DEFAULT_DATA);
  }
}
function saveData(){
  try{
    localStorage.setItem('fi_data', JSON.stringify(DATA));
    updateCounters();
  }catch(e){
    console.error('save error', e);
  }
}

/* =========================
   App state & helpers
   ========================= */
let DATA = loadData();
let currentDayId = DATA.days[0].id;
let GLOBAL_ALLOW_SOCCER_WORKOUTS = JSON.parse(localStorage.getItem('fi_global_allow')) || false;

function uid(prefix='id'){return prefix + Math.random().toString(36).slice(2,9)}
function el(tag, props={}, ...children){
  const node = document.createElement(tag);
  for(const k in props){
    if(k.startsWith('on') && typeof props[k] === 'function') node.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if(k === 'html') node.innerHTML = props[k];
    else node.setAttribute(k, props[k]);
  }
  children.flat().forEach(c => {
    if(c == null) return;
    node.append(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}
function findDay(id){ return DATA.days.find(d=>d.id===id) }

   Exercise pools (merged)
   ========================= */

/* =========================
   Initialization helpers
   ========================= */
function ensureDayFields(){
  DATA.days.forEach(d=>{
    if(!('type' in d)){
      if(d.id === 'sat') d.type = 'soccer';
      else if(d.id === 'sun') d.type = 'rest';
      else d.type = 'workout';
    }
    if(!('allowWorkoutOnSoccer' in d)) d.allowWorkoutOnSoccer = false;
    if(!Array.isArray(d.exercises)) d.exercises = [];
  });
  saveData();
}

/* =========================
   Rendering & UI
   ========================= */
function updateCounters(){
  cntScheduled.textContent = DATA.days.reduce((s,d)=>s + (d.exercises?.length||0),0);
  cntLibrary.textContent = EXERCISES.length;
  cntPool.textContent = EXERCISES.length;
}
function renderWeek(){
  weekRoot.innerHTML = '';
  DATA.days.forEach(d => {
    const isActive = d.id === currentDayId;
    const dayEl = document.createElement('div');
    dayEl.className = 'day' + (isActive ? ' active' : '');
    dayEl.innerHTML = `<div class="d">${d.name.slice(0,3)}</div><div class="sub">${d.exercises.length} ex</div>`;
    const badgeText = d.type === 'soccer' ? '⚽ Soccer' : (d.type === 'rest' ? '— Rest' : '🏋️ Workout');
    const badge = el('div',{class:'day-badge'}, badgeText);
    dayEl.appendChild(badge);
    const editBtn = el('div',{class:'day-edit-btn', onClick:(e)=>{ e.stopPropagation(); openDaySettings(d.id); }}, 'Edit Day');
    dayEl.appendChild(editBtn);
    dayEl.addEventListener('click', ()=> {
      currentDayId = d.id;
      renderAll();
    });
    weekRoot.appendChild(dayEl);
  });
}

function renderWorkout(){
  workoutList.innerHTML = '';
  const day = findDay(currentDayId);
  if(!day){
    workoutList.appendChild(el('div',{class:'empty'},'No workout for this day.'));
    return;
  }
  currentDayTitle.textContent = day.name;
  dayDescription.textContent = `${day.exercises.length} exercises — tap actions to edit, replace, or remove.`;

  const effectiveAllow = GLOBAL_ALLOW_SOCCER_WORKOUTS || day.allowWorkoutOnSoccer;

  if(day.type === 'soccer' && !effectiveAllow){
    const msg = el('div',{class:'empty'},
      el('div',{}, 'This day is marked as Soccer. Workouts are hidden by default.'),
      el('div',{style:'height:8px'}),
      el('div',{style:'display:flex;gap:8px;justify-content:center'},
        el('button',{class:'btn primary', onClick:()=>{
          day.allowWorkoutOnSoccer = true;
          saveData();
          renderAll();
        }}, 'Allow Workout Today'),
        el('button',{class:'btn', onClick:()=>openDaySettings(day.id)}, 'Edit Day Settings')
      )
    );
    workoutList.appendChild(msg);
    return;
  }

  if(day.exercises.length === 0){
    workoutList.appendChild(el('div',{class:'empty'},'No exercises. Add a new one from the library.'));
    return;
  }

  const q = (searchInput.value || '').trim().toLowerCase();

  day.exercises.forEach((ex, idx) => {
    if(q && !(ex.name.toLowerCase().includes(q) || (ex.meta||'').toLowerCase().includes(q))) return;
    const exEl = el('div',{class:'exercise fade-in'},
      el('div',{class:'meta'},
        el('div',{class:'name'}, ex.name),
        el('div',{class:'sub'}, ex.meta || '')
      ),
      el('div',{class:'actions'},
        el('button',{class:'btn', onClick:()=>openEditModal(day.id, idx)}, 'Edit'),
        el('button',{class:'btn', onClick:()=>openReplaceModal(day.id, idx)}, 'Replace'),
        el('button',{class:'btn', onClick:()=>removeExercise(day.id, idx)}, 'Remove')
      )
    );
    workoutList.appendChild(exEl);
  });
}

/* =========================
   Replace / Edit / Remove logic
   ========================= */
function replaceExercise(dayId, index, newExercise){
  const day = findDay(dayId);
  if(!day) return console.warn('replaceExercise: day not found', dayId);
  if(index < 0 || index >= day.exercises.length) return console.warn('replaceExercise: invalid index', index);
  const ex = {
    id: newExercise.id || uid('ex'),
    name: (newExercise.name || 'Unnamed Exercise').trim(),
    meta: (newExercise.meta || '').trim()
  };
  day.exercises.splice(index, 1, ex);
  saveData();
  renderAll();
}

function editExercise(dayId, index, updates){
  const day = findDay(dayId);
  if(!day) return;
  if(index < 0 || index >= day.exercises.length) return;
  const ex = day.exercises[index];
  ex.name = (updates.name || ex.name).trim();
  ex.meta = (updates.meta || ex.meta || '').trim();
  saveData();
  renderAll();
}

function removeExercise(dayId, index){
  const day = findDay(dayId);
  if(!day) return;
  if(index < 0 || index >= day.exercises.length) return;
  if(!confirm('Remove this exercise?')) return;
  day.exercises.splice(index,1);
  saveData();
  renderAll();
}

/* =========================
   Modal helpers
   ========================= */
function openModal(contentEl){
  modalRoot.innerHTML = '';
  modalRoot.classList.remove('hidden');
  const backdrop = el('div',{class:'modal-backdrop'});
  backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closeModal(); });
  const modal = el('div',{class:'modal'}, contentEl);
  backdrop.appendChild(modal);
  modalRoot.appendChild(backdrop);
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  modalRoot.innerHTML = '';
  modalRoot.classList.add('hidden');
  document.body.style.overflow = '';
}

/* =========================
   Specific modals
   ========================= */
function openReplaceModal(dayId, index){
  const day = findDay(dayId);
  if(!day || index<0 || index>=day.exercises.length) return;
  const current = day.exercises[index];
  const title = el('h3',{}, 'Replace Exercise');
  const nameInput = el('input',{class:'input', placeholder:'Exercise name', value:current.name});
  const metaInput = el('input',{class:'input', placeholder:'Meta (sets x reps)', value:current.meta || ''});
  const row = el('div',{class:'row'}, el('button',{class:'btn primary', onClick:()=>{
    const newName = nameInput.value.trim();
    if(!newName){ alert('Please enter a name'); return; }
    replaceExercise(dayId, index, { name:newName, meta:metaInput.value.trim() });
    closeModal();
  }}, 'Replace'), el('button',{class:'btn', onClick:()=>{ closeModal(); }}, 'Cancel'));
  const content = el('div',{}, title, nameInput, metaInput, el('div',{style:'height:10px'}), row);
  openModal(content);
}

function openEditModal(dayId, index){
  const day = findDay(dayId);
  if(!day || index<0 || index>=day.exercises.length) return;
  const current = day.exercises[index];
  const title = el('h3',{}, 'Edit Exercise');
  const nameInput = el('input',{class:'input', placeholder:'Exercise name', value:current.name});
  const metaInput = el('input',{class:'input', placeholder:'Meta (sets x reps)', value:current.meta || ''});
  const saveBtn = el('button',{class:'btn primary', onClick:()=>{
    const newName = nameInput.value.trim();
    if(!newName){ alert('Please enter a name'); return; }
    editExercise(dayId, index, { name:newName, meta:metaInput.value.trim() });
    closeModal();
  }}, 'Save');
  const cancelBtn = el('button',{class:'btn', onClick:()=>closeModal()}, 'Cancel');
  const content = el('div',{}, title, nameInput, metaInput, el('div',{style:'height:10px'}), el('div',{class:'row'}, saveBtn, cancelBtn));
  openModal(content);
}

/* =========================
   Day settings + bulk edit
   ========================= */
function openDaySettings(dayId){
  const day = findDay(dayId);
  if(!day) return;
  const title = el('h3',{}, `Edit ${day.name}`);
  const typeLabel = el('div', {class:'small-muted'}, 'Day Type');
  const typeSelect = el('select', {class:'input'},
    el('option', {value:'workout'}, 'Workout'),
    el('option', {value:'soccer'}, 'Soccer'),
    el('option', {value:'rest'}, 'Rest')
  );
  typeSelect.value = day.type || 'workout';

  const overrideRow = el('div', {style:'margin-top:10px;display:flex;align-items:center;gap:10px'},
    el('input', {type:'checkbox', id:'overrideChk', checked: day.allowWorkoutOnSoccer}),
    el('label', {for:'overrideChk'}, 'Allow workouts on soccer days (override)')
  );

  const saveBtn = el('button', {class:'btn primary', onClick:()=>{
    day.type = typeSelect.value;
    day.allowWorkoutOnSoccer = document.getElementById('overrideChk').checked;
    saveData();
    closeModal();
    renderAll();
  }}, 'Save');

  const cancelBtn = el('button', {class:'btn', onClick:()=>{ closeModal(); }}, 'Cancel');

  const content = el('div', {}, title, typeLabel, typeSelect, overrideRow, el('div',{style:'height:10px'}), el('div',{class:'row'}, saveBtn, cancelBtn));
  openModal(content);
}

/* Bulk edit modal (calendar + bulk actions) */
function openBulkEdit(){
  const title = el('h3',{}, 'Bulk Edit Days');
  const info = el('div',{class:'small-muted'}, 'Select a type to apply to multiple days below.');
  const btnRow = el('div',{class:'row', style:'margin-top:10px'},
    el('button',{class:'btn', onClick:()=>applyBulk('workout')}, 'Set as Workout'),
    el('button',{class:'btn', onClick:()=>applyBulk('soccer')}, 'Set as Soccer'),
    el('button',{class:'btn', onClick:()=>applyBulk('rest')}, 'Set as Rest'),
    el('button',{class:'btn', onClick:()=>closeModal()}, 'Close')
  );
  // simple checklist of days
  const list = el('div',{style:'margin-top:12px;display:flex;flex-direction:column;gap:8px'});
  DATA.days.forEach(d=>{
    const chk = el('input',{type:'checkbox', id:'bulk_'+d.id});
    const row = el('div',{style:'display:flex;align-items:center;gap:8px'}, chk, el('div',{}, d.name));
    list.appendChild(row);
  });
  const content = el('div',{}, title, info, list, btnRow);
  openModal(content);
}
function applyBulk(type){
  DATA.days.forEach(d=>{
    const chk = document.getElementById('bulk_'+d.id);
    if(chk && chk.checked){
      d.type = type;
      if(type !== 'soccer') d.allowWorkoutOnSoccer = false;
    }
  });
  saveData();
  closeModal();
  renderAll();
}

/* =========================
   Exercise library sheet
   ========================= */
function openSheet(){
  sheetOverlay.classList.add('open');
  sheetSearch.value = '';
  renderSheetList();
}
function closeSheet(){
  sheetOverlay.classList.remove('open');
}
function filterSheet(){
  renderSheetList();
}
function renderSheetList(){
  sheetList.innerHTML = '';
  const q = (sheetSearch.value || '').trim().toLowerCase();
  EXERCISES.forEach((ex, idx) => {
    if(q && !(ex.name.toLowerCase().includes(q) || (ex.cues||'').toLowerCase().includes(q))) return;
    const item = el('div',{class:'sheet-item'},
      el('div',{}, el('div',{class:'ex-nm'}, ex.name), el('div',{class:'ex-cue'}, ex.cues || '')),
      el('div',{style:'display:flex;gap:8px'},
        el('button',{class:'btn', onClick:()=>addExerciseToCurrentDay(ex)}, 'Add'),
        el('button',{class:'btn ghost', onClick:()=>previewExercise(ex)}, 'Preview')
      )
    );
    sheetList.appendChild(item);
  });
}
function addExerciseToCurrentDay(ex){
  const day = findDay(currentDayId);
  if(!day) return alert('Select a day first.');
  day.exercises.push({ id: uid('ex'), name: ex.name + (ex.sets ? ' ' + ex.sets + 'x' + ex.reps : ''), meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || '' });
  saveData();
  renderAll();
  closeSheet();
}
function previewExercise(ex){
  const title = el('h3',{}, ex.name);
  const cues = el('div',{class:'small-muted', style:'margin-top:8px'}, ex.cues || '');
  const meta = el('div',{style:'margin-top:8px'}, ex.sets ? `${ex.sets} x ${ex.reps} · rest ${ex.rest}` : (ex.meta || ''));
  const closeBtn = el('button',{class:'btn', onClick:()=>closeModal()}, 'Close');
  openModal(el('div',{}, title, meta, cues, el('div',{style:'height:10px'}), closeBtn));
}

/* =========================
   Calendar view
   ========================= */
function openCalendar(){
  const title = el('h3',{}, 'Calendar — Month View');
  const controls = el('div',{class:'cal-controls'},
    el('div',{}, ''),
    el('div',{}, el('button',{class:'btn', onClick:()=>closeCalendar()}, 'Close'))
  );
  const grid = el('div',{class:'calendar-grid'});
  // simple 7-day grid for the current week mapping to our 7 days
  DATA.days.forEach(d=>{
    const cell = el('div',{class:'cal-cell', onClick:()=>openDaySettings(d.id)},
      el('div',{class:'date'}, d.name),
      el('div',{class:'small-muted'}, `${d.exercises.length} exercises`),
      el('div',{class:'type'}, d.type)
    );
    grid.appendChild(cell);
  });
  const bulkBtn = el('div',{style:'margin-top:10px;display:flex;gap:8px;justify-content:flex-end'},
    el('button',{class:'btn', onClick:()=>openBulkEdit()}, 'Bulk Edit')
  );
  const content = el('div',{}, title, controls, grid, bulkBtn);
  calendarModalRoot.innerHTML = '';
  calendarModalRoot.classList.remove('hidden');
  const backdrop = el('div',{class:'modal-backdrop'});
  backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closeCalendar(); });
  const modal = el('div',{class:'modal'}, content);
  backdrop.appendChild(modal);
  calendarModalRoot.appendChild(backdrop);
  document.body.style.overflow = 'hidden';
}
function closeCalendar(){
  calendarModalRoot.innerHTML = '';
  calendarModalRoot.classList.add('hidden');
  document.body.style.overflow = '';
}

/* =========================
   History & stats
   ========================= */
function addHistorySnapshot(){
  const snapshot = {
    ts: Date.now(),
    stats: {...DATA.stats}
  };
  DATA.history = DATA.history || [];
  DATA.history.unshift(snapshot);
  if(DATA.history.length > 50) DATA.history.length = 50;
  saveData();
  renderHistory();
}
function renderHistory(){
  const root = document.getElementById('history');
  root.innerHTML = '';
  if(!DATA.history || DATA.history.length === 0){
    root.textContent = 'No entries yet';
    return;
  }
  DATA.history.slice(0,6).forEach(h=>{
    const d = new Date(h.ts);
    const card = el('div',{class:'hist-card'},
      el('div',{class:'hist-inner'},
        el('div',{style:'display:flex;justify-content:space-between;align-items:center'},
          el('div',{}, d.toLocaleString()),
          el('div',{}, `${h.stats.weight}kg · ${h.stats.bodyfat}%`)
        )
      )
    );
    root.appendChild(card);
  });
}

/* =========================
   Utilities & actions
   ========================= */
function renderAll(){
  renderWeek();
  renderWorkout();
  renderHistory();
  renderSheetList();
  updateCounters();
  // reflect global toggle UI
  if(GLOBAL_ALLOW_SOCCER_WORKOUTS){
    globalToggle.classList.add('on');
    globalToggle.setAttribute('aria-checked','true');
  } else {
    globalToggle.classList.remove('on');
    globalToggle.setAttribute('aria-checked','false');
  }
}

/* =========================
   Event wiring
   ========================= */
sheetOpenBtn.addEventListener('click', openSheet);
document.getElementById('sheet-close').addEventListener('click', closeSheet);
searchInput.addEventListener('input', renderWorkout);
document.getElementById('themeToggle').addEventListener('click', ()=>{
  document.documentElement.classList.toggle('light');
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('Reset all data to defaults?')) return;
  localStorage.removeItem('fi_data');
  DATA = structuredClone(DEFAULT_DATA);
  ensureDayFields();
  saveData();
  renderAll();
});
document.getElementById('newWorkout').addEventListener('click', ()=>{
  const name = prompt('New workout name (day will get a single exercise placeholder):');
  if(!name) return;
  const day = findDay(currentDayId);
  if(!day) return;
  day.exercises.push({id:uid('ex'), name: name, meta: ''});
  saveData();
  renderAll();
});
document.getElementById('shuffleDay').addEventListener('click', ()=>{
  const day = findDay(currentDayId);
  if(!day) return;
  // simple shuffle: pick 3 random from pool
  const picks = [];
  const pool = EXERCISES.slice();
  while(picks.length < 3 && pool.length){
    const i = Math.floor(Math.random()*pool.length);
    const ex = pool.splice(i,1)[0];
    picks.push({id:uid('ex'), name: ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || ''});
  }
  day.exercises = picks;
  saveData();
  renderAll();
});
document.getElementById('startWorkout').addEventListener('click', ()=>{
  alert('Start workout — timer and tracking coming soon.');
});
openCalendarBtn.addEventListener('click', openCalendar);
addHistoryBtn.addEventListener('click', addHistorySnapshot);

/* Global toggle */
globalToggle.addEventListener('click', ()=>{
  GLOBAL_ALLOW_SOCCER_WORKOUTS = !GLOBAL_ALLOW_SOCCER_WORKOUTS;
  localStorage.setItem('fi_global_allow', JSON.stringify(GLOBAL_ALLOW_SOCCER_WORKOUTS));
  renderAll();
});

/* Modal close helper */
function closeModalRoot(){
  closeModal();
}

/* =========================
   Ensure defaults and initial render
   ========================= */
ensureDayFields();
renderAll();
updateCounters();
renderHistory();
renderSheetList();

/* Expose some functions for console debugging (optional) */
window.FI = {
  DATA, EXERCISES, saveData, renderAll, openDaySettings, openSheet, openCalendar
};
</script>
