</head>

  ${complete?'&#10003; Log Session':`Log Session (${totalDone}/${totalSets})`}</button></div>`;
}
function toggleSet(ei,si){const k=ei+'-'+si;completedSets[k]=!completedSets[k];renderActiveWorkout();}
function addSet(ei){extraSets[ei]=(extraSets[ei]||0)+1;renderActiveWorkout();}
function rmSet(ei){extraSets[ei]=Math.max(0,(extraSets[ei]||0)-1);renderActiveWorkout();}
function setWeight(ei,v){weights[ei]=v;}
function finishWorkout(){const totalSets=activeWorkout.exercises.reduce((a,e,i)=>a+e.sets+(extraSets[i]||0),0),totalDone=Object.values(completedSets).filter(Boolean).length,dateKey=getDateKey(activeDay-new Date().getDay());if(!store.log)store.log={};store.log[dateKey]={exercises:activeWorkout.exercises,themeIdx:activeWorkout.tIdx,theme:THEMES[activeWorkout.tIdx].label,date:dateKey,sets:completedSets,weights,pct:totalSets?Math.round(totalDone/totalSets*100):0};saveStore();activeWorkout=null;showView('schedule');}
function getAllExercises(){const seen=new Set();return EXERCISES.filter(e=>{if(seen.has(e.name))return false;seen.add(e.name);return true;}).sort((a,b)=>a.name.localeCompare(b.name));}
function openPlanSwap(exIdx){swapExIdx=exIdx;sheetMode='plan';sheetAllItems=getAllExercises();document.getElementById('sheet-title').textContent='Swap Exercise';document.getElementById('sheet-sub').textContent='ALL EXERCISES · A-Z';document.getElementById('sheet-search').value='';filterSheet();document.getElementById('overlay').classList.add('open');}
function openSwap(exIdx){swapExIdx=exIdx;sheetMode='swap';sheetAllItems=getAllExercises();document.getElementById('sheet-title').textContent='Swap Exercise';document.getElementById('sheet-sub').textContent='ALL EXERCISES · A-Z';document.getElementById('sheet-search').value='';filterSheet();document.getElementById('overlay').classList.add('open');}
function openAddSheet(){sheetMode='add';sheetAllItems=getAllExercises();document.getElementById('sheet-title').textContent='Add Exercise';document.getElementById('sheet-sub').textContent='FULL LIBRARY · A-Z';document.getElementById('sheet-search').value='';filterSheet();document.getElementById('overlay').classList.add('open');}
function filterSheet(){
  const q=document.getElementById('sheet-search').value.toLowerCase(),filtered=sheetAllItems.filter(e=>e.name.toLowerCase().includes(q)),theme=THEMES[activeWorkout?activeWorkout.tIdx:themeIdx];
  const currentNames=sheetMode==='add'?(activeWorkout?activeWorkout.exercises.map(e=>e.name):[]):(sheetMode==='plan'?(getOrGenWorkout().exercises.map(e=>e.name)):(activeWorkout?activeWorkout.exercises.map(e=>e.name):[]));
  const currentEx=sheetMode==='plan'?getOrGenWorkout().exercises[swapExIdx]:(activeWorkout?activeWorkout.exercises[swapExIdx]:null);
  document.getElementById('sheet-list').innerHTML=filtered.map(ex=>{const tc=TAG_COLORS[ex.tag]||'#6b7280',isCurrent=currentEx&&currentEx.name===ex.name,isIn=sheetMode==='add'&&currentNames.includes(ex.name);return`<div class="sheet-item ${isCurrent?'current':''}" style="opacity:${isIn&&!isCurrent?0.3:1}" onclick="${isIn&&!isCurrent?'':'selectSheetItem('+JSON.stringify(ex.name)+')'}"><div><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><div class="ex-nm">${ex.name}</div>${isCurrent?`<span style="font-size:9px;color:${theme.color};border:1px solid ${theme.color}44;padding:1px 6px;border-radius:10px">current</span>`:''}</div><div class="ex-cue">${ex.cues.slice(0,55)}...</div></div><div class="ex-meta"><span class="tag-pill" style="color:${tc};background:${tc}22;border-color:${tc}44">${ex.tag}</span><span style="font-size:10px;color:rgba(255,255,255,0.25)">${ex.reps} reps</span></div></div>`;}).join('');
}
function selectSheetItem(name){const ex=EXERCISES.find(e=>e.name===name);if(!ex)return;if(sheetMode==='add'){activeWorkout.exercises.push({...ex});closeSheet();renderActiveWorkout();}else if(sheetMode==='swap'&&activeWorkout){activeWorkout.exercises[swapExIdx]={...ex,sets:activeWorkout.exercises[swapExIdx].sets};closeSheet();renderActiveWorkout();}else if(sheetMode==='plan'){const dateKey=getDateKey(activeDay-new Date().getDay()),w=store.workouts&&store.workouts[dateKey];if(w){w.exercises[swapExIdx]={...ex,sets:w.exercises[swapExIdx].sets};saveStore();}closeSheet();renderSchedule();}}
function closeSheet(){document.getElementById('overlay').classList.remove('open');document.getElementById('sheet-search').value='';}
function renderHistory(){
  const entries=Object.entries(store.log||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  let html=`<div class="fadeUp"><div style="font-size:26px;font-weight:800;margin-bottom:4px">Session Log</div><div style="font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:2px;margin-bottom:20px">${entries.length} SESSIONS RECORDED</div>`;
  if(!entries.length){html+=`<div style="text-align:center;padding:50px 0;color:rgba(255,255,255,0.15)"><div style="font-size:32px;margin-bottom:10px">&#128203;</div><div>No sessions yet.</div></div>`;}
  else{entries.forEach(([date,entry])=>{const t=THEMES[entry.themeIdx||0],pct=entry.pct||0;html+=`<div class="hist-card" style="border-color:${t.color}"><div class="hist-inner"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-size:13px;font-weight:600;color:${t.color}">${t.emoji} ${entry.theme||t.label}</div><div style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:3px">${date}</div></div><div style="font-size:24px;font-weight:800;color:${pct===100?'#4ade80':'rgba(255,255,255,0.3)'}">${pct}%</div></div><div class="prog-bar" style="margin-bottom:8px"><div class="prog-fill" style="width:${pct}%;background:${pct===100?'#4ade80':t.color}"></div></div>${(entry.exercises||[]).map((ex,i)=>`<div class="hist-ex"><span>${ex.name}</span>${entry.weights&&entry.weights[i]?`<span style="color:${t.color}">${entry.weights[i]}</span>`:''}</div>`).join('')}</div></div>`;});}
  html+=`</div>`;document.getElementById('view-history').innerHTML=html;
}
function renderStats(){
  const theme=THEMES[themeIdx];
  document.getElementById('view-stats').innerHTML=`<div class="fadeUp"><div style="font-size:26px;font-weight:800;margin-bottom:4px">Body Stats</div><div style="font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:2px;margin-bottom:20px">LATEST SCAN - ATHLETE MODE</div><div class="card"><div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px"><span>Body Fat %</span><span>Target: ${USER_STATS.targetBf}%</span></div><div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px"><span style="font-size:40px;font-weight:800;color:#f87171;letter-spacing:-1px">${USER_STATS.bf}%</span><span style="font-size:16px;color:rgba(255,255,255,0.2)">&rarr;</span><span style="font-size:28px;font-weight:700;color:#4ade80">${USER_STATS.targetBf}%</span><span style="font-size:12px;color:#fb923c;margin-left:auto">~${(USER_STATS.weight*(USER_STATS.bf-USER_STATS.targetBf)/100).toFixed(1)}kg to go</span></div><div class="prog-bar" style="height:6px"><div class="prog-fill" style="width:${(USER_STATS.targetBf/USER_STATS.bf*100).toFixed(1)}%;background:linear-gradient(90deg,#4ade80,#f87171)"></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${[["Weight",USER_STATS.weight+" kg","#60a5fa"],["Muscle Mass",USER_STATS.muscleMass+" kg","#4ade80"],["BMR",USER_STATS.bmr+" kcal","#f59e0b"],["Skeletal Muscle",USER_STATS.skeletalMuscle+"%","#a78bfa"],["Visceral Fat",USER_STATS.visceralFat,"#f87171"],["Protein",USER_STATS.protein+"%","#34d399"]].map(([l,v,c])=>`<div class="card" style="margin:0;padding:14px 16px"><div style="font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:2px;margin-bottom:6px">${l.toUpperCase()}</div><div style="font-size:22px;font-weight:700;color:${c}">${v}</div></div>`).join('')}</div><div class="card"><div style="font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:3px;margin-bottom:14px">RECOMMENDATIONS FOR 12% BF</div>${[["&#127947;","Prioritise Strength & Power themes - preserve muscle while in deficit"],["&#128293;","200-300 kcal deficit on rest days only, maintenance on training days"],["&#129385;","Keep protein at ~165g/day (2g/kg bodyweight) to protect muscle mass"],["&#9889;","Hip hinge focus: Deadlifts, RDLs, Hip Thrusts - targets visceral fat best"]].map(([icon,text],i)=>`<div style="display:flex;gap:12px;padding:10px 0;border-bottom:${i<3?'1px solid rgba(255,255,255,0.05)':'none'}"><span style="font-size:16px">${icon}</span><span style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6">${text}</span></div>`).join('')}</div><div style="height:40px"></div></div>`;
}
setTheme(THEMES[0].color);
renderSchedule();
</script>
</body>
</html>
