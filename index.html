<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Field+Iron — WOD</title>
<style>
/* =========================
   Theme variables (swappable)
   ========================= */
:root{
  --bg-1: #071018;
  --bg-2: #081827;
  --card: linear-gradient(180deg,#0f1724,#0b1220);
  --muted: rgba(255,255,255,0.78);
  --muted-2: rgba(255,255,255,0.55);
  --accent: #ff8a00;
  --accent-2: #00c2a8;
  --glass: rgba(255,255,255,0.03);
  --radius: 14px;
  --shadow: 0 12px 36px rgba(2,6,23,0.6);
  --card-border: rgba(255,255,255,0.04);
  --text: #ffffff;
  --muted-3: rgba(255,255,255,0.35);
  --success: #22c55e;
}

/* Calm */
[data-theme="calm"]{ --bg-1:#0b0f14; --bg-2:#0e1418; --card:linear-gradient(180deg,#0f1720,#0c1316); --accent:#6ea8fe; --accent-2:#7dd3fc; --text:#eaf6ff; --muted-3:rgba(230,240,250,0.4); }

/* Sporty */
[data-theme="sporty"]{ --accent:#ff5a00; --accent-2:#a3e635; }

/* Minimal */
[data-theme="minimal"]{ --bg-1:#f7f8fa; --bg-2:#f2f4f6; --card:linear-gradient(180deg,#ffffff,#fbfcfd); --accent:#0ea5a4; --accent-2:#7c3aed; --text:#0b1220; --muted-3:rgba(20,25,30,0.45); --shadow:0 8px 24px rgba(10,10,10,0.06); }

/* Neon */
[data-theme="neon"]{ --accent:#7c5cff; --accent-2:#06b6d4; --bg-1:#02020a; --bg-2:#030318; --text:#eaf6ff; }

/* =========================
   Base layout & typography
   ========================= */
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg-1),var(--bg-2));color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial}
.app{flex:1;display:flex;flex-direction:column;max-width:980px;margin:0 auto;width:100%}

/* Header */
.header{
  position:sticky;top:0;z-index:60;
  display:flex;align-items:center;gap:12px;padding:10px 14px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);
  border-bottom:1px solid var(--card-border);backdrop-filter:blur(8px)
}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#071018;box-shadow:0 8px 28px rgba(0,0,0,0.35)}
.title{font-weight:800;font-size:16px;color:var(--text)}
.header-controls{margin-left:auto;display:flex;gap:8px;align-items:center}

/* Main area scrolls independently (iPhone friendly) */
.main{overflow:auto;flex:1;padding:12px;-webkit-overflow-scrolling:touch;min-height:0}

/* Grid */
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:900px){.grid{grid-template-columns:320px 1fr}}

/* Cards */
.card{background:var(--card);padding:14px;border-radius:var(--radius);border:1px solid var(--card-border);box-shadow:var(--shadow)}
.small-muted{font-size:12px;color:var(--muted-3)}
.kv{font-size:12px;color:var(--muted-2)}

/* Week strip */
.week{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.day{flex:1;min-width:56px;background:var(--glass);padding:12px;border-radius:12px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.03);position:relative;transition:transform .18s,box-shadow .18s}
.day.active{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));transform:translateY(-6px);box-shadow:0 14px 40px rgba(0,0,0,0.5)}
.day .d{font-weight:800}
.day .sub{font-size:12px;color:var(--muted-3)}
.day-badge{display:inline-block;font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,0.02);color:var(--muted-2);margin-top:8px}
.day-badge.auto{background:linear-gradient(90deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);font-weight:700}

/* Workout list */
.workout{display:flex;flex-direction:column;gap:12px}
.exercise{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.005));border:1px solid rgba(255,255,255,0.02)}
.exercise .meta{flex:1}
.exercise .name{font-weight:800}
.exercise .sub{font-size:13px;color:var(--muted-3)}
.actions{display:flex;gap:8px}

/* Stretch */
.stretch{margin-top:8px;padding:12px;border-radius:12px;background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.02)}
.stretch h4{margin:0 0 8px 0;font-size:14px}

/* Buttons */
.btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:12px 14px;border-radius:14px;color:var(--text);cursor:pointer;font-size:15px}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;color:#071018;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,0.25)}
.btn.ghost{border-style:dashed}

/* Sheet overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:120;display:none;align-items:flex-end}
#overlay.open{display:flex}
#sheet{background:linear-gradient(180deg,#0f1418,#0b0f12);border-radius:16px 16px 0 0;width:100%;max-height:82vh;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.06)}
#sheet-list{overflow:auto;padding-bottom:20px}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:140}
.modal{width:94%;max-width:720px;background:var(--card);padding:14px;border-radius:12px;border:1px solid var(--card-border)}

/* Calendar */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-cell{background:rgba(255,255,255,0.02);padding:10px;border-radius:10px;min-height:80px;border:1px solid rgba(255,255,255,0.02);cursor:pointer}

/* Toast / undo */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:rgba(0,0,0,0.8);color:#fff;padding:12px 16px;border-radius:12px;z-index:200;display:flex;gap:12px;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
.toast button{padding:8px 10px;border-radius:8px}

/* small helpers */
.hidden{display:none!important}
.counter{font-size:12px;padding:6px 8px;border-radius:999px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.02);margin-left:8px}
.tag{font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);margin-left:6px}
.row{display:flex;gap:8px;align-items:center}
.footer{position:sticky;bottom:0;padding:12px;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.35));display:flex;justify-content:center;gap:8px}
.select{padding:8px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text)}
.input{padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text);width:100%}
.small-note{font-size:12px;color:var(--muted-3)}
</style>
</head>
<body>
<div class="app" id="appRoot" data-theme="lively">
  <header class="header">
    <div class="brand">
      <div class="logo">FI</div>

  <main class="main" id="mainRoot">
    <div class="grid">

      <section class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">

          <div class="row">

        <div id="weekDays" class="week"></div>

        <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">

        <div style="margin-top:12px">

            <button id="addHistory" class="btn ghost">Snapshot</button>

        </div>
      </section>

      <!-- Right column -->
      <section>
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="small-muted">Today</div>
              <div id="currentDayTitle" style="font-weight:800;font-size:18px">Monday</div>
            </div>
            <div style="display:flex;gap:8px">
              <button id="shuffleDay" class="btn">Shuffle</button>
              <button id="startWorkout" class="btn primary">Start</button>
            </div>
          </div>
          <div id="dayDescription" class="small-muted" style="margin-top:8px">Tap a day to view its workout.</div>
        </div>

        <div id="workoutList" class="card workout">
          <!-- exercises injected here -->
        </div>
      </section>
    </div>
  </main>

  <div class="footer">
    <button id="newWorkout" class="btn primary">New Workout</button>
    <button id="openSheetBtn" class="btn">Library</button>
  </div>
</div>

<!-- Sheet overlay -->
<div id="overlay" onclick="closeSheet()">
  <div id="sheet" onclick="event.stopPropagation()" style="width:100%">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)">
      <div>
        <div style="font-weight:700">Exercises</div>
        <div class="small-muted">Library · Filter by theme or tag</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="sheetThemeFilter" class="select" style="min-width:120px">
          <option value="">All themes</option>
          <option value="Power">Power</option>
          <option value="Strength">Strength</option>
          <option value="Hypertrophy">Hypertrophy</option>
          <option value="Mix">Mix</option>
          <option value="Stretch">Stretch</option>
        </select>
        <button id="sheet-close" class="btn">✕</button>
      </div>
    </div>

    <div style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03)">
      <input id="sheet-search" placeholder="Search library..." class="input" />
      <div id="sheet-loading" class="small-note" style="display:none;margin-top:8px">Loading…</div>
    </div>

    <div id="sheet-list" style="padding:8px 0;overflow:auto;max-height:60vh"></div>
  </div>
</div>

<!-- Calendar modal root -->
<div id="calendarModalRoot" class="hidden"></div>

<!-- Modal root -->
<div id="modalRoot" class="hidden"></div>

<!-- Toast / Undo -->
<div id="toastRoot" style="display:none"></div>

function loadData(){
  try{
    const raw = localStorage.getItem('fi_data');
    if(!raw) return structuredClone(DEFAULT_DATA);
    return JSON.parse(raw);
  }catch(e){
    console.error('load error', e);
    return structuredClone(DEFAULT_DATA);
  }
}
function saveData(){
  try{

function uid(prefix='id'){return prefix + Math.random().toString(36).slice(2,9)}
function el(tag, props={}, ...children){
  const node = document.createElement(tag);
  for(const k in props){
    if(k.startsWith('on') && typeof props[k] === 'function') node.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if(k === 'html') node.innerHTML = props[k];
    else node.setAttribute(k, props[k]);
  }
  children.flat().forEach(c => {
    if(c == null) return;
    node.append(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}
function findDay(id){ return DATA.days.find(d=>d.id===id) }

/* =========================
   Ensure day fields and auto-fill defaults
   ========================= */
function ensureDayFields(){
  DATA.days.forEach(d=>{
    if(!('type' in d)) d.type = 'workout';
    if(!('theme' in d)) d.theme = 'Mix';
    if(!('allowWorkoutOnSoccer' in d)) d.allowWorkoutOnSoccer = false;
    if(!Array.isArray(d.exercises)) d.exercises = [];
    if(!Array.isArray(d.stretches)) d.stretches = DEFAULT_STRETCHES.slice();
    if(!('userEdited' in d)) d.userEdited = false;
    if(!('_autoFilled' in d)) d._autoFilled = false;
    if(!('_locked' in d)) d._locked = false;
  });

  // Auto-fill logic
  DATA.days.forEach(d=>{
    if(d.type === 'workout' && !d.userEdited && !d._autoFilled){
      if((d.exercises?.length || 0) < DEFAULT_EX_COUNT_CURRENT){
        const pool = EXERCISES.filter(e => !e.theme || e.theme === d.theme || d.theme === 'Mix');
        const picks = [];
        const copy = pool.slice();
        while(picks.length < DEFAULT_EX_COUNT_CURRENT && copy.length){
          const i = Math.floor(Math.random()*copy.length);
          const ex = copy.splice(i,1)[0];
          picks.push({id:uid('ex'), name:ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || ''});
        }
        const fallback = EXERCISES.slice();
        while(picks.length < DEFAULT_EX_COUNT_CURRENT && fallback.length){
          const i = Math.floor(Math.random()*fallback.length);
          const ex = fallback.splice(i,1)[0];
          if(!picks.find(p=>p.name===ex.name)) picks.push({id:uid('ex'), name:ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || ''});
        }
        const existing = d.exercises || [];
        const final = existing.slice();
        picks.forEach(p=>{
          if(final.length < DEFAULT_EX_COUNT_CURRENT && !final.find(f=>f.name === p.name)) final.push(p);
        });
        d.exercises = final;
        d._autoFilled = true;
      }
    }
  });

  saveData();
}

   Rendering & UI
   ========================= */
function updateCounters(){
  cntPool.textContent = EXERCISES.length;
}
function renderWeek(){
  weekRoot.innerHTML = '';
  DATA.days.forEach(d=>{
    const isActive = d.id === currentDayId;
    const dayEl = el('div',{class:isActive ? 'day active' : 'day'},
      el('div',{}, el('div',{class:'d'}, d.name.slice(0,3)), el('div',{class:'sub'}, `${d.exercises.length} ex`))
    );
    const badgeText = d.type === 'soccer' ? '⚽ Soccer' : (d.type === 'rest' ? '— Rest' : d.theme || 'Workout');
    const badge = el('div',{class:'day-badge'}, badgeText);
    dayEl.appendChild(badge);
    if(d._autoFilled && !d.userEdited){
      const autoBadge = el('div',{class:'day-badge auto', title:'Auto-filled'}, 'Auto');
      dayEl.appendChild(autoBadge);
    }
    // lock icon for auto-filled days
    if(d._locked){
      const lock = el('div',{class:'day-badge', title:'Locked (won’t auto-change)'}, '🔒');
      dayEl.appendChild(lock);
    }
    const editBtn = el('div',{class:'day-edit-btn', onClick:(e)=>{ e.stopPropagation(); openDaySettings(d.id); }}, 'Edit');
    dayEl.appendChild(editBtn);
    dayEl.addEventListener('click', ()=>{ currentDayId = d.id; renderAll(); });
    weekRoot.appendChild(dayEl);
  });
}

function renderWorkout(){
  workoutList.innerHTML = '';
  const day = findDay(currentDayId);
  if(!day) return;
  currentDayTitle.textContent = day.name;
  currentThemeTag.textContent = day.theme || '—';
  dayDescription.textContent = `${day.exercises.length} exercises · ${day.type.toUpperCase()}`;

  const effectiveAllow = GLOBAL_ALLOW_SOCCER_WORKOUTS || day.allowWorkoutOnSoccer;
  if(day.type === 'soccer' && !effectiveAllow){
    workoutList.appendChild(el('div',{class:'card'}, el('div',{class:'small-muted'}, 'This is a Soccer day. Workouts are hidden by default.'), el('div',{style:'height:8px'}), el('div',{style:'display:flex;gap:8px;justify-content:center'},
      el('button',{class:'btn primary', onClick:()=>{
        day.allowWorkoutOnSoccer = true; saveData(); renderAll();
      }}, 'Allow Workout Today'),
      el('button',{class:'btn', onClick:()=>openDaySettings(day.id)}, 'Edit Day')
    )));
    return;
  }

  if(day.exercises.length === 0){
    workoutList.appendChild(el('div',{class:'card'}, el('div',{class:'small-muted'}, 'No exercises yet. Use Library to add or press Shuffle to auto-fill.')));
  }

  day.exercises.forEach((ex, idx)=>{
    const exEl = el('div',{class:'exercise'},
      el('div',{class:'meta'},
        el('div',{class:'name'}, ex.name),
        el('div',{class:'sub'}, ex.meta || '')
      ),
      el('div',{class:'actions'},
        el('button',{class:'btn', onClick:()=>openEditModal(day.id, idx)}, 'Edit'),
        el('button',{class:'btn', onClick:()=>openReplaceModal(day.id, idx)}, 'Replace'),
        el('button',{class:'btn', onClick:()=>removeExercise(day.id, idx)}, 'Remove')
      )
    );
    workoutList.appendChild(exEl);
  });

  if(day.exercises.length < DEFAULT_EX_COUNT_CURRENT){
    workoutList.appendChild(el('div',{style:'margin-top:8px;display:flex;gap:8px;justify-content:center'},
      el('button',{class:'btn', onClick:()=>shuffleDay(day.id)}, `Auto-fill to ${DEFAULT_EX_COUNT_CURRENT}`),
      el('button',{class:'btn ghost', onClick:()=>openSheet()}, 'Open Library')
    ));
  }

  const stretches = day.stretches || DEFAULT_STRETCHES;
  const stretchEl = el('div',{class:'stretch'},
    el('h4',{}, 'Stretch / Cooldown'),
    ...stretches.map(s => el('div',{}, el('strong',{}, s.name), ' · ', el('span',{class:'small-muted'}, s.meta || '')))
  );
  const stretchActions = el('div',{style:'display:flex;gap:8px;margin-top:8px'},
    el('button',{class:'btn', onClick:()=>openEditStretches(day.id)}, 'Edit Stretches'),
    el('button',{class:'btn ghost', onClick:()=>addDefaultStretches(day.id)}, 'Add Defaults'),
    el('button',{class:'btn ghost', onClick:()=>toggleLockDay(day.id)}, day._locked ? 'Unlock' : 'Lock Auto')
  );
  workoutList.appendChild(stretchEl);
  workoutList.appendChild(stretchActions);
}

/* =========================
   Replace / Edit / Remove logic + undo
   ========================= */
function replaceExercise(dayId, index, newExercise){
  const day = findDay(dayId);
  if(!day) return;
  if(index < 0 || index >= day.exercises.length) return;
  const ex = { id: newExercise.id || uid('ex'), name: (newExercise.name||'Unnamed').trim(), meta: (newExercise.meta||'').trim() };
  day.exercises.splice(index,1,ex);
  day.userEdited = true;
  saveData(); renderAll();
}
function editExercise(dayId, index, updates){
  const day = findDay(dayId);
  if(!day) return;
  if(index < 0 || index >= day.exercises.length) return;
  const ex = day.exercises[index];
  ex.name = (updates.name || ex.name).trim();
  ex.meta = (updates.meta || ex.meta || '').trim();
  day.userEdited = true;
  saveData(); renderAll();
}
function removeExercise(dayId, index){
  const day = findDay(dayId);
  if(!day) return;
  if(index < 0 || index >= day.exercises.length) return;
  // store for undo
  lastRemoved = { dayId, index, item: structuredClone(day.exercises[index]), ts: Date.now() };
  day.exercises.splice(index,1);
  day.userEdited = true;
  saveData(); renderAll();
  showToast('Exercise removed', 'Undo', ()=>undoRemove());
}
function undoRemove(){
  if(!lastRemoved) return;
  const { dayId, index, item } = lastRemoved;
  const day = findDay(dayId);
  if(!day) return;
  day.exercises.splice(index,0,item);
  day.userEdited = true;
  saveData(); renderAll();
  lastRemoved = null;
  hideToast();
}

/* =========================
   Exercise library sheet (chunked render + debounce)
   ========================= */
function openSheet(){
  sheetOverlay.classList.add('open');
  document.getElementById('sheet-search').value = '';
  sheetThemeFilter.value = '';
  sheetRenderIndex = 0;
  sheetList.innerHTML = '';
  renderSheetListChunked(true);
}
function closeSheet(){ sheetOverlay.classList.remove('open'); }
function renderSheetListChunked(reset=false){
  const q = (document.getElementById('sheet-search').value || '').trim().toLowerCase();
  const theme = sheetThemeFilter.value;
  const filtered = EXERCISES.filter(ex=>{
    if(theme && ex.theme !== theme) return false;
    if(q && !(ex.name.toLowerCase().includes(q) || (ex.cues||'').toLowerCase().includes(q))) return false;
    return true;
  });
  // show loading if large
  const loading = document.getElementById('sheet-loading');
  if(filtered.length > 80) loading.style.display = 'block';
  else loading.style.display = 'none';

  if(reset){
    sheetList.innerHTML = '';
    sheetRenderIndex = 0;
  }
  // render chunk
  const start = sheetRenderIndex;
  const end = Math.min(filtered.length, start + sheetRenderChunk);
  for(let i=start;i<end;i++){
    const ex = filtered[i];
    const item = el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.02)'},
      el('div',{}, el('div',{style:'font-weight:700'}, ex.name), el('div',{class:'small-muted'}, ex.cues || `${ex.sets || ''} ${ex.reps || ''}`)),
      el('div',{}, el('button',{class:'btn', onClick:()=>addExerciseToCurrentDay(ex)}, 'Add'))
    );
    sheetList.appendChild(item);
  }
  sheetRenderIndex = end;
  if(sheetRenderIndex < filtered.length){
    // schedule next chunk
    clearTimeout(sheetRenderTimer);
    sheetRenderTimer = setTimeout(()=>renderSheetListChunked(false), 80);
  } else {
    loading.style.display = 'none';
  }
}
function renderSheetList(){
  // debounce
  clearTimeout(sheetSearchTimer);
  sheetSearchTimer = setTimeout(()=>renderSheetListChunked(true), 220);
}
function addExerciseToCurrentDay(ex){
  const day = findDay(currentDayId);
  if(!day) return alert('Select a day first.');
  day.exercises.push({ id: uid('ex'), name: ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || '' });
  day.userEdited = true;
  saveData(); renderAll(); closeSheet();
}

/* Shuffle: fill day with DEFAULT_EX_COUNT_CURRENT random exercises matching theme if possible */
function shuffleDay(dayId){
  const day = findDay(dayId);
  if(!day) return;
  const pool = EXERCISES.filter(e => !e.theme || e.theme === day.theme || day.theme === 'Mix');
  const picks = [];
  const copy = pool.slice();
  while(picks.length < DEFAULT_EX_COUNT_CURRENT && copy.length){
    const i = Math.floor(Math.random()*copy.length);
    const ex = copy.splice(i,1)[0];
    picks.push({id:uid('ex'), name:ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || ''});
  }
  const fallback = EXERCISES.slice();
  while(picks.length < DEFAULT_EX_COUNT_CURRENT && fallback.length){
    const i = Math.floor(Math.random()*fallback.length);
    const ex = fallback.splice(i,1)[0];
    if(!picks.find(p=>p.name===ex.name)) picks.push({id:uid('ex'), name:ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || ''});
  }
  day.exercises = picks;
  day.userEdited = true;
  saveData(); renderAll();
}

/* New workout: create placeholder with DEFAULT_EX_COUNT_CURRENT random picks */
function newWorkoutForDay(dayId, name){
  const day = findDay(dayId);
  if(!day) return;
  const picks = [];
  const fallback = EXERCISES.slice();
  while(picks.length < DEFAULT_EX_COUNT_CURRENT && fallback.length){
    const i = Math.floor(Math.random()*fallback.length);
    const ex = fallback.splice(i,1)[0];
    picks.push({id:uid('ex'), name:ex.name, meta: ex.sets ? `${ex.sets} sets x ${ex.reps}` : ex.meta || ''});
  }
  day.exercises = picks;
  if(name) day.workoutName = name;
  day.userEdited = true;
  saveData(); renderAll();
}

/* =========================
