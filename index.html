<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Field+Iron — Overhauled (Themes Fixed)</title>
  <meta name="theme-color" content="#071018">
  <style>
    :root{
      --radius:12px;
      --max-width:1200px;
      --ui-transition:180ms cubic-bezier(.2,.9,.2,1);
      --glass: rgba(255,255,255,0.03);
      --glass-2: rgba(255,255,255,0.02);
      --muted: #9fb3c8;
      --text: #e6eef6;
      --accent: #ff6a00;
      --bg: linear-gradient(180deg,#071018 0%, #071827 100%);
      --card: rgba(255,255,255,0.02);
    }

    /* Presets */
    body[data-preset="dark"]{ --bg: linear-gradient(180deg,#071018,#071827); --text:#e6eef6; --muted:#9fb3c8; --accent:#ff6a00; }
    body[data-preset="sporty"]{ --bg: linear-gradient(180deg,#021b1b,#002f2f); --text:#e6fbf6; --muted:#bfeadf; --accent:#00d4a6; }
    body[data-preset="calm"]{ --bg: linear-gradient(180deg,#f3f7fb,#e9f1f6); --text:#0b1a24; --muted:#6b7f8f; --accent:#4f8cff; }
    body[data-preset="vibrant"]{ --bg: linear-gradient(180deg,#fff0f6,#fff7ed); --text:#2b2b2b; --muted:#6b3b6b; --accent:#ff4d6d; }
    body[data-preset="minimal"]{ --bg:#f7f7f7; --text:#111; --muted:#8a8a8a; --accent:#222; }
    body[data-preset="light"]{ --bg: linear-gradient(180deg,#f6f8fa,#eef6fb); --text:#0b1a24; --muted:#6b7f8f; --accent:#ff6a00; }
    body[data-preset="solar"]{ --bg: linear-gradient(180deg,#fff8e6,#fffdf6); --text:#2b2b2b; --muted:#6b4f1d; --accent:#d97706; }
    body[data-preset="hc"]{ --bg:#000; --text:#fff; --muted:#fff; --accent:#00ff7f; }

    /* Accents */
    body[data-accent="orange"]{ --accent:#ff6a00; }
    body[data-accent="teal"]{ --accent:#00d4a6; }
    body[data-accent="violet"]{ --accent:#8b5cf6; }
    body[data-accent="rose"]{ --accent:#fb7185; }
    body[data-accent="blue"]{ --accent:#3b82f6; }
    body[data-accent="lime"]{ --accent:#84cc16; }

    /* Base */
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;}
    body{background:var(--bg); color:var(--text); padding:18px; box-sizing:border-box; transition:background var(--ui-transition), color var(--ui-transition);}
    .wrap{max-width:var(--max-width);margin:0 auto;display:flex;flex-direction:column;gap:18px;min-height:100vh;}

    /* Header */
    header{display:flex;flex-direction:column;gap:12px;}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(90deg,var(--accent),rgba(255,255,255,0.06));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;cursor:pointer;}
    .title{display:flex;flex-direction:column;}
    .title h1{margin:0;font-size:18px;}
    .subtitle{margin:0;color:var(--muted);font-size:13px;}

    /* Theme controls */
    .theme-controls{display:flex;gap:10px;align-items:center;}
    .preset-select{appearance:none;padding:8px 12px;border-radius:10px;background:transparent;color:var(--text);cursor:pointer;border:1px solid transparent;}
    .accent-row{display:flex;gap:8px;align-items:center;}
    .accent-swatch{width:26px;height:26px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;}

    /* Layout */
    main{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start;}
    @media (max-width:980px){ main{grid-template-columns:1fr;} }

    /* Flatter panels (no heavy boxes) */
    .panel{background:var(--card);border-radius:10px;padding:14px; border: none; box-shadow: none; }
    .section-title{margin:0 0 8px 0;color:var(--muted);font-size:15px;}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .btn{border:none;padding:9px 12px;border-radius:10px;cursor:pointer;font-weight:700;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.02);}
    .btn-primary{background:linear-gradient(90deg,var(--accent),rgba(255,255,255,0.04));color:#fff;border:none;}
    .input{padding:9px 10px;border-radius:10px;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.02);}

    /* Lists */
    #workouts-list{display:flex;flex-direction:column;gap:8px;}
    .workout-item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.01);}
    .workout-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .muted{color:var(--muted);font-size:13px;}

    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
    .day-card{padding:10px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.01);min-height:80px;cursor:pointer;}

    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .switch{width:44px;height:24px;border-radius:999px;background:rgba(255,255,255,0.04);position:relative;cursor:pointer;display:inline-block;}
    .switch .knob{position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left var(--ui-transition);}
    .switch.on{background:linear-gradient(90deg,var(--accent),rgba(255,255,255,0.06));}
    .switch.on .knob{left:23px;}

    .hr{height:1px;background:var(--glass);margin:12px 0;border-radius:2px;}
    .empty{color:var(--muted);padding:12px 0;text-align:center;}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:28px;background:rgba(0,0,0,0.6);color:#fff;padding:10px 14px;border-radius:10px;display:none;z-index:9999;}
  </style>
</head>
<body data-preset="dark" data-accent="orange">
  <div class="wrap" id="app">
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="logo" id="logo">FI</div>
          <div class="title">
            <h1>Field+Iron</h1>
            <div class="subtitle">Daily & Weekly workouts — themes & settings</div>
          </div>
        </div>

        <div class="theme-controls">
          <select id="preset-select" class="preset-select" aria-label="Theme preset">
            <option value="dark">Dark</option>
            <option value="sporty">Sporty</option>
            <option value="calm">Calm</option>
            <option value="vibrant">Vibrant</option>
            <option value="minimal">Minimal</option>
            <option value="light">Light</option>
            <option value="solar">Solar</option>
            <option value="hc">High Contrast</option>
          </select>

          <div class="accent-row" aria-label="Accent colors">
            <div class="accent-swatch" data-accent="orange" style="background:linear-gradient(90deg,#ff6a00,#ff8a3d)"></div>
            <div class="accent-swatch" data-accent="teal" style="background:linear-gradient(90deg,#00d4a6,#00f0c1)"></div>
            <div class="accent-swatch" data-accent="violet" style="background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div>
            <div class="accent-swatch" data-accent="rose" style="background:linear-gradient(90deg,#fb7185,#fda4af)"></div>
            <div class="accent-swatch" data-accent="blue" style="background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div>
            <div class="accent-swatch" data-accent="lime" style="background:linear-gradient(90deg,#84cc16,#bef264)"></div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="panel" aria-labelledby="view-heading">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h2 id="view-heading" class="section-title">Planner</h2>
            <div class="muted" id="current-day-label">Loading…</div>
          </div>

          <div class="controls">
            <button id="view-daily" class="btn">Daily</button>
            <button id="view-weekly" class="btn">Weekly</button>
          </div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;margin-top:12px;">
          <div class="controls">
            <button id="prev" class="btn">◀</button>
            <button id="next" class="btn">▶</button>
            <button id="today-btn" class="btn">Today</button>
          </div>
          <div style="flex:1"></div>
          <div class="muted">Default exercises: <strong id="default-count-label">5</strong></div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;margin-top:12px;">
          <input id="quick-add" class="input" type="text" placeholder="Quick add (Enter)" />
          <button id="quick-add-btn" class="btn-primary btn">Add</button>
          <button id="templates-btn" class="btn">Templates</button>
        </div>

        <div class="hr"></div>

        <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
          <input id="filter" class="input" type="text" placeholder="Filter workouts" />
          <div style="flex:1"></div>
          <button id="export-json" class="btn">Export</button>
          <label for="import-file" class="btn" style="cursor:pointer;">Import</label>
          <input id="import-file" type="file" accept="application/json" style="display:none" />
        </div>

        <div id="daily-view">
          <div id="workouts-list"></div>
        </div>

        <div id="weekly-view" class="hidden">
          <div class="week-grid" id="week-grid"></div>
        </div>

        <div class="hr"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="controls">
            <button id="clear-all" class="btn">Clear Day</button>
            <button id="reset-defaults" class="btn">Reset Defaults</button>
            <button id="undo-btn" class="btn">Undo</button>
          </div>
          <div class="muted">Saved locally</div>
        </div>

        <div class="hr"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <strong>Session</strong>
            <div class="muted" id="session-status">Idle</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div id="session-timer" class="muted">00:00</div>
            <div class="controls">
              <button id="start-session" class="btn-primary btn">Start</button>
              <button id="pause-session" class="btn">Pause</button>
              <button id="stop-session" class="btn">Stop</button>
            </div>
          </div>
        </div>
      </section>

      <aside>
        <section class="panel">
          <h3 class="section-title">Settings</h3>
          <div class="settings-grid">
            <label class="muted">Show timezone <div id="show-timezone" class="switch"><div class="knob"></div></div></label>
            <label class="muted">Short weekday <div id="use-short-day" class="switch"><div class="knob"></div></div></label>
            <label class="muted">Enable offline <div id="enable-sw" class="switch"><div class="knob"></div></div></label>
            <label class="muted">Vibrate <div id="vibrate" class="switch"><div class="knob"></div></div></label>
          </div>

          <div class="hr"></div>

          <div style="display:flex;flex-direction:column;gap:8px;">
            <label class="muted">Default exercise count
              <input id="default-count" class="input" type="number" min="1" max="12" value="5" />
            </label>
            <label class="muted">Base exercises (comma separated)
              <textarea id="base-exercises" class="input" rows="3">Reverse Lunge — 4 sets × 8 ea, Kettlebell Farmer Carry — 4 sets × 50m, DB Bulgarian Split — 3 sets × 8 ea, Goblet Squat — 3 sets × 10, Push Up — 3 sets × 12</textarea>
            </label>
            <div style="display:flex;gap:8px;">
              <button id="save-settings" class="btn-primary btn">Save</button>
              <button id="reset-settings" class="btn">Reset</button>
            </div>
          </div>
        </section>

        <section class="panel" style="margin-top:12px;">
          <h3 class="section-title">Session Log</h3>
          <div id="session-log" class="empty">No sessions yet.</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:12px;">
            <button id="download-log" class="btn">Download Log</button>
            <button id="clear-log" class="btn">Clear Log</button>
            <div style="flex:1"></div>
            <span class="muted">Local only</span>
          </div>
        </section>

        <section class="panel" style="margin-top:12px;">
          <h3 class="section-title">Advanced</h3>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button id="unregister-sw" class="btn">Unregister Service Workers</button>
            <button id="debug-export-local" class="btn">Download local dump</button>
            <button id="download-recovery" class="btn">Download last deployed HTML</button>
            <button id="clear-storage" class="btn">Clear localStorage</button>
          </div>
        </section>
      </aside>
    </main>

    <footer style="display:flex;justify-content:space-between;align-items:center;">
      <small class="muted">Field+Iron • Local only</small>
      <div class="muted">v2.1</div>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
  (function(){
    'use strict';

    const STORAGE_BY_DATE = 'fieldiron.byDate.v2';
    const SETTINGS_KEY = 'fieldiron.settings.v8';
    const LOG_KEY = 'fieldiron.sessions.v1';
    const RECOVERY_KEY = 'fieldiron.recovery.lastDeployedHTML';
    const BACKUP_KEY = 'fieldiron.backups.v1';
    const UNDO_KEY = 'fieldiron.undo.v1';
    const BACKUP_INTERVAL = 1000 * 60 * 5;
    const MAX_UNDO = 30;

    const DEFAULTS = {
      defaultExerciseCount: 5,
      baseExercises: [
        'Reverse Lunge — 4 sets × 8 ea',
        'Kettlebell Farmer Carry — 4 sets × 50m',
        'DB Bulgarian Split — 3 sets × 8 ea',
        'Goblet Squat — 3 sets × 10',
        'Push Up — 3 sets × 12'
      ],
      dailyStretches: [
        'Kneeling Hip Flexor Stretch — 2 sets × 30s ea',
        'Standing Hamstring Stretch — 2 sets × 30s ea',
        'Child Pose Hold — 1 × 60s'
      ]
    };

    function nowISO(){ return new Date().toISOString(); }
    function todayISO(){ return new Date().toISOString().slice(0,10); }
    function dateAdd(dateISO, days){ const d = new Date(dateISO + 'T00:00:00'); d.setDate(d.getDate() + days); return d.toISOString().slice(0,10); }
    function showToast(msg, ms=2000){ const t = document.getElementById('toast'); t.textContent = msg; t.style.display='block'; clearTimeout(t._t); t._t = setTimeout(()=> t.style.display='none', ms); }
    function downloadFile(name, content, type='application/json'){ const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
    function safeParse(raw, fallback){ try{ return JSON.parse(raw); }catch(e){ return fallback; } }

    try {
      if (!sessionStorage.getItem('fieldiron.recovery.saved')) {
        try {
          const html = '<!doctype html>\\n' + document.documentElement.outerHTML;
          localStorage.setItem(RECOVERY_KEY, html);
          const hist = safeParse(localStorage.getItem(BACKUP_KEY), []);
          hist.unshift({ ts: nowISO(), note: 'auto-saved deployed HTML' });
          if(hist.length>20) hist.length = 20;
          localStorage.setItem(BACKUP_KEY, JSON.stringify(hist));
          sessionStorage.setItem('fieldiron.recovery.saved','1');
        } catch(e){ console.warn('Recovery helper failed', e); }
      }
    } catch(e){}

    function loadSettings(){
      try{
        const raw = localStorage.getItem(SETTINGS_KEY);
        if(!raw) return { showTimezone:true, useShortDay:false, enableSW:false, vibrate:true, preset:'dark', accent:'orange', view:'daily', selectedDate: todayISO(), defaultExerciseCount: DEFAULTS.defaultExerciseCount, baseExercises: DEFAULTS.baseExercises.slice() };
        return Object.assign({ showTimezone:true, useShortDay:false, enableSW:false, vibrate:true, preset:'dark', accent:'orange', view:'daily', selectedDate: todayISO(), defaultExerciseCount: DEFAULTS.defaultExerciseCount, baseExercises: DEFAULTS.baseExercises.slice() }, JSON.parse(raw));
      }catch(e){ return { showTimezone:true, useShortDay:false, enableSW:false, vibrate:true, preset:'dark', accent:'orange', view:'daily', selectedDate: todayISO(), defaultExerciseCount: DEFAULTS.defaultExerciseCount, baseExercises: DEFAULTS.baseExercises.slice() }; }
    }
    function saveSettings(s){ try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }catch(e){ console.warn('saveSettings', e); } }

    function loadAll(){ return safeParse(localStorage.getItem(STORAGE_BY_DATE), {}); }
    function saveAll(obj){ try{ localStorage.setItem(STORAGE_BY_DATE, JSON.stringify(obj)); }catch(e){ console.warn('saveAll', e); } }

    function ensureDate(dateISO){
      const all = loadAll();
      if(!Array.isArray(all[dateISO]) || all[dateISO].length===0){
        const s = loadSettings();
        const base = s.baseExercises && s.baseExercises.length ? s.baseExercises.slice() : DEFAULTS.baseExercises.slice();
        const pre = base.slice(0, s.defaultExerciseCount || DEFAULTS.defaultExerciseCount);
        all[dateISO] = pre.concat(DEFAULTS.dailyStretches);
        saveAll(all);
      }
      return all[dateISO];
    }

    function loadFor(dateISO){ const all = loadAll(); return all[dateISO] ? all[dateISO] : ensureDate(dateISO); }
    function saveFor(dateISO, list, pushUndo=true){
      if(pushUndo) pushUndoState(dateISO);
      const all = loadAll(); all[dateISO] = list; saveAll(all);
    }

    function pushUndoState(dateISO){
      try{
        const stack = safeParse(localStorage.getItem(UNDO_KEY), []);
        stack.unshift({ ts: nowISO(), date: dateISO, workouts: loadFor(dateISO) });
        if(stack.length > MAX_UNDO) stack.length = MAX_UNDO;
        localStorage.setItem(UNDO_KEY, JSON.stringify(stack));
      }catch(e){ console.warn('pushUndo', e); }
    }
    function undo(){
      try{
        const stack = safeParse(localStorage.getItem(UNDO_KEY), []);
        if(!stack.length){ showToast('Nothing to undo'); return; }
        const snap = stack.shift();
        localStorage.setItem(UNDO_KEY, JSON.stringify(stack));
        const all = loadAll(); all[snap.date] = snap.workouts; localStorage.setItem(STORAGE_BY_DATE, JSON.stringify(all));
        renderCurrentView();
        showToast('Undo applied');
      }catch(e){ console.warn('undo', e); }
    }

    function saveBackup(){
      try{
        const hist = safeParse(localStorage.getItem(BACKUP_KEY), []);
        hist.unshift({ ts: nowISO(), byDate: loadAll(), settings: loadSettings() });
        if(hist.length>10) hist.length = 10;
        localStorage.setItem(BACKUP_KEY, JSON.stringify(hist));
      }catch(e){ console.warn('backup', e); }
    }
    setInterval(saveBackup, BACKUP_INTERVAL);

    function loadLog(){ return safeParse(localStorage.getItem(LOG_KEY), []); }
    function saveLog(log){ try{ localStorage.setItem(LOG_KEY, JSON.stringify(log)); }catch(e){} }
    function appendLog(entry){ const log = loadLog(); log.unshift(entry); if(log.length>200) log.length = 200; saveLog(log); renderSessionLog(); }

    function updateDayLabel(dateISO){
      const el = document.getElementById('current-day-label');
      if(!el) return;
      const s = loadSettings();
      const d = new Date(dateISO + 'T00:00:00');
      try{ el.textContent = d.toLocaleDateString(undefined, { weekday: s.useShortDay ? 'short' : 'long', month:'short', day:'numeric' }); }catch(e){ el.textContent = dateISO; }
    }

    function renderWorkouts(filter){
      const s = loadSettings();
      const dateISO = s.selectedDate || todayISO();
      updateDayLabel(dateISO);
      const list = loadFor(dateISO);
      const q = filter && filter.trim() ? filter.trim().toLowerCase() : '';
      const container = document.getElementById('workouts-list');
      container.innerHTML = '';
      const filtered = q ? list.filter(i => i.toLowerCase().includes(q)) : list;
      if(!filtered.length){ container.innerHTML = '<div class="empty">No workouts yet. Add one below.</div>'; return; }
      filtered.forEach((text, idx) => {
        const row = document.createElement('div'); row.className = 'workout-item';
        const left = document.createElement('div'); left.style.flex='1';
        const title = document.createElement('div'); title.className = 'workout-title'; title.textContent = text;
        const meta = document.createElement('div'); meta.className = 'muted'; meta.textContent = `#${idx+1}`;
        left.appendChild(title); left.appendChild(meta);

        const actions = document.createElement('div');
        const up = document.createElement('button'); up.className='btn'; up.textContent='↑'; up.onclick = ()=> moveItem(idx, -1, dateISO);
        const down = document.createElement('button'); down.className='btn'; down.textContent='↓'; down.onclick = ()=> moveItem(idx, 1, dateISO);
        const fav = document.createElement('button'); fav.className='btn'; fav.textContent='★'; fav.onclick = ()=> toggleFavorite(idx, dateISO);
        const del = document.createElement('button'); del.className='btn'; del.textContent='✕'; del.onclick = ()=> removeItem(idx, dateISO);
        actions.appendChild(up); actions.appendChild(down); actions.appendChild(fav); actions.appendChild(del);

        row.appendChild(left); row.appendChild(actions);
        container.appendChild(row);
      });
    }

    function addWorkoutTo(dateISO, text){
      if(!text || !text.trim()) return;
      const list = loadFor(dateISO);
      list.unshift(text.trim());
      saveFor(dateISO, list);
      renderCurrentView();
      showToast('Workout added');
    }
    function removeItem(index, dateISO){
      const list = loadFor(dateISO);
      if(index<0||index>=list.length) return;
      list.splice(index,1);
      saveFor(dateISO, list);
      renderCurrentView();
      showToast('Workout removed');
    }
    function moveItem(index, delta, dateISO){
      const list = loadFor(dateISO);
      const to = index + delta;
      if(to<0||to>=list.length) return;
      const [it] = list.splice(index,1);
      list.splice(to,0,it);
      saveFor(dateISO, list);
      renderCurrentView();
    }
    function toggleFavorite(index, dateISO){
      const list = loadFor(dateISO);
      if(index<0||index>=list.length) return;
      const item = list[index];
      list[index] = item.startsWith('★ ') ? item.replace(/^★\s*/, '') : '★ ' + item;
      saveFor(dateISO, list);
      renderCurrentView();
    }

    function exportAll(){ const payload = { byDate: loadAll(), exportedAt: nowISO(), version: 2 }; downloadFile('fieldiron-by-date.json', JSON.stringify(payload, null, 2)); showToast('Export started'); }
    function importFileHandler(file){
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        try{
          const parsed = JSON.parse(e.target.result);
          if(parsed && parsed.byDate && typeof parsed.byDate === 'object'){
            saveAll(parsed.byDate);
            renderCurrentView();
            showToast('Imported by-date data');
          } else if(Array.isArray(parsed)){
            const s = loadSettings();
            saveFor(s.selectedDate || todayISO(), parsed);
            renderCurrentView();
            showToast('Imported to selected day');
          } else alert('Invalid file format');
        }catch(err){ alert('Failed to parse file'); }
      };
      reader.readAsText(file);
    }

    function registerSW(){ if(!('serviceWorker' in navigator)) return; navigator.serviceWorker.register('/sw.js').then(()=> showToast('Service worker registered')).catch(()=> showToast('SW registration failed')); }
    function unregisterSW(){ if(!('serviceWorker' in navigator)) return; navigator.serviceWorker.getRegistrations().then(regs=>{ regs.forEach(r=>r.unregister()); if('caches' in window) caches.keys().then(keys=>keys.forEach(k=>caches.delete(k))); showToast('Service workers unregistered'); }); }

    let sessionTimer = null, sessionStart = null, sessionElapsed = 0;
    function startSession(){ if(sessionTimer) return; sessionStart = Date.now() - sessionElapsed; sessionTimer = setInterval(()=>{ sessionElapsed = Date.now() - sessionStart; updateSessionUI(); }, 250); document.getElementById('session-status').textContent = 'Running'; showToast('Session started'); }
    function pauseSession(){ if(!sessionTimer) return; clearInterval(sessionTimer); sessionTimer = null; document.getElementById('session-status').textContent = 'Paused'; showToast('Session paused'); }
    function stopSession(){ if(sessionTimer){ clearInterval(sessionTimer); sessionTimer = null; } const duration = msToTime(sessionElapsed); const s = loadSettings(); appendLog({ title: `Session ${new Date().toLocaleString()}`, startedAt: sessionStart ? new Date(sessionStart).toISOString() : new Date().toISOString(), duration, notes: `Date: ${s.selectedDate || todayISO()}` }); sessionElapsed = 0; sessionStart = null; updateSessionUI(); document.getElementById('session-status').textContent = 'Idle'; showToast('Session stopped and logged'); }
    function updateSessionUI(){ const timer = document.getElementById('session-timer'); if(timer) timer.textContent = msToTime(sessionElapsed); }
    function msToTime(ms){ const s = Math.floor(ms/1000)%60; const m = Math.floor(ms/(60*1000))%60; const h = Math.floor(ms/(60*60*1000)); return (h? (h+':') : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); }

    function getWeekStart(dateISO){ const d = new Date(dateISO + 'T00:00:00'); const day = d.getDay(); const diff = (day + 6) % 7; d.setDate(d.getDate() - diff); return d.toISOString().slice(0,10); }
    function renderWeek(centerDate){
      const start = getWeekStart(centerDate);
      const grid = document.getElementById('week-grid'); grid.innerHTML = '';
      for(let i=0;i<7;i++){
        const dateISO = dateAdd(start, i);
        const d = new Date(dateISO + 'T00:00:00');
        const dayName = d.toLocaleDateString(undefined, { weekday: 'short' });
        const dayNum = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
        const card = document.createElement('div'); card.className='day-card';
        const h = document.createElement('div'); h.style.fontWeight='700'; h.textContent = `${dayName} • ${dayNum}`;
        card.appendChild(h);
        const list = loadFor(dateISO);
        const preview = document.createElement('div'); preview.style.marginTop='8px'; preview.style.fontSize='13px'; preview.style.color='var(--muted)';
        if(!list || !list.length) preview.textContent = '—';
        else {
          list.slice(0,4).forEach(it => { const p = document.createElement('div'); p.textContent = it; preview.appendChild(p); });
          if(list.length>4){ const more = document.createElement('div'); more.className='muted'; more.textContent = `+${list.length-4} more`; preview.appendChild(more); }
        }
        card.appendChild(preview);
        card.addEventListener('click', ()=> { const s = loadSettings(); s.selectedDate = dateISO; s.view = 'daily'; saveSettings(s); renderCurrentView(); });
        grid.appendChild(card);
      }
    }

    function renderSessionLog(){
      const el = document.getElementById('session-log'); const log = loadLog();
      if(!el) return;
      if(!log.length){ el.className='empty'; el.textContent='No sessions yet.'; return; }
      el.className=''; el.innerHTML = '';
      log.forEach(entry => {
        const d = document.createElement('div'); d.style.padding='8px 0'; d.style.borderBottom='1px solid rgba(255,255,255,0.02)';
        d.innerHTML = `<strong style="display:block;color:var(--text)">${entry.title}</strong><div class="muted">${new Date(entry.startedAt).toLocaleDateString()} — ${entry.duration}</div><div class="muted" style="margin-top:6px">${entry.notes || ''}</div>`;
        el.appendChild(d);
      });
    }

    function renderCurrentView(){
      const s = loadSettings();
      updateDayLabel(s.selectedDate || todayISO());
      document.getElementById('default-count-label').textContent = s.defaultExerciseCount || DEFAULTS.defaultExerciseCount;
      document.getElementById('default-count').value = s.defaultExerciseCount || DEFAULTS.defaultExerciseCount;
      document.getElementById('base-exercises').value = (s.baseExercises && s.baseExercises.length) ? s.baseExercises.join(', ') : DEFAULTS.baseExercises.join(', ');
      if(s.view === 'weekly'){ document.getElementById('daily-view').classList.add('hidden'); document.getElementById('weekly-view').classList.remove('hidden'); renderWeek(s.selectedDate || todayISO()); }
      else { document.getElementById('daily-view').classList.remove('hidden'); document.getElementById('weekly-view').classList.add('hidden'); renderWorkouts(document.getElementById('filter').value); }
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      const presetSelect = document.getElementById('preset-select');
      const accentSwatches = document.querySelectorAll('.accent-swatch');
      const viewDaily = document.getElementById('view-daily');
      const viewWeekly = document.getElementById('view-weekly');
      const prevBtn = document.getElementById('prev');
      const nextBtn = document.getElementById('next');
      const todayBtn = document.getElementById('today-btn');
      const quickAdd = document.getElementById('quick-add');
      const quickAddBtn = document.getElementById('quick-add-btn');
      const filter = document.getElementById('filter');
      const importFile = document.getElementById('import-file');
      const exportBtn = document.getElementById('export-json');
      const startBtn = document.getElementById('start-session');
      const pauseBtn = document.getElementById('pause-session');
      const stopBtn = document.getElementById('stop-session');
      const clearAllBtn = document.getElementById('clear-all');
      const resetDefaultsBtn = document.getElementById('reset-defaults');
      const undoBtn = document.getElementById('undo-btn');
      const templatesBtn = document.getElementById('templates-btn');

      const showTZ = document.getElementById('show-timezone');
      const useShort = document.getElementById('use-short-day');
      const enableSW = document.getElementById('enable-sw');
      const vibrateSwitch = document.getElementById('vibrate');
      const defaultCountInput = document.getElementById('default-count');
      const baseExercisesInput = document.getElementById('base-exercises');
      const saveSettingsBtn = document.getElementById('save-settings');
      const resetSettingsBtn = document.getElementById('reset-settings');

      const unregisterBtn = document.getElementById('unregister-sw');
      const debugExportBtn = document.getElementById('debug-export-local');
      const downloadRecoveryBtn = document.getElementById('download-recovery');
      const clearStorageBtn = document.getElementById('clear-storage');

      const downloadLogBtn = document.getElementById('download-log');
      const clearLogBtn = document.getElementById('clear-log');

      const s = loadSettings();
      document.body.setAttribute('data-preset', s.preset || 'dark');
      document.body.setAttribute('data-accent', s.accent || 'orange');
      presetSelect.value = s.preset || 'dark';
      function setSwitch(el, on){ if(on) el.classList.add('on'); else el.classList.remove('on'); el.setAttribute('aria-checked', !!on); }
      setSwitch(showTZ, s.showTimezone); setSwitch(useShort, s.useShortDay); setSwitch(enableSW, s.enableSW); setSwitch(vibrateSwitch, s.vibrate);

      if(!s.selectedDate) s.selectedDate = todayISO();
      saveSettings(s);
      renderCurrentView();
      renderSessionLog();
      updateSessionUI();

      // apply preset & accent handlers (fixed)
      function applyPreset(name){
        document.body.setAttribute('data-preset', name);
        const st = loadSettings(); st.preset = name; saveSettings(st);
        renderCurrentView();
      }
      function applyAccent(name){
        document.body.setAttribute('data-accent', name);
        const st = loadSettings(); st.accent = name; saveSettings(st);
        renderCurrentView();
      }

      presetSelect.addEventListener('change', (e)=> applyPreset(e.target.value));
      accentSwatches.forEach(sw => sw.addEventListener('click', ()=> applyAccent(sw.dataset.accent)));

      viewDaily.addEventListener('click', ()=>{ const st = loadSettings(); st.view = 'daily'; saveSettings(st); renderCurrentView(); });
      viewWeekly.addEventListener('click', ()=>{ const st = loadSettings(); st.view = 'weekly'; saveSettings(st); renderCurrentView(); });

      prevBtn.addEventListener('click', ()=>{ const st = loadSettings(); st.selectedDate = (st.view==='weekly') ? dateAdd(st.selectedDate, -7) : dateAdd(st.selectedDate, -1); saveSettings(st); renderCurrentView(); });
      nextBtn.addEventListener('click', ()=>{ const st = loadSettings(); st.selectedDate = (st.view==='weekly') ? dateAdd(st.selectedDate, 7) : dateAdd(st.selectedDate, 1); saveSettings(st); renderCurrentView(); });
      todayBtn.addEventListener('click', ()=>{ const st = loadSettings(); st.selectedDate = todayISO(); saveSettings(st); renderCurrentView(); showToast('Jumped to today'); });

      quickAddBtn.addEventListener('click', ()=>{ const st = loadSettings(); addWorkoutTo(st.selectedDate || todayISO(), quickAdd.value); quickAdd.value=''; quickAdd.focus(); });
      quickAdd.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); const st = loadSettings(); addWorkoutTo(st.selectedDate || todayISO(), quickAdd.value); quickAdd.value=''; } });

      filter.addEventListener('input', ()=> renderWorkouts(filter.value));

      exportBtn.addEventListener('click', exportAll);
      importFile.addEventListener('change', (e)=>{ const f = e.target.files && e.target.files[0]; if(f) importFileHandler(f); importFile.value=''; });

      startBtn.addEventListener('click', ()=>{ if(!sessionTimer) startSession(); else showToast('Session already running'); });
      pauseBtn.addEventListener('click', ()=>{ if(sessionTimer) pauseSession(); else startSession(); });
      stopBtn.addEventListener('click', stopSession);

      clearAllBtn.addEventListener('click', clearDay);
      resetDefaultsBtn.addEventListener('click', resetDefaults);
      undoBtn.addEventListener('click', undo);

      templatesBtn.addEventListener('click', ()=>{
        const templates = [
          'Reverse Lunge — 4 sets × 8 ea',
          'Kettlebell Farmer Carry — 4 sets × 50m',
          'DB Bulgarian Split — 3 sets × 8 ea',
          'Kneeling Hip Flexor Stretch — 2 sets × 30s ea'
        ];
        const pick = templates[Math.floor(Math.random()*templates.length)];
        quickAdd.value = pick; quickAdd.focus();
      });

      showTZ.addEventListener('click', ()=>{ const st = loadSettings(); st.showTimezone = !st.showTimezone; saveSettings(st); setSwitch(showTZ, st.showTimezone); updateDayLabel(st.selectedDate || todayISO()); });
      useShort.addEventListener('click', ()=>{ const st = loadSettings(); st.useShortDay = !st.useShortDay; saveSettings(st); setSwitch(useShort, st.useShortDay); updateDayLabel(st.selectedDate || todayISO()); });
      enableSW.addEventListener('click', ()=>{ const st = loadSettings(); st.enableSW = !st.enableSW; saveSettings(st); setSwitch(enableSW, st.enableSW); if(st.enableSW) registerSW(); else unregisterSW(); });
      vibrateSwitch.addEventListener('click', ()=>{ const st = loadSettings(); st.vibrate = !st.vibrate; saveSettings(st); setSwitch(vibrateSwitch, st.vibrate); });

      saveSettingsBtn.addEventListener('click', ()=>{
        const st = loadSettings();
        st.defaultExerciseCount = Math.max(1, Math.min(12, Number(defaultCountInput.value) || DEFAULTS.defaultExerciseCount));
        st.baseExercises = baseExercisesInput.value.split(',').map(s=>s.trim()).filter(Boolean);
        saveSettings(st);
        showToast('Settings saved');
        renderCurrentView();
      });
      resetSettingsBtn.addEventListener('click', ()=>{
        const st = loadSettings();
        st.defaultExerciseCount = DEFAULTS.defaultExerciseCount;
        st.baseExercises = DEFAULTS.baseExercises.slice();
        saveSettings(st);
        defaultCountInput.value = st.defaultExerciseCount;
        baseExercisesInput.value = st.baseExercises.join(', ');
        showToast('Settings reset');
        renderCurrentView();
      });

      unregisterBtn.addEventListener('click', unregisterSW);
      debugExportBtn.addEventListener('click', downloadLocalDump);
      downloadRecoveryBtn.addEventListener('click', ()=>{
        const html = localStorage.getItem(RECOVERY_KEY);
        if(!html){ alert('No recovery HTML saved'); return; }
        downloadFile('recovered-deployed.html', html, 'text/html'); showToast('Downloaded recovery HTML');
      });
      clearStorageBtn.addEventListener('click', ()=>{
        if(!confirm('Clear localStorage? This will remove workouts and settings.')) return;
        localStorage.removeItem(STORAGE_BY_DATE); localStorage.removeItem(SETTINGS_KEY); localStorage.removeItem(LOG_KEY); localStorage.removeItem(BACKUP_KEY); localStorage.removeItem(UNDO_KEY);
        renderCurrentView(); renderSessionLog(); showToast('Local storage cleared');
      });

      downloadLogBtn.addEventListener('click', ()=>{ downloadFile('fieldiron-session-log.json', JSON.stringify({ sessions: loadLog(), exportedAt: nowISO() }, null, 2)); showToast('Session log downloaded'); });
      clearLogBtn.addEventListener('click', ()=>{ if(!confirm('Clear session log?')) return; localStorage.removeItem(LOG_KEY); renderSessionLog(); showToast('Session log cleared'); });

      document.getElementById('logo').addEventListener('dblclick', undo);

      if(loadSettings().enableSW) registerSW();
    });

    function downloadLocalDump(){ const dump = { byDate: loadAll(), settings: loadSettings(), sessions: loadLog(), backups: safeParse(localStorage.getItem(BACKUP_KEY),[]) }; downloadFile('fieldiron-local-dump.json', JSON.stringify(dump, null, 2)); showToast('Local dump downloaded'); }

    try{ window.__FieldIron = { loadAll, saveAll, loadFor, saveFor, loadSettings, saveSettings, DEFAULTS, undo }; } catch(e){}
    document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState === 'visible') renderCurrentView(); });
  })();
  </script>
</body>
</html>
