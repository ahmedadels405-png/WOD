<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Field+Iron</title>

  <!-- PWA / Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="msapplication-TileColor" content="#071018">
  <meta name="theme-color" content="#071018">

  <meta name="theme-color" content="#071018" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg:#071018;
      --card:#0b1a24;
      --muted:#9fb3c8;
      --text:#e6eef6;
      --accent:#ff6a00;
      --glass: rgba(255,255,255,0.03);
    }
    html,body{height:100%;margin:0;}
    body{
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:20px;
      box-sizing:border-box;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
    }
    .wrap{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:18px;min-height:100vh;}
    header{margin-top:6px;}
    .day-header{
      display:flex;
      align-items:baseline;
      gap:12px;
      margin:0;
      font-size:28px;
      font-weight:700;
    }
    .subtitle{margin:0;color:var(--muted);font-size:14px;}
    main{flex:1;}
    .card{
      background:var(--card);
      border-radius:12px;
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.5);
    }
    .section-title{margin:0 0 8px 0;color:#cfe6f6;font-size:16px;}
    ul{color:#cfe6f6;padding-left:18px;margin:0 0 12px 0;}
    .actions{display:flex;gap:12px;align-items:center;}
    .btn{border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(159,179,200,0.12);}
    .muted { color: var(--muted); font-size:13px; }
    .workout-item { display:flex; justify-content:space-between; gap:12px; align-items:center; padding:8px 0; border-bottom:1px solid var(--glass); }
    .workout-item:last-child { border-bottom: none; }
    .small { font-size:13px; color:#cfe6f6; opacity:0.9; }
    .input-row { display:flex; gap:8px; margin-top:12px; }
    input[type="text"]{ flex:1; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.04); background:transparent; color:var(--text); }
    .pill { background: rgba(255,255,255,0.02); padding:6px 10px; border-radius:999px; color:var(--muted); font-size:13px; }
    footer{color:#6f8b9a;font-size:13px;padding-bottom:18px;}
    .sr-only { position:absolute; left:-9999px; top:auto; width:1px; height:1px; overflow:hidden; }
    @media (max-width:420px){
      .day-header{font-size:22px;}
      body{padding:14px;}
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <header>
      <h1 class="day-header">
        <span id="current-day">Loading…</span>
        <span class="pill" id="timezone-label" aria-hidden="true"></span>
      </h1>
      <p class="subtitle">Field+Iron</p>
    </header>

    <main>
      <section class="card" aria-labelledby="today-heading">
        <h2 id="today-heading" class="section-title">Today</h2>

        <div id="workouts-list" aria-live="polite">
          <!-- workout items injected here -->
        </div>

        <div class="input-row" role="form" aria-label="Add workout">
          <input id="new-workout" type="text" placeholder="Add workout (e.g., Reverse Lunge — 4×8)" aria-label="New workout" />
          <button id="add-workout" class="btn btn-primary">Add</button>
        </div>

        <div class="actions" style="margin-top:12px;">
          <button id="clear-all" class="btn btn-ghost">Clear All</button>
          <div style="flex:1"></div>
          <span class="muted">Saved locally on this device</span>
        </div>
      </section>
    </main>

    <footer>
      <small>Personal app — Field+Iron</small>
    </footer>
  </div>

  <!-- Full app script: dynamic day + simple local storage workout list -->
  <script>
    (function () {
      'use strict';

      /* ---------- Day header logic ---------- */
      function getLocalWeekday(locale, short) {
        try {
          return new Date().toLocaleDateString(locale || undefined, { weekday: short ? 'short' : 'long' });
        } catch (e) {
          const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
          return days[new Date().getDay()] || '';
        }
      }

      function updateCurrentDay() {
        const el = document.getElementById('current-day');
        if (!el) return;
        el.textContent = getLocalWeekday();
        const tzLabel = document.getElementById('timezone-label');
        try {
          const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
          tzLabel.textContent = tz ? tz.replace('_',' ') : '';
        } catch (e) {
          tzLabel.textContent = '';
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateCurrentDay);
      } else {
        updateCurrentDay();
      }

      (function scheduleMidnightUpdate() {
        const now = new Date();
        const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
        let msUntilMidnight = nextMidnight.getTime() - now.getTime();
        if (!Number.isFinite(msUntilMidnight) || msUntilMidnight <= 0) {
          msUntilMidnight = 60 * 60 * 1000;
        }
        setTimeout(function () {
          updateCurrentDay();
          setInterval(updateCurrentDay, 24 * 60 * 60 * 1000);
        }, msUntilMidnight);
      })();

      /* ---------- Workout list logic (localStorage) ---------- */
      const STORAGE_KEY = 'fieldiron.workouts.v1';

      function loadWorkouts() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultWorkouts();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return defaultWorkouts();
          return parsed;
        } catch (e) {
          return defaultWorkouts();
        }
      }

      function saveWorkouts(list) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        } catch (e) {
          console.warn('Failed to save workouts', e);
        }
      }

      function defaultWorkouts() {
        return [
          'Reverse Lunge — 4 sets × 8 ea',
          'Kettlebell Farmer Carry (double) — 4 sets × 50m',
          'DB Bulgarian Split — 3 sets × 8 ea',
          'Kneeling Hip Flexor Stretch — 2 sets × 30s ea'
        ];
      }

      function renderWorkouts() {
        const container = document.getElementById('workouts-list');
        container.innerHTML = '';
        const list = loadWorkouts();
        if (list.length === 0) {
          const p = document.createElement('p');
          p.className = 'muted';
          p.textContent = 'No workouts yet. Add one below.';
          container.appendChild(p);
          return;
        }
        list.forEach((text, idx) => {
          const row = document.createElement('div');
          row.className = 'workout-item';
          row.setAttribute('data-index', idx);

          const left = document.createElement('div');
          left.className = 'small';
          left.textContent = text;

          const right = document.createElement('div');
          right.style.display = 'flex';
          right.style.gap = '8px';
          right.style.alignItems = 'center';

          const up = document.createElement('button');
          up.className = 'btn btn-ghost';
          up.style.padding = '6px 8px';
          up.title = 'Move up';
          up.textContent = '↑';
          up.onclick = () => moveItem(idx, -1);

          const down = document.createElement('button');
          down.className = 'btn btn-ghost';
          down.style.padding = '6px 8px';
          down.title = 'Move down';
          down.textContent = '↓';
          down.onclick = () => moveItem(idx, 1);

          const del = document.createElement('button');
          del.className = 'btn btn-ghost';
          del.style.padding = '6px 8px';
          del.title = 'Delete';
          del.textContent = '✕';
          del.onclick = () => removeItem(idx);

          right.appendChild(up);
          right.appendChild(down);
          right.appendChild(del);

          row.appendChild(left);
          row.appendChild(right);
          container.appendChild(row);
        });
      }

      function addWorkout(text) {
        if (!text || !text.trim()) return;
        const list = loadWorkouts();
        list.unshift(text.trim());
        saveWorkouts(list);
        renderWorkouts();
      }

      function removeItem(index) {
        const list = loadWorkouts();
        if (index < 0 || index >= list.length) return;
        list.splice(index, 1);
        saveWorkouts(list);
        renderWorkouts();
      }

      function moveItem(index, delta) {
        const list = loadWorkouts();
        const to = index + delta;
        if (to < 0 || to >= list.length) return;
        const [item] = list.splice(index, 1);
        list.splice(to, 0, item);
        saveWorkouts(list);
        renderWorkouts();
      }

      function clearAll() {
        if (!confirm('Clear all workouts? This cannot be undone.')) return;
        saveWorkouts([]);
        renderWorkouts();
      }

      /* ---------- Wire up UI ---------- */
      document.addEventListener('DOMContentLoaded', function () {
        renderWorkouts();

        const input = document.getElementById('new-workout');
        const addBtn = document.getElementById('add-workout');
        const clearBtn = document.getElementById('clear-all');

        addBtn.addEventListener('click', function () {
          addWorkout(input.value);
          input.value = '';
          input.focus();
        });

        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            addWorkout(input.value);
            input.value = '';
          }
        });

        clearBtn.addEventListener('click', clearAll);

        // Accessibility: focus the input on first load
        setTimeout(() => input.focus(), 300);
      });

      /* ---------- Optional: handle visibility change to refresh day label ---------- */
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') updateCurrentDay();
      });

    })();
  </script>
</body>
</html>
