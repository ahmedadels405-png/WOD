<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE Workout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b35, #f7b05e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub {
            color: #888;
            margin-bottom: 30px;
        }

        .card {
            background: #1a1e24;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .exercise-item {
            background: #252a33;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .exercise-details {
            font-size: 12px;
            color: #ff8c5a;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            background: #2f3540;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        button.primary {
            background: linear-gradient(135deg, #ff6b35, #f7b05e);
            color: #0a0c10;
        }

        button.danger {
            background: #3a2a2a;
        }

        .theme-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a1e24;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            display: none;
        }

        .toast.show {
            display: block;
        }

        input {
            background: #252a33;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
            flex: 1;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ IGNITE</h1>
    <div class="sub">explosive · compound · fat loss</div>

    <div class="stats">
        <div class="stat-card">
            <div>🔥 CALORIES</div>
            <div class="stat-value" id="calories">0</div>
        </div>
        <div class="stat-card">
            <div>⚡ POWER SCORE</div>
            <div class="stat-value" id="powerScore">0</div>
        </div>
        <div class="stat-card">
            <div>🎯 BODY FAT</div>
            <div class="stat-value" id="bodyfat">18%</div>
        </div>
    </div>

    <div class="card">
        <h2>💥 TODAY'S WORKOUT (5 EXERCISES)</h2>
        
        <div class="theme-buttons">
            <button id="btnExplosive" class="primary">⚡ Explosive</button>
            <button id="BtnFatLoss">🔥 Fat Loss</button>
            <button id="BtnStrength">💪 Strength</button>
            <button id="btnGenerate">✨ Generate New</button>
        </div>

        <div id="workoutList"></div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <input type="text" id="customExercise" placeholder="Add custom exercise...">
            <button id="btnAdd">+ Add</button>
            <button id="btnSave">💾 Save</button>
        </div>
    </div>

    <div class="card">
        <h2>🧘 MOBILITY (3)</h2>
        <div id="mobilityList"></div>
        <button id="btnAddMobility" style="margin-top: 10px;">+ Add Mobility</button>
    </div>

    <button id="btnStartWorkout" class="primary" style="width: 100%; padding: 15px; font-size: 16px;">🚀 START WORKOUT</button>
</div>

<div id="toast" class="toast"></div>

<script>
    // EXERCISE DATABASE
    const COMPOUND_EXERCISES = [
        { name: "Power Clean", type: "explosive", cals: 12, sets: 4, reps: "6-8" },
        { name: "Thruster", type: "explosive", cals: 11, sets: 4, reps: "8-10" },
        { name: "Deadlift", type: "strength", cals: 9, sets: 3, reps: "8-10" },
        { name: "Back Squat", type: "strength", cals: 8, sets: 3, reps: "8-10" },
        { name: "Barbell Row", type: "strength", cals: 7, sets: 3, reps: "8-10" },
        { name: "Bench Press", type: "strength", cals: 7, sets: 3, reps: "8-10" },
        { name: "Push Press", type: "explosive", cals: 10, sets: 4, reps: "6-8" },
        { name: "Kettlebell Swing", type: "explosive", cals: 11, sets: 4, reps: "12-15" },
        { name: "Box Jump", type: "explosive", cals: 12, sets: 4, reps: "5-6" },
        { name: "Burpee", type: "fatloss", cals: 14, sets: 3, reps: "10-12" },
        { name: "Clean & Jerk", type: "explosive", cals: 13, sets: 4, reps: "5-6" },
        { name: "Front Squat", type: "strength", cals: 8, sets: 3, reps: "8-10" },
        { name: "Pull-up", type: "strength", cals: 7, sets: 3, reps: "6-8" },
        { name: "Dip", type: "strength", cals: 7, sets: 3, reps: "8-10" }
    ];

    const ISOLATION_EXERCISES = [
        { name: "Barbell Curl", type: "isolation", cals: 5, sets: 3, reps: "10-12" },
        { name: "Triceps Extension", type: "isolation", cals: 5, sets: 3, reps: "10-12" },
        { name: "Lateral Raise", type: "isolation", cals: 5, sets: 3, reps: "12-15" },
        { name: "Leg Curl", type: "isolation", cals: 5, sets: 3, reps: "10-12" },
        { name: "Calf Raise", type: "isolation", cals: 4, sets: 3, reps: "15-20" },
        { name: "Face Pull", type: "isolation", cals: 5, sets: 3, reps: "12-15" }
    ];

    const MOBILITY_EXERCISES = ["Deep Squat Hold", "Cat-Cow Stretch", "World's Greatest Stretch"];

    // STATE
    let currentWorkout = [];
    let mobilityList = [...MOBILITY_EXERCISES];
    let currentTheme = "explosive";
    let savedRoutines = {};

    // Helper
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    // Generate workout
    function generateWorkout() {
        let compoundPool = [...COMPOUND_EXERCISES];
        
        if (currentTheme === "explosive") {
            compoundPool = COMPOUND_EXERCISES.filter(e => e.type === "explosive");
        } else if (currentTheme === "fatloss") {
            compoundPool = COMPOUND_EXERCISES.filter(e => e.type === "fatloss" || e.type === "explosive");
        }
        
        if (compoundPool.length < 4) {
            compoundPool = [...COMPOUND_EXERCISES];
        }
        
        // Shuffle
        for (let i = compoundPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [compoundPool[i], compoundPool[j]] = [compoundPool[j], compoundPool[i]];
        }
        
        const compounds = compoundPool.slice(0, 4);
        const isolation = ISOLATION_EXERCISES[Math.floor(Math.random() * ISOLATION_EXERCISES.length)];
        
        currentWorkout = [...compounds, isolation];
        
        renderWorkout();
        updateStats();
        showToast(`Generated ${currentTheme} workout!`);
    }

    // Render workout list
    function renderWorkout() {
        const container = document.getElementById("workoutList");
        if (!container) return;
        
        if (currentWorkout.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Click Generate New</div>';
            return;
        }
        
        let html = "";
        for (let i = 0; i < currentWorkout.length; i++) {
            const ex = currentWorkout[i];
            const typeLabel = i < 4 ? "⚡ COMPOUND" : "🎯 ISOLATION";
            html += `
                <div class="exercise-item">
                    <div>
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-details">${ex.sets} sets × ${ex.reps} reps · ${ex.type.toUpperCase()} · ${typeLabel}</div>
                    </div>
                    <div class="btn-group">
                        <button class="auto-replace" data-index="${i}">🤖 Auto</button>
                        <button class="manual-replace" data-index="${i}">🔄 Swap</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Auto replace buttons
        document.querySelectorAll(".auto-replace").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.dataset.index);
                autoReplace(idx);
            });
        });
        
        // Manual replace buttons
        document.querySelectorAll(".manual-replace").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.dataset.index);
                manualReplace(idx);
            });
        });
    }

    // Auto replace
    function autoReplace(index) {
        let pool;
        if (index === 4) {
            pool = ISOLATION_EXERCISES.filter(e => e.name !== currentWorkout[index].name);
        } else {
            pool = COMPOUND_EXERCISES.filter(e => e.name !== currentWorkout[index].name);
        }
        
        if (pool.length === 0) {
            showToast("No replacement available");
            return;
        }
        
        const newEx = pool[Math.floor(Math.random() * pool.length)];
        currentWorkout[index] = { ...newEx };
        renderWorkout();
        updateStats();
        showToast(`Replaced with ${newEx.name}`);
    }

    // Manual replace (simple prompt)
    function manualReplace(index) {
        const allExercises = [...COMPOUND_EXERCISES, ...ISOLATION_EXERCISES];
        let message = "Choose an exercise:\n\n";
        for (let i = 0; i < allExercises.length; i++) {
            message += `${i + 1}. ${allExercises[i].name} (${allExercises[i].type})\n`;
        }
        message += "\nEnter number:";
        
        const choice = prompt(message);
        const num = parseInt(choice);
        if (num && num >= 1 && num <= allExercises.length) {
            currentWorkout[index] = { ...allExercises[num - 1] };
            renderWorkout();
            updateStats();
            showToast(`Replaced with ${allExercises[num - 1].name}`);
        }
    }

    // Update stats
    function updateStats() {
        if (currentWorkout.length === 0) return;
        
        const totalCals = currentWorkout.reduce((sum, ex) => sum + (ex.cals * 4), 0);
        document.getElementById("calories").textContent = totalCals;
        
        const explosiveCount = currentWorkout.filter(e => e.type === "explosive").length;
        const powerScore = Math.min(100, 40 + (explosiveCount * 12));
        document.getElementById("powerScore").textContent = powerScore;
    }

    // Render mobility
    function renderMobility() {
        const container = document.getElementById("mobilityList");
        if (!container) return;
        
        let html = "";
        for (let i = 0; i < mobilityList.length; i++) {
            html += `
                <div class="exercise-item">
                    <div class="exercise-name">🧘 ${mobilityList[i]}</div>
                    <button class="remove-mobility" data-idx="${i}">✖️</button>
                </div>
            `;
        }
        container.innerHTML = html;
        
        document.querySelectorAll(".remove-mobility").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                mobilityList.splice(idx, 1);
                renderMobility();
                showToast("Removed");
            });
        });
    }

    function addMobility() {
        const name = prompt("Enter mobility name:");
        if (name && name.trim()) {
            mobilityList.push(name.trim());
            renderMobility();
            showToast(`Added ${name}`);
        }
    }

    function addCustomExercise() {
        const input = document.getElementById("customExercise");
        const name = input.value.trim();
        if (!name) return;
        
        currentWorkout.push({
            name: name,
            type: "strength",
            cals: 7,
            sets: 3,
            reps: "8-10"
        });
        
        if (currentWorkout.length > 5) currentWorkout.shift();
        
        renderWorkout();
        updateStats();
        input.value = "";
        showToast(`Added ${name}`);
    }

    function saveRoutine() {
        const name = prompt("Name this routine:");
        if (name) {
            savedRoutines[name] = JSON.parse(JSON.stringify(currentWorkout));
            showToast(`Saved "${name}"`);
        }
    }

    // Workout runner
    let runnerIndex = 0;
    let runnerSet = 1;
    
    function startWorkout() {
        if (currentWorkout.length === 0) {
            showToast("Generate a workout first!");
            return;
        }
        runnerIndex = 0;
        runnerSet = 1;
        showRunner();
    }
    
    function showRunner() {
        const ex = currentWorkout[runnerIndex];
        if (!ex) return;
        
        const html = `
            <div id="runnerOverlay" style="position: fixed; bottom: 0; left: 0; right: 0; background: #1a1e24; border-top: 3px solid #ff6b35; padding: 30px; z-index: 1000;">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 28px; font-weight: bold;">${ex.name}</div>
                    <div style="color: #ff8c5a; margin-top: 5px;">${ex.type.toUpperCase()} · ${ex.sets} sets × ${ex.reps} reps</div>
                </div>
                <div style="text-align: center; margin: 20px 0;">
                    <div style="font-size: 48px; font-weight: bold;">Set ${runnerSet} / ${ex.sets}</div>
                    <div style="color: #888;">Rest 45s between sets</div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="runnerComplete" style="padding: 12px 24px; background: #ff6b35; border: none; border-radius: 40px; color: white; font-weight: bold;">✅ Complete Set</button>
                    <button id="runnerNext" style="padding: 12px 24px; background: #2f3540; border: none; border-radius: 40px; color: white;">➡️ Next Exercise</button>
                    <button id="runnerPrev" style="padding: 12px 24px; background: #2f3540; border: none; border-radius: 40px; color: white;">⬅️ Previous</button>
                    <button id="runnerClose" style="padding: 12px 24px; background: #3a2a2a; border: none; border-radius: 40px; color: white;">Close</button>
                </div>
            </div>
        `;
        
        let existing = document.getElementById("runnerOverlay");
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', html);
        
        document.getElementById("runnerComplete").onclick = () => {
            if (runnerSet < ex.sets) {
                runnerSet++;
                showRunner();
            } else {
                if (runnerIndex + 1 < currentWorkout.length) {
                    runnerIndex++;
                    runnerSet = 1;
                    showRunner();
                } else {
                    showToast("🏆 WORKOUT COMPLETE!");
                    document.getElementById("runnerOverlay")?.remove();
                }
            }
        };
        
        document.getElementById("runnerNext").onclick = () => {
            if (runnerIndex + 1 < currentWorkout.length) {
                runnerIndex++;
                runnerSet = 1;
                showRunner();
            } else {
                showToast("Last exercise");
            }
        };
        
        document.getElementById("runnerPrev").onclick = () => {
            if (runnerIndex > 0) {
                runnerIndex--;
                runnerSet = 1;
                showRunner();
            } else {
                showToast("First exercise");
            }
        };
        
        document.getElementById("runnerClose").onclick = () => {
            document.getElementById("runnerOverlay")?.remove();
        };
    }

    // INIT
    function init() {
        // Set theme buttons
        document.getElementById("btnExplosive").onclick = () => {
            currentTheme = "explosive";
            generateWorkout();
        };
        document.getElementById("BtnFatLoss").onclick = () => {
            currentTheme = "fatloss";
            generateWorkout();
        };
        document.getElementById("BtnStrength").onclick = () => {
            currentTheme = "strength";
            generateWorkout();
        };
        document.getElementById("btnGenerate").onclick = () => generateWorkout();
        document.getElementById("btnAdd").onclick = () => addCustomExercise();
        document.getElementById("btnSave").onclick = () => saveRoutine();
        document.getElementById("btnAddMobility").onclick = () => addMobility();
        document.getElementById("btnStartWorkout").onclick = () => startWorkout();
        
        // Generate initial workout
        generateWorkout();
        renderMobility();
    }
    
    init();
</script>
</body>
</html>
