<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IGNITE — Explosive Fat Loss</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0c10;
      color: #ededee;
      padding: 20px 16px 100px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #f7b05e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: #8e9aaf;
      font-size: 13px;
      margin-top: 4px;
    }
    .date {
      background: rgba(255,255,255,0.04);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }

    /* Stats bar */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 12px;
      color: #8e9aaf;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      margin-top: 6px;
    }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }
    @media (max-width: 800px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Cards */
    .card {
      background: rgba(18, 22, 28, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-header h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .badge {
      background: rgba(255,107,53,0.15);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #ff8c5a;
    }

    /* Exercise items */
    .ex-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ex-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .ex-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,107,53,0.3);
    }
    .ex-info {
      flex: 1;
    }
    .ex-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .ex-meta {
      font-size: 11px;
      color: #8e9aaf;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(255,107,53,0.12);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      color: #ff8c5a;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      color: #ededee;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #f7b05e);
      border: none;
      color: #0a0c10;
    }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
    }
    .btn-danger {
      background: rgba(220,53,69,0.15);
      border-color: rgba(220,53,69,0.3);
    }

    input, select {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 12px;
      border-radius: 40px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    input:focus {
      border-color: #ff6b35;
    }

    .progress-bar {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      height: 6px;
      margin: 10px 0;
    }
    .progress-fill {
      background: linear-gradient(90deg, #ff6b35, #f7b05e);
      width: 0%;
      height: 100%;
      border-radius: 20px;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: #12161c;
      border-radius: 32px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e2329;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 1100;
      transition: transform 0.2s;
      white-space: nowrap;
      border: 1px solid #ff6b35;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .text-muted { color: #8e9aaf; font-size: 12px; }
    .gap-2 { gap: 8px; }
  </style>
</head>
<body>
<div class="container">
  
  <!-- Header -->
  <div class="header">
    <div>
      <h1>⚡ IGNITE</h1>
      <div class="sub">explosive · compound · fat incineration</div>
    </div>
    <div class="date" id="dateDisplay"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">🔥 CALORIE BURN</div>
      <div class="stat-value" id="calorieEstimate">~0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⚡ EXPLOSIVE SCORE</div>
      <div class="stat-value" id="explosiveScore">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🎯 FAT LOSS</div>
      <div class="stat-value" id="fatPercent">0%</div>
      <div class="progress-bar"><div class="progress-fill" id="fatFill"></div></div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- LEFT COLUMN -->
    <div>
      <!-- Workout Card -->
      <div class="card">
        <div class="card-header">
          <h2>💥 TODAY'S WORKOUT</h2>
          <div class="badge" id="workoutBadge">Compound + Isolation</div>
        </div>
        
        <!-- Theme selector -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
          <button class="btn theme-btn active" data-theme="explosive">⚡ Explosive</button>
          <button class="btn theme-btn" data-theme="fatloss">🔥 Fat Loss</button>
          <button class="btn theme-btn" data-theme="strength">💪 Strength</button>
          <button class="btn btn-primary" id="smartGenBtn">✨ Smart Generate</button>
        </div>

        <!-- Exercise List (5 items) -->
        <div id="exerciseList" class="ex-list"></div>

        <!-- Add custom -->
        <div class="flex-between gap-2 mt-3">
          <input type="text" id="customExInput" placeholder="Add custom exercise..." style="flex:1">
          <button class="btn" id="addCustomBtn">+ Add</button>
          <button class="btn btn-primary" id="saveRoutineBtn">💾 Save</button>
        </div>
      </div>

      <!-- Mobility Card (3 items) -->
      <div class="card">
        <div class="card-header">
          <h2>🧘 MOBILITY (3)</h2>
          <button class="btn btn-sm" id="addMobilityBtn">+ Add</button>
        </div>
        <div id="mobilityList" class="ex-list"></div>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div>
      <!-- Profile Card -->
      <div class="card">
        <div class="card-header">
          <h2>📊 BODY METRICS</h2>
        </div>
        <div>
          <div class="mb-2"><label class="text-muted">Weight (kg)</label><input type="number" id="weightInput" step="0.5" style="width:100%; margin-top:4px"></div>
          <div class="mb-2"><label class="text-muted">Body Fat %</label><input type="number" id="bfInput" step="0.5" style="width:100%; margin-top:4px"></div>
          <div class="mb-2"><label class="text-muted">Target BF %</label><input type="number" id="targetBfInput" step="0.5" style="width:100%; margin-top:4px"></div>
          <button class="btn btn-primary" id="updateMetricsBtn" style="width:100%">Update Progress</button>
        </div>
      </div>

      <!-- Actions Card -->
      <div class="card">
        <div class="card-header">
          <h2>🎮 QUICK ACTIONS</h2>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="btn" id="shuffleBtn">🔄 Regenerate Workout</button>
          <button class="btn btn-primary" id="startWorkoutBtn">🚀 START WORKOUT</button>
        </div>
        <div class="text-muted mt-3">📁 SAVED ROUTINES</div>
        <div id="savedRoutinesList" style="max-height: 200px; overflow-y: auto; margin-top: 8px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Database Modal -->
<div id="dbModal" class="modal">
  <div class="modal-content">
    <div class="flex-between">
      <h3>📚 Exercise Database</h3>
      <button class="btn" id="closeDbBtn">Close</button>
    </div>
    <input type="text" id="dbSearch" placeholder="Filter exercises..." style="width:100%; margin: 16px 0">
    <div id="dbList" style="display: flex; flex-direction: column; gap: 8px;"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  (function() {
    // ========== EXERCISE DATABASE ==========
    // Compound + Explosive + Isolation focus
    const EXERCISE_DB = [
      // Compound / Explosive (high calorie, fat burning)
      { name: "Power Clean", type: "explosive", compound: true, intensity: 9, calsPerMin: 12 },
      { name: "Thruster (Squat + Press)", type: "explosive", compound: true, intensity: 9, calsPerMin: 11 },
      { name: "Deadlift", type: "strength", compound: true, intensity: 8, calsPerMin: 9 },
      { name: "Back Squat", type: "strength", compound: true, intensity: 8, calsPerMin: 8 },
      { name: "Barbell Row", type: "strength", compound: true, intensity: 7, calsPerMin: 7 },
      { name: "Bench Press", type: "strength", compound: true, intensity: 7, calsPerMin: 7 },
      { name: "Push Press", type: "explosive", compound: true, intensity: 8, calsPerMin: 10 },
      { name: "Kettlebell Swing", type: "explosive", compound: true, intensity: 8, calsPerMin: 11 },
      { name: "Box Jump", type: "explosive", compound: false, intensity: 9, calsPerMin: 12 },
      { name: "Burpee", type: "fatloss", compound: true, intensity: 10, calsPerMin: 14 },
      { name: "Clean & Jerk", type: "explosive", compound: true, intensity: 10, calsPerMin: 13 },
      { name: "Front Squat", type: "strength", compound: true, intensity: 8, calsPerMin: 8 },
      { name: "Romanian Deadlift", type: "strength", compound: true, intensity: 7, calsPerMin: 7 },
      { name: "Pull-up", type: "strength", compound: true, intensity: 7, calsPerMin: 7 },
      { name: "Dip", type: "strength", compound: true, intensity: 7, calsPerMin: 7 },
      // Isolation (near end of workout)
      { name: "Barbell Curl", type: "isolation", compound: false, intensity: 5, calsPerMin: 5 },
      { name: "Triceps Extension", type: "isolation", compound: false, intensity: 5, calsPerMin: 5 },
      { name: "Lateral Raise", type: "isolation", compound: false, intensity: 5, calsPerMin: 5 },
      { name: "Leg Curl", type: "isolation", compound: false, intensity: 5, calsPerMin: 5 },
      { name: "Leg Extension", type: "isolation", compound: false, intensity: 5, calsPerMin: 5 },
      { name: "Calf Raise", type: "isolation", compound: false, intensity: 4, calsPerMin: 4 },
      { name: "Face Pull", type: "isolation", compound: false, intensity: 5, calsPerMin: 5 }
    ];

    const DEFAULT_MOBILITY = ["Deep Squat Hold", "Cat-Cow Stretch", "World's Greatest Stretch"];

    // ========== STATE ==========
    let state = {
      exercises: [],      // 5 exercises (4 compound + 1 isolation near end)
      mobility: [...DEFAULT_MOBILITY],
      profile: { weight: 80, bf: 18, targetBf: 12 },
      routines: {},
      currentTheme: "explosive"
    };

    let pendingReplaceIndex = null;

    // ========== STORAGE ==========
    function saveToLocal() {
      localStorage.setItem("ignite_data", JSON.stringify({
        exercises: state.exercises,
        mobility: state.mobility,
        profile: state.profile,
        routines: state.routines
      }));
    }

    function loadFromLocal() {
      const data = localStorage.getItem("ignite_data");
      if (data) {
        try {
          const p = JSON.parse(data);
          state.exercises = p.exercises || [];
          state.mobility = p.mobility || [...DEFAULT_MOBILITY];
          state.profile = p.profile || { weight: 80, bf: 18, targetBf: 12 };
          state.routines = p.routines || {};
        } catch(e) {}
      }
      if (!state.exercises.length || state.exercises.length !== 5) {
        generateSmartWorkout();
      }
    }

    // ========== SMART GENERATION (5 exercises: 4 compound + 1 isolation near end) ==========
    function generateSmartWorkout() {
      const theme = state.currentTheme;
      
      // Filter based on theme
      let compoundPool = [];
      let isolationPool = EXERCISE_DB.filter(e => e.type === "isolation");
      
      if (theme === "explosive") {
        compoundPool = EXERCISE_DB.filter(e => e.compound && (e.type === "explosive" || e.type === "fatloss"));
      } else if (theme === "fatloss") {
        compoundPool = EXERCISE_DB.filter(e => e.compound && (e.type === "fatloss" || e.type === "explosive"));
      } else {
        compoundPool = EXERCISE_DB.filter(e => e.compound);
      }
      
      // Ensure we have enough
      if (compoundPool.length < 4) compoundPool = EXERCISE_DB.filter(e => e.compound);
      if (isolationPool.length === 0) isolationPool = EXERCISE_DB.filter(e => e.type === "isolation");
      
      // Shuffle compound pool
      for (let i = compoundPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [compoundPool[i], compoundPool[j]] = [compoundPool[j], compoundPool[i]];
      }
      
      // Pick 4 unique compound exercises
      const compounds = compoundPool.slice(0, 4);
      
      // Pick 1 isolation exercise
      const isolation = isolationPool[Math.floor(Math.random() * isolationPool.length)];
      
      // Build workout: 4 compounds + 1 isolation at the end
      state.exercises = compounds.map(ex => ({
        ...ex,
        sets: ex.type === "explosive" ? 4 : 3,
        reps: ex.type === "explosive" ? "6-8" : "8-10"
      }));
      
      // Add isolation as 5th exercise
      state.exercises.push({
        ...isolation,
        sets: 3,
        reps: "10-12"
      });
      
      saveToLocal();
      renderWorkout();
      updateStats();
      showToast(`🔥 ${theme.toUpperCase()} workout generated!`, 1500);
    }

    // ========== REPLACE EXERCISE ==========
    function replaceExercise(index, newExercise) {
      if (index >= 0 && index < state.exercises.length) {
        state.exercises[index] = {
          ...newExercise,
          sets: newExercise.type === "explosive" ? 4 : (newExercise.type === "isolation" ? 3 : 3),
          reps: newExercise.type === "explosive" ? "6-8" : (newExercise.type === "isolation" ? "10-12" : "8-10")
        };
        saveToLocal();
        renderWorkout();
        updateStats();
        showToast(`Replaced with ${newExercise.name}`, 1200);
      }
    }

    // Auto-pick: intelligently replace based on type (keep compound/isolation balance)
    function autoReplaceExercise(index) {
      const current = state.exercises[index];
      let pool = [];
      
      if (current.type === "isolation") {
        pool = EXERCISE_DB.filter(e => e.type === "isolation" && e.name !== current.name);
      } else {
        // For compound slots, prefer same theme but any compound
        pool = EXERCISE_DB.filter(e => e.compound && e.name !== current.name);
      }
      
      if (pool.length === 0) pool = EXERCISE_DB.filter(e => e.name !== current.name);
      
      const randomEx = pool[Math.floor(Math.random() * pool.length)];
      replaceExercise(index, randomEx);
    }

    // ========== RENDER UI ==========
    function renderWorkout() {
      const container = document.getElementById("exerciseList");
      if (!container) return;
      
      container.innerHTML = state.exercises.map((ex, idx) => `
        <div class="ex-item">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">
              <span>${ex.sets} sets × ${ex.reps} reps</span>
              <span class="tag">${ex.type.toUpperCase()} ${ex.compound ? '⚡' : '🎯'}</span>
              <span>🔥 ~${ex.calsPerMin * 4} kcal</span>
            </div>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm auto-replace" data-index="${idx}">🤖 Auto</button>
            <button class="btn btn-sm manual-replace" data-index="${idx}">🔄 Swap</button>
          </div>
        </div>
      `).join("");
      
      // Attach events
      document.querySelectorAll(".auto-replace").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const idx = parseInt(btn.dataset.index);
          autoReplaceExercise(idx);
        });
      });
      
      document.querySelectorAll(".manual-replace").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const idx = parseInt(btn.dataset.index);
          pendingReplaceIndex = idx;
          renderDbList("");
          document.getElementById("dbModal").classList.add("active");
        });
      });
    }

    function renderMobility() {
      const container = document.getElementById("mobilityList");
      if (!container) return;
      
      container.innerHTML = state.mobility.map((item, idx) => `
        <div class="ex-item">
          <div class="ex-info">
            <div class="ex-name">🧘 ${item}</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm remove-mobility" data-idx="${idx}">✖️</button>
          </div>
        </div>
      `).join("");
      
      document.querySelectorAll(".remove-mobility").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.idx);
          state.mobility.splice(idx, 1);
          saveToLocal();
          renderMobility();
          showToast("Mobility removed");
        });
      });
    }

    function addMobility() {
      const name = prompt("Enter mobility/stretch name:");
      if (name && name.trim()) {
        state.mobility.push(name.trim());
        saveToLocal();
        renderMobility();
        showToast(`Added: ${name}`);
      }
    }

    function addCustomExercise() {
      const input = document.getElementById("customExInput");
      const name = input.value.trim();
      if (!name) return;
      
      const newEx = {
        name: name,
        type: "strength",
        compound: true,
        intensity: 6,
        calsPerMin: 7
      };
      
      state.exercises.push(newEx);
      if (state.exercises.length > 5) state.exercises.shift();
      saveToLocal();
      renderWorkout();
      updateStats();
      input.value = "";
      showToast(`Added: ${name}`);
    }

    // ========== DATABASE MODAL ==========
    function renderDbList(filter = "") {
      const container = document.getElementById("dbList");
      const filtered = EXERCISE_DB.filter(ex => 
        ex.name.toLowerCase().includes(filter.toLowerCase())
      );
      
      container.innerHTML = filtered.map(ex => `
        <div class="ex-item" data-ex='${JSON.stringify(ex)}'>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.type} · ${ex.compound ? 'Compound' : 'Isolation'} · 🔥 ${ex.calsPerMin} cal/min</div>
          </div>
          <button class="btn btn-primary btn-sm select-exercise">Select</button>
        </div>
      `).join("");
      
      document.querySelectorAll(".select-exercise").forEach((btn, i) => {
        btn.addEventListener("click", () => {
          const exData = JSON.parse(btn.closest(".ex-item").dataset.ex);
          if (pendingReplaceIndex !== null) {
            replaceExercise(pendingReplaceIndex, exData);
            pendingReplaceIndex = null;
            document.getElementById("dbModal").classList.remove("active");
          }
        });
      });
    }

    // ========== STATS & PROFILE ==========
    function updateStats() {
      const explosiveCount = state.exercises.filter(e => e.type === "explosive").length;
      const score = Math.min(100, 40 + (explosiveCount * 12));
      document.getElementById("explosiveScore").innerText = score;
      
      const totalCals = state.exercises.reduce((sum, ex) => sum + (ex.calsPerMin * 4), 0);
      document.getElementById("calorieEstimate").innerText = `~${totalCals}`;
      
      const currentBf = state.profile.bf;
      const target = state.profile.targetBf;
      const startBf = Math.max(target + 12, currentBf);
      const progress = Math.min(100, Math.max(0, ((startBf - currentBf) / (startBf - target)) * 100));
      document.getElementById("fatPercent").innerHTML = `${currentBf}%`;
      document.getElementById("fatFill").style.width = `${progress}%`;
      
      document.getElementById("weightInput").value = state.profile.weight;
      document.getElementById("bfInput").value = state.profile.bf;
      document.getElementById("targetBfInput").value = state.profile.targetBf;
    }
    
    function updateMetrics() {
      const w = parseFloat(document.getElementById("weightInput").value);
      const bf = parseFloat(document.getElementById("bfInput").value);
      const target = parseFloat(document.getElementById("targetBfInput").value);
      if (!isNaN(w)) state.profile.weight = w;
      if (!isNaN(bf)) state.profile.bf = bf;
      if (!isNaN(target)) state.profile.targetBf = target;
      saveToLocal();
      updateStats();
      showToast("Metrics updated");
    }

    // ========== ROUTINES ==========
    function saveRoutine() {
      const name = prompt("Name this routine:", `Routine ${Object.keys(state.routines).length + 1}`);
      if (name) {
        state.routines[name] = JSON.parse(JSON.stringify(state.exercises));
        saveToLocal();
        renderSavedRoutines();
        showToast(`Saved "${name}"`);
      }
    }
    
    function renderSavedRoutines() {
      const container = document.getElementById("savedRoutinesList");
      const names = Object.keys(state.routines);
      if (names.length === 0) {
        container.innerHTML = "<div class='text-muted'>No saved routines</div>";
        return;
      }
      container.innerHTML = names.map(name => `
        <div class="flex-between" style="margin-bottom: 8px;">
          <span style="font-size:12px">📁 ${name}</span>
          <div class="btn-group">
            <button class="btn btn-sm load-routine" data-name="${name}">Load</button>
            <button class="btn btn-sm btn-danger del-routine" data-name="${name}">Del</button>
          </div>
        </div>
      `).join("");
      
      document.querySelectorAll(".load-routine").forEach(btn => {
        btn.addEventListener("click", () => {
          const name = btn.dataset.name;
          state.exercises = JSON.parse(JSON.stringify(state.routines[name]));
          saveToLocal();
          renderWorkout();
          updateStats();
          showToast(`Loaded "${name}"`);
        });
      });
      document.querySelectorAll(".del-routine").forEach(btn => {
        btn.addEventListener("click", () => {
          const name = btn.dataset.name;
          delete state.routines[name];
          saveToLocal();
          renderSavedRoutines();
          showToast(`Deleted "${name}"`);
        });
      });
    }

    // ========== WORKOUT RUNNER ==========
    let runnerActive = false;
    let currentExIdx = 0;
    let currentSetNum = 1;
    
    function startWorkout() {
      if (state.exercises.length === 0) {
        showToast("No exercises! Generate first.");
        return;
      }
      currentExIdx = 0;
      currentSetNum = 1;
      runnerActive = true;
      updateRunnerUI();
    }
    
    function updateRunnerUI() {
      const ex = state.exercises[currentExIdx];
      if (!ex) return;
      
      const runnerHtml = `
        <div style="position: fixed; bottom: 0; left: 0; right: 0; background: #12161c; border-top: 2px solid #ff6b35; padding: 24px; z-index: 2000; max-height: 80vh; overflow-y: auto;">
          <div class="flex-between" style="margin-bottom: 20px;">
            <h3>🏋️ WORKOUT</h3>
            <button class="btn" id="closeRunnerBtn">Close</button>
          </div>
          <div style="text-align: center; margin-bottom: 24px;">
            <div style="font-size: 26px; font-weight: 800;">${ex.name}</div>
            <div class="text-muted">${ex.type.toUpperCase()} · ${ex.sets} sets × ${ex.reps} reps</div>
          </div>
          <div class="flex-between" style="margin: 16px 0;">
            <span>Set ${currentSetNum} / ${ex.sets}</span>
            <span>⚡ Rest 45s</span>
          </div>
          <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <button class="btn btn-primary" id="completeSetBtn">✅ Complete Set</button>
            <button class="btn" id="nextExBtn">➡️ Next Exercise</button>
            <button class="btn" id="prevExBtn">⬅️ Prev</button>
          </div>
          <div class="text-muted" style="margin-top: 20px; text-align: center;">Complete all sets to advance</div>
        </div>
      `;
      
      let existing = document.getElementById("runnerPanel");
      if (existing) existing.remove();
      
      const div = document.createElement("div");
      div.id = "runnerPanel";
      div.innerHTML = runnerHtml;
      document.body.appendChild(div);
      
      document.getElementById("closeRunnerBtn")?.addEventListener("click", () => {
        div.remove();
        runnerActive = false;
      });
      
      document.getElementById("completeSetBtn")?.addEventListener("click", () => {
        if (currentSetNum < ex.sets) {
          currentSetNum++;
          showToast(`Set ${currentSetNum-1} done! Rest 45s`);
          updateRunnerUI();
        } else {
          if (currentExIdx + 1 < state.exercises.length) {
            currentExIdx++;
            currentSetNum = 1;
            showToast(`Next: ${state.exercises[currentExIdx].name}`);
            updateRunnerUI();
          } else {
            showToast("🏆 WORKOUT COMPLETE! Amazing job.");
            div.remove();
            runnerActive = false;
          }
        }
      });
      
      document.getElementById("nextExBtn")?.addEventListener("click", () => {
        if (currentExIdx + 1 < state.exercises.length) {
          currentExIdx++;
          currentSetNum = 1;
          updateRunnerUI();
        } else showToast("Last exercise");
      });
      
      document.getElementById("prevExBtn")?.addEventListener("click", () => {
        if (currentExIdx > 0) {
          currentExIdx--;
          currentSetNum = 1;
          updateRunnerUI();
        } else showToast("First exercise");
      });
    }

    // ========== TOAST ==========
    function showToast(msg, duration = 1500) {
      const toast = document.getElementById("toast");
      toast.innerText = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), duration);
    }
