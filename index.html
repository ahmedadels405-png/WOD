<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Field+Iron — Fixed</title>
  <meta name="theme-color" content="#071018">
  <style>
    :root{
      --radius:12px; --max-width:1200px; --ui-transition:180ms; --muted:#9fb3c8; --text:#e6eef6; --accent:#ff6a00;
      --bg: linear-gradient(180deg,#071018,#071827); --card: rgba(255,255,255,0.02);
    }
    body{margin:0;font-family:Inter,system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:var(--bg); color:var(--text); padding:18px; box-sizing:border-box;}
    .wrap{max-width:var(--max-width);margin:0 auto;display:flex;flex-direction:column;gap:18px;min-height:100vh;}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(90deg,var(--accent),rgba(255,255,255,0.06));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;}
    .title{display:flex;flex-direction:column;}
    .title h1{margin:0;font-size:18px;}
    .subtitle{margin:0;color:var(--muted);font-size:13px;}
    main{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start;}
    @media (max-width:980px){ main{grid-template-columns:1fr;} }
    .panel{background:var(--card);border-radius:10px;padding:14px;}
    .section-title{margin:0 0 8px 0;color:var(--muted);font-size:15px;}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .btn{border:none;padding:9px 12px;border-radius:10px;cursor:pointer;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.02);}
    .btn-primary{background:linear-gradient(90deg,var(--accent),rgba(255,255,255,0.04));color:#fff;border:none;}
    .input{padding:9px 10px;border-radius:10px;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.02);}
    #workouts-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
    .workout-item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.01);}
    .workout-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .muted{color:var(--muted);font-size:13px;}
    .hr{height:1px;background:rgba(255,255,255,0.03);margin:12px 0;border-radius:2px;}
    .empty{color:var(--muted);padding:12px 0;text-align:center;}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:28px;background:rgba(0,0,0,0.6);color:#fff;padding:10px 14px;border-radius:10px;display:none;z-index:9999;}
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <header>
      <div class="brand">
        <div class="logo" id="logo">FI</div>
        <div class="title">
          <h1>Field+Iron</h1>
          <div class="subtitle">Daily & Weekly workouts — simplified</div>
        </div>
      </div>
      <!-- top boxes removed as requested -->
      <div class="muted">v2.1</div>
    </header>

    <main>
      <section class="panel" aria-labelledby="view-heading">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h2 id="view-heading" class="section-title">Planner</h2>
            <div class="muted" id="current-day-label">Loading…</div>
          </div>

          <div class="controls" role="tablist" aria-label="View toggle">
            <button id="view-daily" class="btn">Daily</button>
            <button id="view-weekly" class="btn">Weekly</button>
          </div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;margin-top:12px;">
          <div class="controls">
            <button id="prev" class="btn">◀</button>
            <button id="next" class="btn">▶</button>
            <button id="today-btn" class="btn">Today</button>
          </div>
          <div style="flex:1"></div>
          <div class="muted">Default exercises: <strong id="default-count-label">5</strong></div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;margin-top:12px;">
          <input id="quick-add" class="input" type="text" placeholder="Quick add (Enter)" />
          <button id="quick-add-btn" class="btn-primary btn">Add</button>
          <button id="templates-btn" class="btn">Templates</button>
        </div>

        <div class="hr"></div>

        <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
          <input id="filter" class="input" type="text" placeholder="Filter workouts" />
          <div style="flex:1"></div>
          <button id="export-json" class="btn">Export</button>
          <label for="import-file" class="btn" style="cursor:pointer;">Import</label>
          <input id="import-file" type="file" accept="application/json" style="display:none" />
        </div>

        <div id="daily-view">
          <div id="workouts-list" aria-live="polite"></div>
        </div>

        <div id="weekly-view" class="hidden">
          <div id="week-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;"></div>
        </div>

        <div class="hr"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="controls">
            <button id="clear-all" class="btn">Clear Day</button>
            <button id="reset-defaults" class="btn">Reset Defaults</button>
            <button id="undo-btn" class="btn">Undo</button>
          </div>
          <div class="muted">Saved locally</div>
        </div>

        <div class="hr"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <strong>Session</strong>
            <div class="muted" id="session-status">Idle</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div id="session-timer" class="muted">00:00</div>
            <div class="controls">
              <button id="start-session" class="btn-primary btn">Start</button>
              <button id="pause-session" class="btn">Pause</button>
              <button id="stop-session" class="btn">Stop</button>
            </div>
          </div>
        </div>
      </section>

      <aside>
        <section class="panel">
          <h3 class="section-title">Settings</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <label class="muted">Show timezone <div id="show-timezone" class="btn" style="display:inline-block;margin-left:8px;">On</div></label>
            <label class="muted">Short weekday <div id="use-short-day" class="btn" style="display:inline-block;margin-left:8px;">Off</div></label>
            <label class="muted">Enable offline <div id="enable-sw" class="btn" style="display:inline-block;margin-left:8px;">Off</div></label>
            <label class="muted">Vibrate <div id="vibrate" class="btn" style="display:inline-block;margin-left:8px;">On</div></label>
          </div>

          <div class="hr"></div>

          <div style="display:flex;flex-direction:column;gap:8px;">
            <label class="muted">Default exercise count
              <input id="default-count" class="input" type="number" min="1" max="12" value="5" />
            </label>
            <label class="muted">Base exercises (comma separated)
              <textarea id="base-exercises" class="input" rows="3">Reverse Lunge — 4 sets × 8 ea, Kettlebell Farmer Carry — 4 sets × 50m, DB Bulgarian Split — 3 sets × 8 ea, Goblet Squat — 3 sets × 10, Push Up — 3 sets × 12</textarea>
            </label>
            <div style="display:flex;gap:8px;">
              <button id="save-settings" class="btn-primary btn">Save</button>
              <button id="reset-settings" class="btn">Reset</button>
            </div>
          </div>
        </section>

        <section class="panel" style="margin-top:12px;">
          <h3 class="section-title">Session Log</h3>
          <div id="session-log" class="empty">No sessions yet.</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:12px;">
            <button id="download-log" class="btn">Download Log</button>
            <button id="clear-log" class="btn">Clear Log</button>
            <div style="flex:1"></div>
            <span class="muted">Local only</span>
          </div>
        </section>
      </aside>
    </main>

    <footer style="display:flex;justify-content:space-between;align-items:center;">
      <small class="muted">Field+Iron • Local only</small>
      <div class="muted">v2.1</div>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
  (function(){
    'use strict';

    const STORAGE_BY_DATE = 'fieldiron.byDate.v2';
    const SETTINGS_KEY = 'fieldiron.settings.v8';
    const LOG_KEY = 'fieldiron.sessions.v1';
    const DEFAULTS = {
      defaultExerciseCount: 5,
      baseExercises: [
        'Reverse Lunge — 4 sets × 8 ea',
        'Kettlebell Farmer Carry — 4 sets × 50m',
        'DB Bulgarian Split — 3 sets × 8 ea',
        'Goblet Squat — 3 sets × 10',
        'Push Up — 3 sets × 12'
      ],
      dailyStretches: [
        'Kneeling Hip Flexor Stretch — 2 sets × 30s ea',
        'Standing Hamstring Stretch — 2 sets × 30s ea',
        'Child Pose Hold — 1 × 60s'
      ]
    };

    function nowISO(){ return new Date().toISOString(); }
    function todayISO(){ return new Date().toISOString().slice(0,10); }
    function dateAdd(dateISO, days){ const d = new Date(dateISO + 'T00:00:00'); d.setDate(d.getDate() + days); return d.toISOString().slice(0,10); }
    function showToast(msg, ms=1800){ const t = document.getElementById('toast'); t.textContent = msg; t.style.display='block'; clearTimeout(t._t); t._t = setTimeout(()=> t.style.display='none', ms); }
    function safeParse(raw, fallback){ try{ return JSON.parse(raw); }catch(e){ return fallback; } }

    function loadSettings(){
      try{
        const raw = localStorage.getItem(SETTINGS_KEY);
        if(!raw) return { preset:'dark', accent:'orange', view:'daily', selectedDate: todayISO(), defaultExerciseCount: DEFAULTS.defaultExerciseCount, baseExercises: DEFAULTS.baseExercises.slice() };
        return Object.assign({ preset:'dark', accent:'orange', view:'daily', selectedDate: todayISO(), defaultExerciseCount: DEFAULTS.defaultExerciseCount, baseExercises: DEFAULTS.baseExercises.slice() }, JSON.parse(raw));
      }catch(e){ return { preset:'dark', accent:'orange', view:'daily', selectedDate: todayISO(), defaultExerciseCount: DEFAULTS.defaultExerciseCount, baseExercises: DEFAULTS.baseExercises.slice() }; }
    }
    function saveSettings(s){ try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }catch(e){ console.warn(e); } }

    function loadAll(){ return safeParse(localStorage.getItem(STORAGE_BY_DATE), {}); }
    function saveAll(obj){ try{ localStorage.setItem(STORAGE_BY_DATE, JSON.stringify(obj)); }catch(e){ console.warn(e); } }

    function ensureDate(dateISO){
      const all = loadAll();
      if(!Array.isArray(all[dateISO]) || all[dateISO].length===0){
        const s = loadSettings();
        const base = (s.baseExercises && s.baseExercises.length) ? s.baseExercises.slice() : DEFAULTS.baseExercises.slice();
        const pre = base.slice(0, s.defaultExerciseCount || DEFAULTS.defaultExerciseCount);
        all[dateISO] = pre.concat(DEFAULTS.dailyStretches);
        saveAll(all);
      }
      return all[dateISO];
    }

    function loadFor(dateISO){ const all = loadAll(); return all[dateISO] ? all[dateISO] : ensureDate(dateISO); }
    function saveFor(dateISO, list){ const all = loadAll(); all[dateISO] = list; saveAll(all); }

    function renderWorkouts(filter){
      const s = loadSettings();
      const dateISO = s.selectedDate || todayISO();
      document.getElementById('current-day-label').textContent = new Date(dateISO + 'T00:00:00').toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
      ensureDate(dateISO); // guarantee population
      const list = loadFor(dateISO);
      const q = filter && filter.trim() ? filter.trim().toLowerCase() : '';
      const container = document.getElementById('workouts-list');
      container.innerHTML = '';
      const filtered = q ? list.filter(i => i.toLowerCase().includes(q)) : list;
      if(!filtered.length){ container.innerHTML = '<div class="empty">No workouts yet. Add one below.</div>'; return; }
      filtered.forEach((text, idx) => {
        const row = document.createElement('div'); row.className = 'workout-item';
        const left = document.createElement('div'); left.style.flex='1';
        const title = document.createElement('div'); title.className = 'workout-title'; title.textContent = text;
        const meta = document.createElement('div'); meta.className = 'muted'; meta.textContent = `#${idx+1}`;
        left.appendChild(title); left.appendChild(meta);
        const actions = document.createElement('div');
        const up = document.createElement('button'); up.className='btn'; up.textContent='↑'; up.onclick = ()=> moveItem(idx, -1, dateISO);
        const down = document.createElement('button'); down.className='btn'; down.textContent='↓'; down.onclick = ()=> moveItem(idx, 1, dateISO);
        const del = document.createElement('button'); del.className='btn'; del.textContent='✕'; del.onclick = ()=> removeItem(idx, dateISO);
        actions.appendChild(up); actions.appendChild(down); actions.appendChild(del);
        row.appendChild(left); row.appendChild(actions);
        container.appendChild(row);
      });
    }

    function addWorkoutTo(dateISO, text){
      if(!text || !text.trim()) return;
      const list = loadFor(dateISO);
      list.unshift(text.trim());
      saveFor(dateISO, list);
      renderCurrentView();
      showToast('Workout added');
    }
    function removeItem(index, dateISO){
      const list = loadFor(dateISO);
      if(index<0||index>=list.length) return;
      list.splice(index,1);
      saveFor(dateISO, list);
      renderCurrentView();
      showToast('Workout removed');
    }
    function moveItem(index, delta, dateISO){
      const list = loadFor(dateISO);
      const to = index + delta;
      if(to<0||to>=list.length) return;
      const [it] = list.splice(index,1);
      list.splice(to,0,it);
      saveFor(dateISO, list);
      renderCurrentView();
    }

    function renderWeek(centerDate){
      const start = getWeekStart(centerDate);
      const grid = document.getElementById('week-grid'); grid.innerHTML = '';
      for(let i=0;i<7;i++){
        const dateISO = dateAdd(start, i);
        const d = new Date(dateISO + 'T00:00:00');
        const h = document.createElement('div'); h.style.fontWeight='700'; h.textContent = `${d.toLocaleDateString(undefined,{weekday:'short'})} • ${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}`;
        const card = document.createElement('div'); card.className='workout-item'; card.style.flexDirection='column';
        card.appendChild(h);
        const list = loadFor(dateISO);
        const preview = document.createElement('div'); preview.className='muted'; preview.style.marginTop='8px';
        if(!list || !list.length) preview.textContent = '—';
        else preview.textContent = list.slice(0,3).join(' • ');
        card.appendChild(preview);
        card.addEventListener('click', ()=> { const st = loadSettings(); st.selectedDate = dateISO; st.view = 'daily'; saveSettings(st); renderCurrentView(); });
        grid.appendChild(card);
      }
    }

    function getWeekStart(dateISO){ const d = new Date(dateISO + 'T00:00:00'); const day = d.getDay(); const diff = (day + 6) % 7; d.setDate(d.getDate() - diff); return d.toISOString().slice(0,10); }

    // session (kept minimal)
    let sessionTimer = null, sessionStart = null, sessionElapsed = 0;
    function startSession(){ if(sessionTimer) return; sessionStart = Date.now() - sessionElapsed; sessionTimer = setInterval(()=>{ sessionElapsed = Date.now() - sessionStart; document.getElementById('session-timer').textContent = msToTime(sessionElapsed); }, 250); document.getElementById('session-status').textContent = 'Running'; showToast('Session started'); }
    function pauseSession(){ if(!sessionTimer) return; clearInterval(sessionTimer); sessionTimer = null; document.getElementById('session-status').textContent = 'Paused'; showToast('Session paused'); }
    function stopSession(){ if(sessionTimer){ clearInterval(sessionTimer); sessionTimer = null; } const duration = msToTime(sessionElapsed); const s = loadSettings(); const log = safeParse(localStorage.getItem(LOG_KEY), []); log.unshift({ title:`Session ${new Date().toLocaleString()}`, startedAt: sessionStart ? new Date(sessionStart).toISOString() : new Date().toISOString(), duration, notes:`Date: ${s.selectedDate || todayISO()}` }); localStorage.setItem(LOG_KEY, JSON.stringify(log)); sessionElapsed = 0; sessionStart = null; document.getElementById('session-status').textContent = 'Idle'; renderSessionLog(); showToast('Session stopped'); }
    function msToTime(ms){ const s = Math.floor(ms/1000)%60; const m = Math.floor(ms/(60*1000))%60; const h = Math.floor(ms/(60*60*1000)); return (h? (h+':') : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); }

    function renderSessionLog(){ const el = document.getElementById('session-log'); const log = safeParse(localStorage.getItem(LOG_KEY), []); if(!el) return; if(!log.length){ el.className='empty'; el.textContent='No sessions yet.'; return; } el.className=''; el.innerHTML=''; log.forEach(entry=>{ const d = document.createElement('div'); d.style.padding='8px 0'; d.style.borderBottom='1px solid rgba(255,255,255,0.02)'; d.innerHTML = `<strong style="display:block;color:var(--text)">${entry.title}</strong><div class="muted">${new Date(entry.startedAt).toLocaleDateString()} — ${entry.duration}</div><div class="muted" style="margin-top:6px">${entry.notes||''}</div>`; el.appendChild(d); }); }

    function renderCurrentView(){
      const s = loadSettings();
      document.getElementById('default-count-label').textContent = s.defaultExerciseCount || DEFAULTS.defaultExerciseCount;
      document.getElementById('default-count').value = s.defaultExerciseCount || DEFAULTS.defaultExerciseCount;
      document.getElementById('base-exercises').value = (s.baseExercises && s.baseExercises.length) ? s.baseExercises.join(', ') : DEFAULTS.baseExercises.join(', ');
      if(s.view === 'weekly'){ document.getElementById('daily-view').classList.add('hidden'); document.getElementById('weekly-view').classList.remove('hidden'); renderWeek(s.selectedDate || todayISO()); }
      else { document.getElementById('daily-view').classList.remove('hidden'); document.getElementById('weekly-view').classList.add('hidden'); renderWorkouts(document.getElementById('filter').value); }
    }

    // init wiring
    document.addEventListener('DOMContentLoaded', ()=>{
      const s = loadSettings();
      if(!s.selectedDate) s.selectedDate = todayISO();
      saveSettings(s);
      // ensure the selected date is populated immediately
      ensureDate(s.selectedDate);
      renderCurrentView();
      renderSessionLog();

      // wire controls
      document.getElementById('view-daily').addEventListener('click', ()=>{ const st = loadSettings(); st.view='daily'; saveSettings(st); renderCurrentView(); });
      document.getElementById('view-weekly').addEventListener('click', ()=>{ const st = loadSettings(); st.view='weekly'; saveSettings(st); renderCurrentView(); });
      document.getElementById('prev').addEventListener('click', ()=>{ const st = loadSettings(); st.selectedDate = (st.view==='weekly') ? dateAdd(st.selectedDate, -7) : dateAdd(st.selectedDate, -1); saveSettings(st); renderCurrentView(); });
      document.getElementById('next').addEventListener('click', ()=>{ const st = loadSettings(); st.selectedDate = (st.view==='weekly') ? dateAdd(st.selectedDate, 7) : dateAdd(st.selectedDate, 1); saveSettings(st); renderCurrentView(); });
      document.getElementById('today-btn').addEventListener('click', ()=>{ const st = loadSettings(); st.selectedDate = todayISO(); saveSettings(st); renderCurrentView(); showToast('Jumped to today'); });

      document.getElementById('quick-add-btn').addEventListener('click', ()=>{ const st = loadSettings(); addWorkoutTo(st.selectedDate || todayISO(), document.getElementById('quick-add').value); document.getElementById('quick-add').value=''; });
      document.getElementById('quick-add').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ const st = loadSettings(); addWorkoutTo(st.selectedDate || todayISO(), document.getElementById('quick-add').value); document.getElementById('quick-add').value=''; } });

      document.getElementById('filter').addEventListener('input', ()=> renderWorkouts(document.getElementById('filter').value));
      document.getElementById('export-json').addEventListener('click', ()=>{ const payload = { byDate: loadAll(), exportedAt: nowISO() }; const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download='fieldiron-by-date.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); showToast('Export started'); });
      document.getElementById('import-file').addEventListener('change', (e)=>{ const f = e.target.files && e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev)=>{ try{ const parsed = JSON.parse(ev.target.result); if(parsed && parsed.byDate){ saveAll(parsed.byDate); renderCurrentView(); showToast('Imported'); } else alert('Invalid file'); }catch(err){ alert('Failed to parse'); } }; r.readAsText(f); e.target.value=''; });

      document.getElementById('clear-all').addEventListener('click', ()=>{ if(!confirm('Clear all workouts for selected day?')) return; const st = loadSettings(); saveFor(st.selectedDate || todayISO(), []); renderCurrentView(); showToast('Day cleared'); });
      document.getElementById('reset-defaults').addEventListener('click', ()=>{ if(!confirm('Reset selected day to defaults?')) return; const st = loadSettings(); const base = st.baseExercises && st.baseExercises.length ? st.baseExercises.slice() : DEFAULTS.baseExercises.slice(); const pre = base.slice(0, st.defaultExerciseCount || DEFAULTS.defaultExerciseCount); saveFor(st.selectedDate || todayISO(), pre.concat(DEFAULTS.dailyStretches)); renderCurrentView(); showToast('Defaults restored'); });
      document.getElementById('undo-btn').addEventListener('click', ()=>{ const stack = safeParse(localStorage.getItem('fieldiron.undo.v1'), []); if(!stack.length){ showToast('Nothing to undo'); return; } const snap = stack.shift(); localStorage.setItem('fieldiron.undo.v1', JSON.stringify(stack)); const all = loadAll(); all[snap.date] = snap.workouts; saveAll(all); renderCurrentView(); showToast('Undo applied'); });

      document.getElementById('start-session').addEventListener('click', startSession);
      document.getElementById('pause-session').addEventListener('click', pauseSession);
      document.getElementById('stop-session').addEventListener('click', stopSession);

      document.getElementById('save-settings').addEventListener('click', ()=>{ const st = loadSettings(); st.defaultExerciseCount = Math.max(1, Math.min(12, Number(document.getElementById('default-count').value) || DEFAULTS.defaultExerciseCount)); st.baseExercises = document.getElementById('base-exercises').value.split(',').map(s=>s.trim()).filter(Boolean); saveSettings(st); // ensure selected date uses new defaults next time
        showToast('Settings saved'); renderCurrentView(); });

      document.getElementById('reset-settings').addEventListener('click', ()=>{ const st = loadSettings(); st.defaultExerciseCount = DEFAULTS.defaultExerciseCount; st.baseExercises = DEFAULTS.baseExercises.slice(); saveSettings(st); document.getElementById('default-count').value = st.defaultExerciseCount; document.getElementById('base-exercises').value = st.baseExercises.join(', '); showToast('Settings reset'); renderCurrentView(); });

      renderCurrentView();
    });

    // expose for debugging
    try{ window.__FieldIron = { loadAll, saveAll, loadFor, saveFor, loadSettings, saveSettings, ensureDate }; }catch(e){}
  })();
  </script>
</body>
</html>
