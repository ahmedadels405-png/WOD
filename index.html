<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IGNITE — Explosive Fat Loss</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b35, #f7b05e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub {
            color: #888;
            margin-bottom: 30px;
        }

        .card {
            background: #1a1e24;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .exercise-item {
            background: #252a33;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .exercise-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .exercise-details {
            font-size: 12px;
            color: #ff8c5a;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            background: #2f3540;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button.primary {
            background: linear-gradient(135deg, #ff6b35, #f7b05e);
            color: #0a0c10;
        }

        button:hover {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .theme-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a1e24;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .metrics-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .metric-input {
            flex: 1;
        }

        .metric-input label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .metric-input input {
            width: 100%;
            background: #252a33;
            border: none;
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .progress-bar {
            background: #252a33;
            border-radius: 20px;
            height: 8px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #ff6b35, #f7b05e);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }

        .toast.show {
            display: block;
        }

        input {
            background: #252a33;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
            flex: 1;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ IGNITE</h1>
    <div class="sub">explosive · compound · fat loss</div>

    <!-- Stats Display -->
    <div class="stats">
        <div class="stat-card">
            <div>🔥 CALORIES</div>
            <div class="stat-value" id="calories">0</div>
        </div>
        <div class="stat-card">
            <div>⚡ POWER SCORE</div>
            <div class="stat-value" id="powerScore">0</div>
        </div>
        <div class="stat-card">
            <div>🎯 BODY FAT</div>
            <div class="stat-value" id="bodyfatDisplay">0%</div>
        </div>
    </div>

    <!-- Body Metrics Card -->
    <div class="card">
        <h2>📊 BODY METRICS</h2>
        <div class="metrics-row">
            <div class="metric-input">
                <label>Weight (kg)</label>
                <input type="number" id="weightInput" step="0.5" placeholder="Enter weight">
            </div>
            <div class="metric-input">
                <label>Body Fat %</label>
                <input type="number" id="bodyfatInput" step="0.5" placeholder="Enter body fat %">
            </div>
            <div class="metric-input">
                <label>Target BF %</label>
                <input type="number" id="targetBfInput" step="0.5" placeholder="Target">
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="progressText" style="font-size: 12px; color: #888; text-align: center;"></div>
        <div class="flex-row">
            <button id="saveMetricsBtn" class="primary" style="flex:1">💾 Save Metrics</button>
            <button id="resetMetricsBtn" style="flex:1">↺ Reset</button>
        </div>
    </div>

    <!-- Workout Card -->
    <div class="card">
        <h2>💥 TODAY'S WORKOUT (5 EXERCISES)</h2>
        
        <div class="theme-buttons">
            <button id="btnExplosive" class="primary">⚡ Explosive</button>
            <button id="btnFatLoss">🔥 Fat Loss</button>
            <button id="btnStrength">💪 Strength</button>
            <button id="btnGenerate">✨ Generate New</button>
        </div>

        <div id="workoutList"></div>

        <div class="flex-row">
            <input type="text" id="customExercise" placeholder="Add custom exercise...">
            <button id="btnAdd">+ Add</button>
            <button id="btnSave">💾 Save</button>
        </div>
    </div>

    <!-- Mobility Card -->
    <div class="card">
        <h2>🧘 MOBILITY (3)</h2>
        <div id="mobilityList"></div>
        <button id="btnAddMobility" style="margin-top: 10px;">+ Add Mobility</button>
    </div>

    <!-- Saved Routines -->
    <div class="card">
        <h2>📁 SAVED ROUTINES</h2>
        <div id="savedRoutinesList"></div>
    </div>

    <button id="btnStartWorkout" class="primary" style="width: 100%; padding: 15px; font-size: 16px;">🚀 START WORKOUT</button>
</div>

<div id="toast" class="toast"></div>

<script>
    // EXERCISE DATABASE
    const COMPOUND_EXERCISES = [
        { name: "Power Clean", type: "explosive", cals: 12, sets: 4, reps: "6-8" },
        { name: "Thruster", type: "explosive", cals: 11, sets: 4, reps: "8-10" },
        { name: "Deadlift", type: "strength", cals: 9, sets: 3, reps: "8-10" },
        { name: "Back Squat", type: "strength", cals: 8, sets: 3, reps: "8-10" },
        { name: "Barbell Row", type: "strength", cals: 7, sets: 3, reps: "8-10" },
        { name: "Bench Press", type: "strength", cals: 7, sets: 3, reps: "8-10" },
        { name: "Push Press", type: "explosive", cals: 10, sets: 4, reps: "6-8" },
        { name: "Kettlebell Swing", type: "explosive", cals: 11, sets: 4, reps: "12-15" },
        { name: "Box Jump", type: "explosive", cals: 12, sets: 4, reps: "5-6" },
        { name: "Burpee", type: "fatloss", cals: 14, sets: 3, reps: "10-12" },
        { name: "Clean & Jerk", type: "explosive", cals: 13, sets: 4, reps: "5-6" },
        { name: "Front Squat", type: "strength", cals: 8, sets: 3, reps: "8-10" },
        { name: "Pull-up", type: "strength", cals: 7, sets: 3, reps: "6-8" },
        { name: "Dip", type: "strength", cals: 7, sets: 3, reps: "8-10" },
        { name: "Lunge Jump", type: "explosive", cals: 11, sets: 4, reps: "8-10" },
        { name: "Medicine Ball Slam", type: "explosive", cals: 10, sets: 4, reps: "10-12" }
    ];

    const ISOLATION_EXERCISES = [
        { name: "Barbell Curl", type: "isolation", cals: 5, sets: 3, reps: "10-12" },
        { name: "Triceps Extension", type: "isolation", cals: 5, sets: 3, reps: "10-12" },
        { name: "Lateral Raise", type: "isolation", cals: 5, sets: 3, reps: "12-15" },
        { name: "Leg Curl", type: "isolation", cals: 5, sets: 3, reps: "10-12" },
        { name: "Calf Raise", type: "isolation", cals: 4, sets: 3, reps: "15-20" },
        { name: "Face Pull", type: "isolation", cals: 5, sets: 3, reps: "12-15" },
        { name: "Skull Crusher", type: "isolation", cals: 5, sets: 3, reps: "10-12" }
    ];

    const DEFAULT_MOBILITY = ["Deep Squat Hold", "Cat-Cow Stretch", "World's Greatest Stretch"];

    // STATE
    let currentWorkout = [];
    let mobilityList = [...DEFAULT_MOBILITY];
    let currentTheme = "explosive";
    let savedRoutines = {};
    
    // BODY METRICS STATE
    let bodyMetrics = {
        weight: 80,
        bodyfat: 18,
        targetBodyfat: 12
    };

    // Helper
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    // Load/Save Metrics
    function loadMetrics() {
        const saved = localStorage.getItem("ignite_metrics");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                bodyMetrics = parsed;
            } catch(e) {}
        }
        
        document.getElementById("weightInput").value = bodyMetrics.weight;
        document.getElementById("bodyfatInput").value = bodyMetrics.bodyfat;
        document.getElementById("targetBfInput").value = bodyMetrics.targetBodyfat;
        updateMetricsDisplay();
    }

    function saveMetrics() {
        const weight = parseFloat(document.getElementById("weightInput").value);
        const bodyfat = parseFloat(document.getElementById("bodyfatInput").value);
        const target = parseFloat(document.getElementById("targetBfInput").value);
        
        if (!isNaN(weight)) bodyMetrics.weight = weight;
        if (!isNaN(bodyfat)) bodyMetrics.bodyfat = bodyfat;
        if (!isNaN(target)) bodyMetrics.targetBodyfat = target;
        
        localStorage.setItem("ignite_metrics", JSON.stringify(bodyMetrics));
        updateMetricsDisplay();
        showToast("Metrics saved!");
    }

    function resetMetrics() {
        bodyMetrics = { weight: 80, bodyfat: 18, targetBodyfat: 12 };
        document.getElementById("weightInput").value = 80;
        document.getElementById("bodyfatInput").value = 18;
        document.getElementById("targetBfInput").value = 12;
        updateMetricsDisplay();
        localStorage.setItem("ignite_metrics", JSON.stringify(bodyMetrics));
        showToast("Metrics reset to defaults");
    }

    function updateMetricsDisplay() {
        // Update stat card
        document.getElementById("bodyfatDisplay").textContent = bodyMetrics.bodyfat + "%";
        
        // Update progress bar
        const current = bodyMetrics.bodyfat;
        const target = bodyMetrics.targetBodyfat;
        const start = Math.max(target + 15, current);
        const progress = Math.min(100, Math.max(0, ((start - current) / (start - target)) * 100));
        document.getElementById("progressFill").style.width = progress + "%";
        
        const toLose = current - target;
        if (toLose > 0) {
            document.getElementById("progressText").textContent = `${toLose.toFixed(1)}% to goal · ${((current - target) * 0.8).toFixed(1)} kg to lose`;
        } else {
            document.getElementById("progressText").textContent = `✓ Goal achieved! Maintain at ${current}%`;
        }
    }

    // Generate workout
    function generateWorkout() {
        let compoundPool = [...COMPOUND_EXERCISES];
        
        if (currentTheme === "explosive") {
            compoundPool = COMPOUND_EXERCISES.filter(e => e.type === "explosive");
        } else if (currentTheme === "fatloss") {
            compoundPool = COMPOUND_EXERCISES.filter(e => e.type === "fatloss" || e.type === "explosive");
        }
        
        if (compoundPool.length < 4) {
            compoundPool = [...COMPOUND_EXERCISES];
        }
        
        // Shuffle
        for (let i = compoundPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [compoundPool[i], compoundPool[j]] = [compoundPool[j], compoundPool[i]];
        }
        
        const compounds = compoundPool.slice(0, 4);
        const isolation = ISOLATION_EXERCISES[Math.floor(Math.random() * ISOLATION_EXERCISES.length)];
        
        currentWorkout = [...compounds, isolation];
        
        renderWorkout();
        updateStats();
        showToast(`🔥 ${currentTheme.toUpperCase()} workout generated!`);
    }

    // Render workout list
    function renderWorkout() {
        const container = document.getElementById("workoutList");
        if (!container) return;
        
        if (currentWorkout.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Click Generate New</div>';
            return;
        }
        
        let html = "";
        for (let i = 0; i < currentWorkout.length; i++) {
            const ex = currentWorkout[i];
            const typeLabel = i < 4 ? "⚡ COMPOUND" : "🎯 ISOLATION";
            html += `
                <div class="exercise-item">
                    <div>
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-details">${ex.sets} sets × ${ex.reps} reps · ${ex.type.toUpperCase()} · ${typeLabel}</div>
                    </div>
                    <div class="btn-group">
                        <button class="auto-replace" data-index="${i}">🤖 Auto</button>
                        <button class="manual-replace" data-index="${i}">🔄 Swap</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Auto replace buttons
        document.querySelectorAll(".auto-replace").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.dataset.index);
                autoReplace(idx);
            });
        });
        
        // Manual replace buttons
        document.querySelectorAll(".manual-replace").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.dataset.index);
                manualReplace(idx);
            });
        });
    }

    // Auto replace
    function autoReplace(index) {
        let pool;
        if (index === 4) {
            pool = ISOLATION_EXERCISES.filter(e => e.name !== currentWorkout[index].name);
        } else {
            pool = COMPOUND_EXERCISES.filter(e => e.name !== currentWorkout[index].name);
        }
        
        if (pool.length === 0) {
            showToast("No replacement available");
            return;
        }
        
        const newEx = pool[Math.floor(Math.random() * pool.length)];
        currentWorkout[index] = { ...newEx };
        renderWorkout();
        updateStats();
        showToast(`Replaced with ${newEx.name}`);
    }

    // Manual replace
    function manualReplace(index) {
        const allExercises = [...COMPOUND_EXERCISES, ...ISOLATION_EXERCISES];
        let message = "Choose an exercise:\n\n";
        for (let i = 0; i < allExercises.length; i++) {
            message += `${i + 1}. ${allExercises[i].name} (${allExercises[i].type})\n`;
        }
        message += "\nEnter number:";
        
        const choice = prompt(message);
        const num = parseInt(choice);
        if (num && num >= 1 && num <= allExercises.length) {
            currentWorkout[index] = { ...allExercises[num - 1] };
            renderWorkout();
            updateStats();
            showToast(`Replaced with ${allExercises[num - 1].name}`);
        }
    }

    // Update stats
    function updateStats() {
        if (currentWorkout.length === 0) return;
        
        const totalCals = currentWorkout.reduce((sum, ex) => sum + (ex.cals * 4), 0);
        document.getElementById("calories").textContent = totalCals;
        
        const explosiveCount = currentWorkout.filter(e => e.type === "explosive").length;
        const powerScore = Math.min(100, 40 + (explosiveCount * 12));
        document.getElementById("powerScore").textContent = powerScore;
    }

    // Render mobility
    function renderMobility() {
        const container = document.getElementById("mobilityList");
        if (!container) return;
        
        let html = "";
        for (let i = 0; i < mobilityList.length; i++) {
            html += `
                <div class="exercise-item">
                    <div class="exercise-name">🧘 ${mobilityList[i]}</div>
                    <button class="remove-mobility" data-idx="${i}">✖️</button>
                </div>
            `;
        }
        container.innerHTML = html;
        
        document.querySelectorAll(".remove-mobility").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                mobilityList.splice(idx, 1);
                renderMobility();
                showToast("Removed");
            });
        });
    }

    function addMobility() {
        const name = prompt("Enter mobility name:");
        if (name && name.trim()) {
            mobilityList.push(name.trim());
            renderMobility();
            showToast(`Added ${name}`);
        }
    }

    function addCustomExercise() {
        const input = document.getElementById("customExercise");
        const name = input.value.trim();
        if (!name) return;
        
        currentWorkout.push({
            name: name,
            type: "strength",
            cals: 7,
            sets: 3,
            reps: "8-10"
        });
        
        if (currentWorkout.length > 5) currentWorkout.shift();
        
        renderWorkout();
        updateStats();
        input.value = "";
        showToast(`Added ${name}`);
    }

    function saveRoutine() {
        const name = prompt("Name this routine:");
        if (name) {
            savedRoutines[name] = JSON.parse(JSON.stringify(currentWorkout));
            localStorage.setItem("ignite_routines", JSON.stringify(savedRoutines));
            renderSavedRoutines();
            showToast(`Saved "${name}"`);
        }
    }

    function renderSavedRoutines() {
        const container = document.getElementById("savedRoutinesList");
        const names = Object.keys(savedRoutines);
        if (names.length === 0) {
            container.innerHTML = '<div style="color:#888;">No saved routines</div>';
            return;
        }
        
        let html = "";
        for (const name of names) {
            html += `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 8px; background: #252a33; border-radius: 12px;">
                    <span>📁 ${name}</span>
                    <div>
                        <button class="load-routine" data-name="${name}" style="margin-right: 5px;">Load</button>
                        <button class="delete-routine" data-name="${name}">Delete</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        document.querySelectorAll(".load-routine").forEach(btn => {
            btn.addEventListener("click", () => {
                const name = btn.dataset.name;
                currentWorkout = JSON.parse(JSON.stringify(savedRoutines[name]));
                renderWorkout();
                updateStats();
                showToast(`Loaded "${name}"`);
            });
        });
        
        document.querySelectorAll(".delete-routine").forEach(btn => {
            btn.addEventListener("click", () => {
                const name = btn.dataset.name;
                delete savedRoutines[name];
                localStorage.setItem("ignite_routines", JSON.stringify(savedRoutines));
                renderSavedRoutines();
                showToast(`Deleted "${name}"`);
            });
        });
    }

    function loadSavedRoutines() {
        const saved = localStorage.getItem("ignite_routines");
        if (saved) {
            try {
                savedRoutines = JSON.parse(saved);
                renderSavedRoutines();
            } catch(e) {}
        }
    }

    // Workout runner
    let runnerIndex = 0;
    let runnerSet = 1;
    
    function startWorkout() {
        if (currentWorkout.length === 0) {
            showToast("Generate a workout first!");
            return;
        }
        runnerIndex = 0;
        runnerSet = 1;
        showRunner();
    }
    
    function showRunner() {
        const ex = currentWorkout[runnerIndex];
        if (!ex) return;
        
        const html = `
            <div id="runnerOverlay" style="position: fixed; bottom: 0; left: 0; right: 0; background: #1a1e24; border-top: 3px solid #ff6b35; padding: 30px; z-index: 1000;">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 28px; font-weight: bold;">${ex.name}</div>
                    <div style="color: #ff8c5a; margin-top: 5px;">${ex.type.toUpperCase()} · ${ex.sets} sets × ${ex.reps} reps</div>
                </div>
                <div style="text-align: center; margin: 20px 0;">
                    <div style="font-size: 48px; font-weight: bold;">Set ${runnerSet} / ${ex.sets}</div>
                    <div style="color: #888;">Rest 45s between sets</div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                    <button id="runnerComplete" style="padding: 12px 24px; background: #ff6b35; border: none; border-radius: 40px; color: white; font-weight: bold;">✅ Complete Set</button>
                    <button id="runnerNext" style="padding: 12px 24px; background: #2f3540; border: none; border-radius: 40px; color: white;">➡️ Next</button>
                    <button id="runnerPrev" style="padding: 12px 24px; background: #2f3540; border: none; border-radius: 40px; color: white;">⬅️ Prev</button>
                    <button id="runnerClose" style="padding: 12px 24px; background: #3a2a2a; border: none; border-radius: 40px; color: white;">Close</button>
                </div>
            </div>
        `;
        
        let existing = document.getElementById("runnerOverlay");
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', html);
        
        document.getElementById("runnerComplete").onclick = () => {
            if (runnerSet < ex.sets) {
                runnerSet++;
                showRunner();
            } else {
                if (runnerIndex + 1 < currentWorkout.length) {
                    runnerIndex++;
                    runnerSet = 1;
                    showRunner();
                } else {
                    showToast("🏆 WORKOUT COMPLETE! Great job!");
                    document.getElementById("runnerOverlay")?.remove();
                }
            }
        };
        
        document.getElementById("runnerNext").onclick = () => {
            if (runnerIndex + 1 < currentWorkout.length) {
                runnerIndex++;
                runnerSet = 1;
                showRunner();
            } else {
                showToast("Last exercise");
            }
        };
        
        document.getElementById("runnerPrev").onclick = () => {
            if (runnerIndex > 0) {
                runnerIndex--;
                runnerSet = 1;
                showRunner();
            } else {
                showToast("First exercise");
            }
        };
        
        document.getElementById("runnerClose").onclick = () => {
            document.getElementById("runnerOverlay")?.remove();
        };
    }

    // INIT
    function init() {
        // Load saved data
        loadMetrics();
        loadSavedRoutines();
        
        // Load saved workout if exists
        const savedWorkout = localStorage.getItem("ignite_workout");
        if (savedWorkout) {
            try {
                currentWorkout = JSON.parse(savedWorkout);
            } catch(e) {}
        }
        
        // Set theme buttons
        document.getElementById("btnExplosive").onclick = () => {
            currentTheme = "explosive";
            generateWorkout();
        };
        document.getElementById("btnFatLoss").onclick = () => {
            currentTheme = "fatloss";
            generateWorkout();
        };
        document.getElementById("btnStrength").onclick = () => {
            currentTheme = "strength";
            generateWorkout();
        };
        document.getElementById("btnGenerate").onclick = () => generateWorkout();
        document.getElementById("btnAdd").onclick = () => addCustomExercise();
        document.getElementById("btnSave").onclick = () => saveRoutine();
        document.getElementById("btnAddMobility").onclick = () => addMobility();
        document.getElementById("btnStartWorkout").onclick = () => startWorkout();
        document.getElementById("saveMetricsBtn").onclick = () => saveMetrics();
        document.getElementById("resetMetricsBtn").onclick = () => resetMetrics();
        
        // Generate initial workout if empty
        if (currentWorkout.length === 0) {
            generateWorkout();
        } else {
            renderWorkout();
            updateStats();
        }
        
        renderMobility();
    }
    
    // Save workout when changed
    function saveWorkoutToLocal() {
        localStorage.setItem("ignite_workout", JSON.stringify(currentWorkout));
    }
    
    // Override save
    const origReplace = autoReplace;
    window.autoReplace = autoReplace;
    
    // Add save on workout change
    setInterval(() => {
        localStorage.setItem("ignite_workout", JSON.stringify(currentWorkout));
    }, 1000);
    
    init();
</script>
</body>
