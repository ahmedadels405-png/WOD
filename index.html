<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IGNITE — Explosive Fat Loss</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0c10;
      color: #ededee;
      padding: 20px 16px 100px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #f7b05e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: #8e9aaf;
      font-size: 13px;
      margin-top: 4px;
    }
    .date {
      background: rgba(255,255,255,0.04);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 12px;
      color: #8e9aaf;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      margin-top: 6px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }
    @media (max-width: 800px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: rgba(18, 22, 28, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-header h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .badge {
      background: rgba(255,107,53,0.15);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #ff8c5a;
    }

    .ex-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ex-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .ex-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,107,53,0.3);
    }
    .ex-info {
      flex: 1;
    }
    .ex-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .ex-meta {
      font-size: 11px;
      color: #8e9aaf;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(255,107,53,0.12);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      color: #ff8c5a;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      color: #ededee;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #f7b05e);
      border: none;
      color: #0a0c10;
    }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
    }
    .btn-danger {
      background: rgba(220,53,69,0.15);
      border-color: rgba(220,53,69,0.3);
    }
    .btn:hover {
      transform: scale(0.97);
      opacity: 0.9;
    }

    input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 12px;
      border-radius: 40px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    input:focus {
      border-color: #ff6b35;
    }

    .progress-bar {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      height: 6px;
      margin: 10px 0;
    }
    .progress-fill {
      background: linear-gradient(90deg, #ff6b35, #f7b05e);
      width: 0%;
      height: 100%;
      border-radius: 20px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: #12161c;
      border-radius: 32px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e2329;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 1100;
      transition: transform 0.2s;
      white-space: nowrap;
      border: 1px solid #ff6b35;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .text-muted { color: #8e9aaf; font-size: 12px; }
    .gap-2 { gap: 8px; }
  </style>
</head>
<body>
<div class="container">
  
  <div class="header">
    <div>
      <h1>⚡ IGNITE</h1>
      <div class="sub">explosive · compound · fat incineration</div>
    </div>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">🔥 CALORIE BURN</div>
      <div class="stat-value" id="calorieEstimate">~0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⚡ EXPLOSIVE SCORE</div>
      <div class="stat-value" id="explosiveScore">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🎯 BODY FAT</div>
      <div class="stat-value" id="fatPercent">0%</div>
      <div class="progress-bar"><div class="progress-fill" id="fatFill"></div></div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="card">
        <div class="card-header">
          <h2>💥 TODAY'S WORKOUT (5 EXERCISES)</h2>
          <div class="badge" id="workoutBadge">4 Compound + 1 Isolation</div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
          <button class="btn theme-btn" data-theme="explosive">⚡ Explosive</button>
          <button class="btn theme-btn" data-theme="fatloss">🔥 Fat Loss</button>
          <button class="btn theme-btn" data-theme="strength">💪 Strength</button>
          <button class="btn btn-primary" id="smartGenBtn">✨ Generate New</button>
        </div>

        <div id="exerciseList" class="ex-list"></div>

        <div class="flex-between gap-2 mt-3">
          <input type="text" id="customExInput" placeholder="Add custom exercise..." style="flex:1">
          <button class="btn" id="addCustomBtn">+ Add</button>
          <button class="btn btn-primary" id="saveRoutineBtn">💾 Save</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>🧘 MOBILITY (3)</h2>
          <button class="btn btn-sm" id="addMobilityBtn">+ Add</button>
        </div>
        <div id="mobilityList" class="ex-list"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-header">
          <h2>📊 BODY METRICS</h2>
        </div>
        <div>
          <div class="mb-2"><label class="text-muted">Weight (kg)</label><input type="number" id="weightInput" step="0.5" value="80" style="width:100%; margin-top:4px"></div>
          <div class="mb-2"><label class="text-muted">Body Fat %</label><input type="number" id="bfInput" step="0.5" value="18" style="width:100%; margin-top:4px"></div>
          <div class="mb-2"><label class="text-muted">Target BF %</label><input type="number" id="targetBfInput" step="0.5" value="12" style="width:100%; margin-top:4px"></div>
          <button class="btn btn-primary" id="updateMetricsBtn" style="width:100%">Update</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>🎮 QUICK ACTIONS</h2>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="btn btn-primary" id="startWorkoutBtn">🚀 START WORKOUT</button>
        </div>
        <div class="text-muted mt-3">📁 SAVED ROUTINES</div>
        <div id="savedRoutinesList" style="max-height: 200px; overflow-y: auto; margin-top: 8px;"></div>
      </div>
    </div>
  </div>
</div>

<div id="dbModal" class="modal">
  <div class="modal-content">
    <div class="flex-between">
      <h3>📚 Exercise Database</h3>
      <button class="btn" id="closeDbBtn">Close</button>
    </div>
    <input type="text" id="dbSearch" placeholder="Filter exercises..." style="width:100%; margin: 16px 0">
    <div id="dbList" style="display: flex; flex-direction: column; gap: 8px;"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // EXERCISE DATABASE - COMPOUND + ISOLATION FOCUS
  const COMPOUND_EXERCISES = [
    { name: "Power Clean", type: "explosive", calsPerMin: 12, sets: 4, reps: "6-8" },
    { name: "Thruster", type: "explosive", calsPerMin: 11, sets: 4, reps: "8-10" },
    { name: "Deadlift", type: "strength", calsPerMin: 9, sets: 3, reps: "8-10" },
    { name: "Back Squat", type: "strength", calsPerMin: 8, sets: 3, reps: "8-10" },
    { name: "Barbell Row", type: "strength", calsPerMin: 7, sets: 3, reps: "8-10" },
    { name: "Bench Press", type: "strength", calsPerMin: 7, sets: 3, reps: "8-10" },
    { name: "Push Press", type: "explosive", calsPerMin: 10, sets: 4, reps: "6-8" },
    { name: "Kettlebell Swing", type: "explosive", calsPerMin: 11, sets: 4, reps: "12-15" },
    { name: "Box Jump", type: "explosive", calsPerMin: 12, sets: 4, reps: "5-6" },
    { name: "Burpee", type: "fatloss", calsPerMin: 14, sets: 3, reps: "10-12" },
    { name: "Clean & Jerk", type: "explosive", calsPerMin: 13, sets: 4, reps: "5-6" },
    { name: "Front Squat", type: "strength", calsPerMin: 8, sets: 3, reps: "8-10" },
    { name: "Romanian Deadlift", type: "strength", calsPerMin: 7, sets: 3, reps: "10-12" },
    { name: "Pull-up", type: "strength", calsPerMin: 7, sets: 3, reps: "6-8" },
    { name: "Dip", type: "strength", calsPerMin: 7, sets: 3, reps: "8-10" },
    { name: "Lunge Jump", type: "explosive", calsPerMin: 11, sets: 4, reps: "8-10" },
    { name: "Medicine Ball Slam", type: "explosive", calsPerMin: 10, sets: 4, reps: "10-12" }
  ];

  const ISOLATION_EXERCISES = [
    { name: "Barbell Curl", type: "isolation", calsPerMin: 5, sets: 3, reps: "10-12" },
    { name: "Triceps Extension", type: "isolation", calsPerMin: 5, sets: 3, reps: "10-12" },
    { name: "Lateral Raise", type: "isolation", calsPerMin: 5, sets: 3, reps: "12-15" },
    { name: "Leg Curl", type: "isolation", calsPerMin: 5, sets: 3, reps: "10-12" },
    { name: "Leg Extension", type: "isolation", calsPerMin: 5, sets: 3, reps: "10-12" },
    { name: "Calf Raise", type: "isolation", calsPerMin: 4, sets: 3, reps: "15-20" },
    { name: "Face Pull", type: "isolation", calsPerMin: 5, sets: 3, reps: "12-15" },
    { name: "Skull Crusher", type: "isolation", calsPerMin: 5, sets: 3, reps: "10-12" },
    { name: "Hammer Curl", type: "isolation", calsPerMin: 5, sets: 3, reps: "10-12" }
  ];

  const DEFAULT_MOBILITY = ["Deep Squat Hold", "Cat-Cow Stretch", "World's Greatest Stretch"];

  // GLOBAL VARIABLES
  let currentExercises = [];
  let mobilityList = [...DEFAULT_MOBILITY];
  let profile = { weight: 80, bf: 18, targetBf: 12 };
  let savedRoutines = {};
  let currentTheme = "explosive";
  let pendingReplaceIndex = null;

  // SHOW TOAST MESSAGE
  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }

  // GENERATE WORKOUT - ALWAYS 5 EXERCISES (4 COMPOUND + 1 ISOLATION)
  function generateWorkout() {
    console.log("Generating workout with theme:", currentTheme);
    
    // Filter compounds based on theme
    let availableCompounds = [...COMPOUND_EXERCISES];
    
    if (currentTheme === "explosive") {
      availableCompounds = COMPOUND_EXERCISES.filter(e => e.type === "explosive" || e.type === "fatloss");
    } else if (currentTheme === "fatloss") {
      availableCompounds = COMPOUND_EXERCISES.filter(e => e.type === "fatloss" || e.type === "explosive");
    }
    
    // Make sure we have enough
    if (availableCompounds.length < 4) {
      availableCompounds = [...COMPOUND_EXERCISES];
    }
    
    // Shuffle
    for (let i = availableCompounds.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [availableCompounds[i], availableCompounds[j]] = [availableCompounds[j], availableCompounds[i]];
    }
    
    // Pick 4 compounds
    const compounds = availableCompounds.slice(0, 4);
    
    // Pick 1 isolation
    const isolation = ISOLATION_EXERCISES[Math.floor(Math.random() * ISOLATION_EXERCISES.length)];
    
    // Build workout
    currentExercises = [...compounds, isolation];
    
    // Save to localStorage
    localStorage.setItem("ignite_workout", JSON.stringify(currentExercises));
    
    // Update UI
    renderWorkout();
    updateStats();
    showToast(`🔥 ${currentTheme.toUpperCase()} workout generated!`);
  }

  // RENDER WORKOUT LIST
  function renderWorkout() {
    const container = document.getElementById("exerciseList");
    if (!container) return;
    
    if (!currentExercises || currentExercises.length === 0) {
      container.innerHTML = '<div class="text-muted" style="text-align: center; padding: 20px;">Click "Generate New" to start</div>';
      return;
    }
    
    let html = "";
    for (let i = 0; i < currentExercises.length; i++) {
      const ex = currentExercises[i];
      const isCompound = i < 4;
      html += `
        <div class="ex-item">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">
              <span>${ex.sets} sets × ${ex.reps} reps</span>
              <span class="tag">${ex.type.toUpperCase()} ${isCompound ? '⚡ COMPOUND' : '🎯 ISOLATION'}</span>
              <span>🔥 ~${ex.calsPerMin * 4} kcal</span>
            </div>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm auto-replace" data-index="${i}">🤖 Auto</button>
            <button class="btn btn-sm manual-replace" data-index="${i}">🔄 Swap</button>
          </div>
        </div>
      `;
    }
    
    container.innerHTML = html;
    
    // Auto-replace buttons
    document.querySelectorAll(".auto-replace").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.dataset.index);
        autoReplaceExercise(idx);
      });
    });
    
    // Manual swap buttons
    document.querySelectorAll(".manual-replace").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.dataset.index);
        pendingReplaceIndex = idx;
        openDatabaseModal();
      });
    });
  }

  // AUTO REPLACE EXERCISE
  function autoReplaceExercise(index) {
    const current = currentExercises[index];
    let pool = [];
    
    if (index === 4) {
      // Isolation slot
      pool = ISOLATION_EXERCISES.filter(e => e.name !== current.name);
    } else {
      // Compound slot
      pool = COMPOUND_EXERCISES.filter(e => e.name !== current.name);
    }
    
    if (pool.length === 0) {
      showToast("No replacement found");
      return;
    }
    
    const newEx = pool[Math.floor(Math.random() * pool.length)];
    currentExercises[index] = { ...newEx };
    localStorage.setItem("ignite_workout", JSON.stringify(currentExercises));
    renderWorkout();
    updateStats();
    showToast(`Replaced with ${newEx.name}`);
  }

  // MANUAL REPLACE (from database)
  function openDatabaseModal() {
    renderDatabaseList("");
    document.getElementById("dbModal").classList.add("active");
  }
  
  function renderDatabaseList(filter) {
    const container = document.getElementById("dbList");
    const allExercises = [...COMPOUND_EXERCISES, ...ISOLATION_EXERCISES];
    const filtered = allExercises.filter(ex => 
      ex.name.toLowerCase().includes(filter.toLowerCase())
    );
    
    let html = "";
    for (const ex of filtered) {
      html += `
        <div class="ex-item" data-ex-name="${ex.name}">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.type} · 🔥 ${ex.calsPerMin} cal/min · ${ex.sets}×${ex.reps}</div>
          </div>
          <button class="btn btn-primary btn-sm select-exercise">Select</button>
        </div>
      `;
    }
    container.innerHTML = html;
    
    document.querySelectorAll(".select-exercise").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const exDiv = btn.closest(".ex-item");
        const exName = exDiv.dataset.exName;
        const allEx = [...COMPOUND_EXERCISES, ...ISOLATION_EXERCISES];
        const selected = allEx.find(e => e.name === exName);
        
        if (selected && pendingReplaceIndex !== null) {
          currentExercises[pendingReplaceIndex] = { ...selected };
          localStorage.setItem("ignite_workout", JSON.stringify(currentExercises));
          renderWorkout();
          updateStats();
          showToast(`Replaced with ${selected.name}`);
          pendingReplaceIndex = null;
          document.getElementById("dbModal").classList.remove("active");
        }
      });
    });
  }

  // RENDER MOBILITY
  function renderMobility() {
    const container = document.getElementById("mobilityList");
    if (!container) return;
    
    let html = "";
    for (let i = 0; i < mobilityList.length; i++) {
      html += `
        <div class="ex-item">
          <div class="ex-info">
            <div class="ex-name">🧘 ${mobilityList[i]}</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm remove-mobility" data-idx="${i}">✖️</button>
          </div>
        </div>
      `;
    }
    container.innerHTML = html;
    
    document.querySelectorAll(".remove-mobility").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.idx);
        mobilityList.splice(idx, 1);
        localStorage.setItem("ignite_mobility", JSON.stringify(mobilityList));
        renderMobility();
        showToast("Mobility removed");
      });
    });
  }

  function addMobility() {
    const name = prompt("Enter mobility/stretch name:");
    if (name && name.trim()) {
      mobilityList.push(name.trim());
      localStorage.setItem("ignite_mobility", JSON.stringify(mobilityList));
      renderMobility();
      showToast(`Added: ${name}`);
    }
  }

  // ADD CUSTOM EXERCISE
  function addCustomExercise() {
    const input = document.getElementById("customExInput");
    const name = input.value.trim();
    if (!name) return;
    
    const newEx = {
      name: name,
      type: "strength",
      calsPerMin: 7,
      sets: 3,
      reps: "8-10"
    };
    
    currentExercises.push(newEx);
    if (currentExercises.length > 5) currentExercises.shift();
    localStorage.setItem("ignite_workout", JSON.stringify(currentExercises));
    renderWorkout();
    updateStats();
    input.value = "";
    showToast(`Added: ${name}`);
  }

  // UPDATE STATS
  function updateStats() {
    if (!currentExercises.length) return;
    
    const explosiveCount = currentExercises.filter(e => e.type === "explosive").length;
    const score = Math.min(100, 40 + (explosiveCount * 12));
    document.getElementById("explosiveScore").innerText = score;
    
    const totalCals = currentExercises.reduce((sum, ex) => sum + (ex.calsPerMin * 4), 0);
    document.getElementById("calorieEstimate").innerText = `~${totalCals}`;
    
    document.getElementById("fatPercent").innerHTML = `${profile.bf}%`;
    const progress = Math.min(100, Math.max(0, ((profile.bf - profile.targetBf) / profile.bf) * 100));
    document.getElementById("fatFill").style.width = `${progress}%`;
    
    document.getElementById("weightInput").value = profile.weight;
    document.getElementById("bfInput").value = profile.bf;
    document.getElementById("targetBfInput").value = profile.targetBf;
  }

  function updateMetrics() {
    const w = parseFloat(document.getElementById("weightInput").value);
    const bf = parseFloat(document.getElementById("bfInput").value);
    const target = parseFloat(document.getElementById("targetBfInput").value);
    if (!isNaN(w)) profile.weight = w;
    if (!isNaN(bf)) profile.bf = bf;
    if (!isNaN(target)) profile.targetBf = target;
    localStorage.setItem("ignite_profile", JSON.stringify(profile));
    updateStats();
    showToast("Metrics updated");
  }

  // SAVE/LOAD ROUTINES
  function saveRoutine() {
    if (!currentExercises.length) {
      showToast("No workout to save");
      return;
    }
    const name = prompt("Name this routine:");
    if (name) {
      savedRoutines[name] = JSON.parse(JSON.stringify(currentExercises));
      localStorage.setItem("ignite_routines", JSON.stringify(savedRoutines));
      renderSavedRoutines();
      showToast(`Saved "${name}"`);
    }
  }
  
  function renderSavedRoutines() {
    const container = document.getElementById("savedRoutinesList");
    const names = Object.keys(savedRoutines);
    if (names.length === 0) {
      container.innerHTML = "<div class='text-muted'>No saved routines</div>";
      return;
    }
    
    let html = "";
    for (const name of names) {
      html += `
        <div class="flex-between" style="margin-bottom: 8px;">
          <span style="font-size:12px">📁 ${name}</span>
          <div class="btn-group">
            <button class="btn btn-sm load-routine" data-name="${name}">Load</button>
            <button class="btn btn-sm btn-danger del-routine" data-name="${name}">Del</button>
          </div>
        </div>
      `;
    }
    container.innerHTML = html;
    
    document.querySelectorAll(".load-routine").forEach(btn => {
      btn.addEventListener("click", () => {
        const name = btn.dataset.name;
        currentExercises = JSON.parse(JSON.stringify(savedRoutines[name]));
        localStorage.setItem("ignite_workout", JSON.stringify(currentExercises));
        renderWorkout();
        updateStats();
        showToast(`Loaded "${name}"`);
      });
    });
    
    document.querySelectorAll(".del-routine").forEach(btn => {
      btn.addEventListener("click", () => {
        const name = btn.dataset.name;
        delete savedRoutines[name];
        localStorage.setItem("ignite_routines", JSON.stringify(savedRoutines));
        renderSavedRoutines();
        showToast(`Deleted "${name}"`);
      });
    });
  }

  // WORKOUT RUNNER
  let runnerActive = false;
  let runnerExIdx = 0;
  let runnerSetNum = 1;
  
  function startWorkout() {
    if (!currentExercises.length) {
      showToast("No exercises! Generate first.");
      return;
    }
    runnerExIdx = 0;
    runnerSetNum = 1;
    showRunner();
  }
  
  function showRunner() {
    const ex = currentExercises[runnerExIdx];
    if (!ex) return;
    
    const runnerHTML = `
      <div style="position: fixed; bottom: 0; left: 0; right: 0; background: #12161c; border-top: 3px solid #ff6b35; padding: 24px; z-index: 2000; max-height: 80vh; overflow-y: auto;">
        <div class="flex-between" style="margin-bottom: 20px;">
          <h3>🏋️ WORKOUT</h3>
          <button class="btn" id="closeRunner">Close</button>
        </div>
        <div style="text-align: center; margin-bottom: 24px;">
          <div style="font-size: 26px; font-weight: 800;">${ex.name}</div>
          <div class="text-muted">${ex.type.toUpperCase()} · ${ex.sets} sets × ${ex.reps} reps</div>
        </div>
        <div class="flex-between" style="margin: 16px 0;">
          <span>Set ${runnerSetNum} / ${ex.sets}</span>
          <span>⚡ Rest 45s between sets</span>
        </div>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="btn btn-primary" id="completeSet">✅ Complete Set</button>
          <button class="btn" id="nextEx">➡️ Next</button>
          <button class="btn" id="prevEx">⬅️ Prev</button>
        </div>
      </div>
    `;
    
    let existing = document.getElementById("runnerPanel");
    if (existing) existing.remove();
    
    const div = document.createElement("div");
    div.id = "runnerPanel";
    div.innerHTML = runnerHTML;
    document.body.appendChild(div);
    
    document.getElementById("closeRunner")?.addEventListener("click", () => div.remove());
    
    document.getElementById("completeSet")?.addEventListener("click", () => {
      if (runnerSetNum < ex.sets) {
        runnerSetNum++;
        showToast(`Set ${runnerSetNum-1} done!`);
        showRunner();
      } else {
        if (runnerExIdx + 1 < currentExercises.length) {
          runnerExIdx++;
          runnerSetNum = 1;
          showToast(`Next: ${currentExercises[runnerExIdx].name}`);
          showRunner();
        } else {
          showToast("🏆 WORKOUT COMPLETE!");
          div.remove();
        }
      }
    });
    
    document.getElementById("nextEx")?.addEventListener("click", () => {
      if (runnerExIdx + 1 < currentExercises.length) {
        runnerExIdx++;
        runnerSetNum = 1;
        showRunner();
      } else showToast("Last exercise");
    });
    
    document.getElementById("prevEx")?.addEventListener("click", () => {
      if (runnerExIdx > 0) {
        runnerExIdx--;
        runnerSetNum = 1;
        showRunner();
      } else showToast("First exercise");
    });
  }

  // LOAD SAVED DATA ON PAGE LOAD
  function loadSavedData() {
    const savedWorkout = localStorage.getItem("ignite_workout");
    if (savedWorkout) {
      try {
        currentExercises = JSON.parse(savedWorkout);
      } catch(e) {}
    }
    
    const savedMobility = localStorage.getItem("ignite_mobility");
    if (savedMobility) {
      try {
        mobilityList = JSON.parse(savedMobility);
      } catch(e) {}
    }
    
    const savedProfile = localStorage.getItem("ignite_profile");
    if (savedProfile) {
      try {
        profile = JSON.parse(savedProfile);
      } catch(e) {}
    }
    
    const savedRoutinesData = localStorage.getItem("ignite_routines");
    if (savedRoutinesData) {
      try {
        savedRoutines = JSON.parse(savedRoutinesData);
      } catch(e) {}
    }
  }
