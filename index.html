<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Field+Iron</title>

  <!-- PWA / Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="msapplication-TileColor" content="#071018">
  <meta name="theme-color" content="#071018">

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    /* ---------- Visual styles ---------- */
    :root{
      --bg:#071018;
      --card:#0b1a24;
      --muted:#9fb3c8;
      --text:#e6eef6;
      --accent:#ff6a00;
      --glass: rgba(255,255,255,0.03);
      --radius:12px;
    }
    html,body{height:100%;margin:0;}
    body{
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:20px;
      box-sizing:border-box;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
    }
    .wrap{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:18px;min-height:100vh;}
    header{margin-top:6px;}
    .day-header{
      display:flex;
      align-items:baseline;
      gap:12px;
      margin:0;
      font-size:28px;
      font-weight:700;
    }
    .subtitle{margin:0;color:var(--muted);font-size:14px;}
    main{flex:1;}
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.5);
    }
    .section-title{margin:0 0 8px 0;color:#cfe6f6;font-size:16px;}
    ul{color:#cfe6f6;padding-left:18px;margin:0 0 12px 0;}
    .actions{display:flex;gap:12px;align-items:center;}
    .btn{border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(159,179,200,0.12);}
    .muted { color: var(--muted); font-size:13px; }
    .workout-item { display:flex; justify-content:space-between; gap:12px; align-items:center; padding:8px 0; border-bottom:1px solid var(--glass); }
    .workout-item:last-child { border-bottom: none; }
    .small { font-size:13px; color:#cfe6f6; opacity:0.95; }
    .input-row { display:flex; gap:8px; margin-top:12px; }
    input[type="text"], textarea{ flex:1; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.04); background:transparent; color:var(--text); }
    .pill { background: rgba(255,255,255,0.02); padding:6px 10px; border-radius:999px; color:var(--muted); font-size:13px; }
    footer{color:#6f8b9a;font-size:13px;padding-bottom:18px;}
    .sr-only { position:absolute; left:-9999px; top:auto; width:1px; height:1px; overflow:hidden; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .meta { color:var(--muted); font-size:12px; }
    .import-export { display:flex; gap:8px; align-items:center; }
    .search { margin-left:auto; }
    @media (max-width:720px){
      .day-header{font-size:22px;}
      body{padding:14px;}
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <header>
      <h1 class="day-header">
        <span id="current-day">Loading…</span>
        <span class="pill" id="timezone-label" aria-hidden="true"></span>
      </h1>
      <p class="subtitle">Field+Iron</p>
    </header>

    <main>
      <section class="card" aria-labelledby="today-heading">
        <div style="display:flex;gap:12px;align-items:center;">
          <h2 id="today-heading" class="section-title" style="margin:0;">Today</h2>
          <div class="meta" id="last-saved" style="margin-left:8px;">—</div>
        </div>

        <div id="workouts-list" aria-live="polite" style="margin-top:12px;">
          <!-- workout items injected here -->
        </div>

        <div class="input-row" role="form" aria-label="Add workout">
          <input id="new-workout" type="text" placeholder="Add workout (e.g., Reverse Lunge — 4×8)" aria-label="New workout" />
          <button id="add-workout" class="btn btn-primary">Add</button>
        </div>

        <div class="actions" style="margin-top:12px;">
          <div class="controls">
            <button id="clear-all" class="btn btn-ghost">Clear All</button>
            <button id="reset-defaults" class="btn btn-ghost">Reset Defaults</button>
            <div class="import-export">
              <button id="export-json" class="btn btn-ghost">Export</button>
              <label for="import-file" class="btn btn-ghost" style="cursor:pointer;">Import</label>
              <input id="import-file" type="file" accept="application/json" style="display:none" />
            </div>
          </div>
          <div style="flex:1"></div>
          <div class="search">
            <input id="filter" type="text" placeholder="Filter workouts" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text)" />
          </div>
        </div>
      </section>

      <section class="card" style="margin-top:12px;">
        <h3 class="section-title" style="margin-bottom:8px;">Settings</h3>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <label class="pill"><input id="show-timezone" type="checkbox" style="margin-right:8px" /> Show timezone</label>
          <label class="pill"><input id="use-short-day" type="checkbox" style="margin-right:8px" /> Use short weekday (Mon)</label>
          <label class="pill"><input id="enable-sw" type="checkbox" style="margin-right:8px" /> Enable offline (service worker)</label>
        </div>
      </section>
    </main>

    <footer>
      <small>Personal app — Field+Iron</small>
    </footer>
  </div>

  <!-- Full app script: dynamic day + localStorage workout manager + export/import + optional service worker -->
  <script>
    (function () {
      'use strict';

      /* ---------- Config / Storage ---------- */
      const STORAGE_KEY = 'fieldiron.workouts.v2';
      const SETTINGS_KEY = 'fieldiron.settings.v1';
      const DEFAULTS = [
        'Reverse Lunge — 4 sets × 8 ea',
        'Kettlebell Farmer Carry (double) — 4 sets × 50m',
        'DB Bulgarian Split — 3 sets × 8 ea',
        'Kneeling Hip Flexor Stretch — 2 sets × 30s ea'
      ];

      /* ---------- Day header logic ---------- */
      function getLocalWeekday(locale, short) {
        try {
          return new Date().toLocaleDateString(locale || undefined, { weekday: short ? 'short' : 'long' });
        } catch (e) {
          const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
          return days[new Date().getDay()] || '';
        }
      }

      function updateCurrentDay() {
        const el = document.getElementById('current-day');
        if (!el) return;
        const settings = loadSettings();
        el.textContent = getLocalWeekday(undefined, settings.useShortDay);
        const tzLabel = document.getElementById('timezone-label');
        if (settings.showTimezone) {
          try {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
            tzLabel.textContent = tz ? tz.replace('_',' ') : '';
            tzLabel.style.display = tz ? 'inline-block' : 'none';
          } catch (e) {
            tzLabel.textContent = '';
            tzLabel.style.display = 'none';
          }
        } else {
          tzLabel.style.display = 'none';
        }
      }

      // Run immediately on load or when DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateCurrentDay);
      } else {
        updateCurrentDay();
      }

      // Schedule an update at the next local midnight, then every 24 hours
      (function scheduleMidnightUpdate() {
        const now = new Date();
        const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
        let msUntilMidnight = nextMidnight.getTime() - now.getTime();
        if (!Number.isFinite(msUntilMidnight) || msUntilMidnight <= 0) {
          msUntilMidnight = 60 * 60 * 1000;
        }
        setTimeout(function () {
          updateCurrentDay();
          setInterval(updateCurrentDay, 24 * 60 * 60 * 1000);
        }, msUntilMidnight);
      })();

      /* ---------- Settings ---------- */
      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return { showTimezone: true, useShortDay: false, enableSW: false };
          return Object.assign({ showTimezone: true, useShortDay: false, enableSW: false }, JSON.parse(raw));
        } catch (e) {
          return { showTimezone: true, useShortDay: false, enableSW: false };
        }
      }

      function saveSettings(s) {
        try {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        } catch (e) { /* ignore */ }
      }

      /* ---------- Workouts storage ---------- */
      function loadWorkouts() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return DEFAULTS.slice();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return DEFAULTS.slice();
          return parsed;
        } catch (e) {
          return DEFAULTS.slice();
        }
      }

      function saveWorkouts(list) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
          updateLastSaved();
        } catch (e) {
          console.warn('Failed to save workouts', e);
        }
      }

      function updateLastSaved() {
        const el = document.getElementById('last-saved');
        if (!el) return;
        const t = new Date().toLocaleString();
        el.textContent = `Saved ${t}`;
      }

      /* ---------- Render ---------- */
      function renderWorkouts(filter) {
        const container = document.getElementById('workouts-list');
        container.innerHTML = '';
        const list = loadWorkouts();
        const filtered = (filter && filter.trim()) ? list.filter(i => i.toLowerCase().includes(filter.trim().toLowerCase())) : list;
        if (filtered.length === 0) {
          const p = document.createElement('p');
          p.className = 'muted';
          p.textContent = 'No workouts yet. Add one below.';
          container.appendChild(p);
          return;
        }
        filtered.forEach((text, idx) => {
          const row = document.createElement('div');
          row.className = 'workout-item';
          row.setAttribute('data-index', idx);

          const left = document.createElement('div');
          left.className = 'small';
          left.textContent = text;

          const right = document.createElement('div');
          right.style.display = 'flex';
          right.style.gap = '8px';
          right.style.alignItems = 'center';

          const up = document.createElement('button');
          up.className = 'btn btn-ghost';
          up.style.padding = '6px 8px';
          up.title = 'Move up';
          up.textContent = '↑';
          up.onclick = () => moveItem(idx, -1);

          const down = document.createElement('button');
          down.className = 'btn btn-ghost';
          down.style.padding = '6px 8px';
          down.title = 'Move down';
          down.textContent = '↓';
          down.onclick = () => moveItem(idx, 1);

          const del = document.createElement('button');
          del.className = 'btn btn-ghost';
          del.style.padding = '6px 8px';
          del.title = 'Delete';
          del.textContent = '✕';
          del.onclick = () => removeItem(idx);

          right.appendChild(up);
          right.appendChild(down);
          right.appendChild(del);

          row.appendChild(left);
          row.appendChild(right);
          container.appendChild(row);
        });
      }

      /* ---------- CRUD ---------- */
      function addWorkout(text) {
        if (!text || !text.trim()) return;
        const list = loadWorkouts();
        list.unshift(text.trim());
        saveWorkouts(list);
        renderWorkouts(document.getElementById('filter').value);
      }

      function removeItem(index) {
        const list = loadWorkouts();
        if (index < 0 || index >= list.length) return;
        list.splice(index, 1);
        saveWorkouts(list);
        renderWorkouts(document.getElementById('filter').value);
      }

      function moveItem(index, delta) {
        const list = loadWorkouts();
        const to = index + delta;
        if (to < 0 || to >= list.length) return;
        const [item] = list.splice(index, 1);
        list.splice(to, 0, item);
        saveWorkouts(list);
        renderWorkouts(document.getElementById('filter').value);
      }

      function clearAll() {
        if (!confirm('Clear all workouts? This cannot be undone.')) return;
        saveWorkouts([]);
        renderWorkouts();
      }

      function resetDefaults() {
        if (!confirm('Reset to default workouts?')) return;
        saveWorkouts(DEFAULTS.slice());
        renderWorkouts();
      }

      /* ---------- Export / Import ---------- */
      function exportJSON() {
        const data = loadWorkouts();
        const blob = new Blob([JSON.stringify({ workouts: data, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'fieldiron-workouts.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function importJSONFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const parsed = JSON.parse(e.target.result);
            if (Array.isArray(parsed.workouts)) {
              saveWorkouts(parsed.workouts);
              renderWorkouts();
              alert('Imported workouts.');
            } else {
              alert('Invalid file format.');
            }
          } catch (err) {
            alert('Failed to parse file.');
          }
        };
        reader.readAsText(file);
      }

      /* ---------- Service Worker (optional) ---------- */
      function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW registered', reg);
        }).catch(err => {
          console.warn('SW registration failed', err);
        });
      }

      function unregisterServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }

      /* ---------- Wire up UI ---------- */
      document.addEventListener('DOMContentLoaded', function () {
        // initial render
        const settings = loadSettings();
        document.getElementById('show-timezone').checked = !!settings.showTimezone;
        document.getElementById('use-short-day').checked = !!settings.useShortDay;
        document.getElementById('enable-sw').checked = !!settings.enableSW;

        renderWorkouts();
        updateLastSaved();
        updateCurrentDay();

        const input = document.getElementById('new-workout');
        const addBtn = document.getElementById('add-workout');
        const clearBtn = document.getElementById('clear-all');
        const resetBtn = document.getElementById('reset-defaults');
        const exportBtn = document.getElementById('export-json');
        const importFile = document.getElementById('import-file');
        const filter = document.getElementById('filter');

        addBtn.addEventListener('click', function () {
          addWorkout(input.value);
          input.value = '';
          input.focus();
        });

        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            addWorkout(input.value);
            input.value = '';
          }
        });

        clearBtn.addEventListener('click', clearAll);
        resetBtn.addEventListener('click', resetDefaults);
        exportBtn.addEventListener('click', exportJSON);

        importFile.addEventListener('change', function (e) {
          const f = e.target.files && e.target.files[0];
          if (f) importJSONFile(f);
          importFile.value = '';
        });

        filter.addEventListener('input', function () {
          renderWorkouts(filter.value);
        });

        // settings toggles
        document.getElementById('show-timezone').addEventListener('change', function (e) {
          const s = loadSettings();
          s.showTimezone = !!e.target.checked;
          saveSettings(s);
          updateCurrentDay();
        });
        document.getElementById('use-short-day').addEventListener('change', function (e) {
          const s = loadSettings();
          s.useShortDay = !!e.target.checked;
          saveSettings(s);
          updateCurrentDay();
        });
        document.getElementById('enable-sw').addEventListener('change', function (e) {
          const s = loadSettings();
          s.enableSW = !!e.target.checked;
          saveSettings(s);
          if (s.enableSW) registerServiceWorker(); else unregisterServiceWorker();
        });

        // focus input
        setTimeout(() => input.focus(), 300);
      });

      // refresh day label when tab becomes visible
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') updateCurrentDay();
      });

      // expose a small debug API on window for recovery
      try { window.__FieldIron = { loadWorkouts, saveWorkouts, loadSettings, saveSettings }; } catch (e) { /* ignore */ }

    })();
  </script>
</body>
</html>
